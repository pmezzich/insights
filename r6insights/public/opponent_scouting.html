<style>
/* ── OPPONENT GRID ─────────────────────────────────────────────── */
.opp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}
.opp-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:12px;}
.opp-card:hover{border-color:rgba(124,58,237,0.45);transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.opp-card.active{border-color:rgba(124,58,237,0.7);background:rgba(124,58,237,0.08);box-shadow:0 0 0 2px rgba(124,58,237,0.2);}
.opp-av{width:44px;height:44px;border-radius:10px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#a78bfa;flex-shrink:0;}
.opp-name{font-size:14px;font-weight:700;color:var(--light);}
.opp-meta{font-size:11px;color:var(--gray);margin-top:2px;}
.opp-wr{margin-left:auto;font-size:16px;font-weight:800;flex-shrink:0;}

/* ── SCOUTING REPORT ───────────────────────────────────────────── */
.report{display:flex;flex-direction:column;gap:0;border-radius:14px;overflow:hidden;border:1px solid var(--card-border);}
.report-hero{padding:24px 28px;background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(79,70,229,0.06));border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.report-hero-av{width:60px;height:60px;border-radius:14px;background:rgba(124,58,237,0.2);border:2px solid rgba(124,58,237,0.4);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#a78bfa;flex-shrink:0;}
.report-hero-name{font-size:24px;font-weight:800;color:var(--light);}
.report-hero-sub{font-size:13px;color:var(--gray);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap;}
.report-hero-sub span{display:flex;align-items:center;gap:5px;}
.report-record{margin-left:auto;text-align:right;}
.report-record-wl{font-size:32px;font-weight:900;letter-spacing:-1px;}
.report-record-lbl{font-size:11px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-top:2px;}

/* KPI tiles */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:0;border-bottom:1px solid var(--card-border);}
.kpi{padding:18px 20px;border-right:1px solid var(--card-border);text-align:center;background:rgba(15,23,42,0.3);}
.kpi:last-child{border-right:none;}
.kpi-val{font-size:26px;font-weight:900;}
.kpi-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-top:4px;}
.kpi-sub{font-size:11px;color:var(--gray);margin-top:3px;}

/* Sections */
.scout-section{padding:20px 24px;border-bottom:1px solid var(--card-border);}
.scout-section:last-child{border-bottom:none;}
.scout-section-hdr{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.7px;color:#a78bfa;margin-bottom:14px;display:flex;align-items:center;gap:8px;}

/* Side split */
.side-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.side-tile{background:rgba(15,23,42,0.5);border:1px solid var(--card-border);border-radius:10px;padding:16px;text-align:center;}
.side-tile-icon{font-size:20px;margin-bottom:8px;}
.side-tile-val{font-size:24px;font-weight:800;}
.side-tile-lbl{font-size:11px;color:var(--gray);margin-top:4px;}
.side-tile-detail{font-size:11px;color:var(--gray);margin-top:6px;padding-top:6px;border-top:1px solid var(--card-border);}

/* Map pool */
.map-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;background:rgba(15,23,42,0.4);border:1px solid var(--card-border);margin-bottom:7px;transition:border-color .15s;}
.map-row:hover{border-color:rgba(124,58,237,0.3);}
.map-name{font-size:13px;font-weight:700;width:130px;flex-shrink:0;}
.map-wl{font-size:12px;font-weight:700;width:52px;flex-shrink:0;}
.map-bar-wrap{flex:1;height:7px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;}
.map-bar{height:100%;border-radius:4px;transition:width .5s cubic-bezier(.34,1.2,.64,1);}
.map-pct{font-size:13px;font-weight:800;width:40px;text-align:right;flex-shrink:0;}
.map-sides{font-size:11px;color:var(--gray);width:130px;text-align:right;flex-shrink:0;}

/* Trend */
.trend-wrap{display:flex;gap:5px;align-items:flex-end;height:80px;padding:8px 0;}
.trend-bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1;min-width:28px;}
.trend-bar-inner{width:100%;border-radius:4px 4px 0 0;transition:height .4s;}
.trend-bar-date{font-size:9px;color:var(--gray);writing-mode:vertical-rl;transform:rotate(180deg);white-space:nowrap;}
.trend-bar-score{font-size:9px;font-weight:700;margin-top:2px;}

/* Match history */
.hist-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;background:rgba(15,23,42,0.4);border:1px solid var(--card-border);margin-bottom:6px;transition:border-color .15s;}
.hist-row:hover{border-color:rgba(124,58,237,0.3);}
.hist-date{font-size:11px;color:var(--gray);width:90px;flex-shrink:0;}
.hist-badge{font-size:11px;font-weight:800;width:20px;flex-shrink:0;}
.hist-score{font-size:14px;font-weight:800;width:40px;flex-shrink:0;}
.hist-maps{font-size:12px;color:var(--gray);flex:1;}
.hist-type{font-size:10px;background:rgba(255,255,255,0.05);border:1px solid var(--card-border);padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;color:var(--gray);flex-shrink:0;}
.hist-rnd{font-size:11px;color:var(--gray);width:60px;text-align:right;flex-shrink:0;}

/* Improvement arrow */
.trend-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:700;}
.trend-up{background:rgba(52,211,153,0.12);color:#34d399;border:1px solid rgba(52,211,153,0.25);}
.trend-down{background:rgba(248,113,113,0.12);color:#f87171;border:1px solid rgba(248,113,113,0.25);}
.trend-flat{background:rgba(251,191,36,0.12);color:#fbbf24;border:1px solid rgba(251,191,36,0.25);}

/* Empty / loading */
.empty-scout{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-scout i{font-size:40px;margin-bottom:14px;display:block;opacity:.25;}
.empty-scout p{font-size:14px;}

/* Panel */
.panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;}
.panel-hdr{padding:13px 18px;border-bottom:1px solid var(--card-border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
.panel-body{padding:16px 18px;}
</style>
</head>

<!-- Nav -->
<div class="nav-header">

<script>
(function(){
'use strict';

if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

// ── Helpers ───────────────────────────────────────────────────────────────────
const x = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pct = v => (typeof v==='number'&&isFinite(v))?v.toFixed(1)+'%':'—';
const col = v => v>=60?'#34d399':v>=45?'#fbbf24':'#f87171';

function normRounds(map){
    if(!map.rounds) return [];
    const arr = Array.isArray(map.rounds)?map.rounds:Object.values(map.rounds);
    return arr.filter(Boolean).sort((a,b)=>parseInt(a.roundNumber||a.round||0)-parseInt(b.roundNumber||b.round||0));
}
function isWin(r){
    const o=(r.outcome||'').toLowerCase();
    return o==='win'||o==='won'||o.startsWith('won');
}
function getSide(r,map){
    const rl=(r.yourRole||'').toLowerCase();
    if(rl.includes('attack')||rl==='atk') return 'atk';
    if(rl.includes('defen')||rl==='def')  return 'def';
    if(Array.isArray(r.teams)){
        const t=r.teams[r.yourTeamIndex??0];
        const tr=(t?.role||t?.name||'').toLowerCase();
        if(tr.includes('attack')) return 'atk';
        if(tr.includes('defen'))  return 'def';
    }
    const rn=parseInt(r.roundNumber||r.round||0);
    const sd=(map.startingSide||'').toLowerCase();
    if(rn<=6)  return sd==='attack'?'atk':'def';
    if(rn<=12) return sd==='attack'?'def':'atk';
    return ((rn-12)%2===1)?'atk':'def';
}
function initials(name){return(name||'?').slice(0,2).toUpperCase();}

// ── State ─────────────────────────────────────────────────────────────────────
let ALL_MATCHES = [];
let activeOpp   = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user=>{
    if(!user||!user.emailVerified) return window.location.href='index_pro.html';
    R6Theme.init(user.uid, db);
    try{
        const teamId = await getPreviewTeamId(user, db);
        if(!teamId) throw new Error('No team');
        const snap = await db.ref(`teams/${teamId}/matches_pro`).once('value');
        const raw  = snap.val()||{};
        ALL_MATCHES = Object.entries(raw)
            .map(([id,m])=>({
                id,...m,
                maps: m.maps?(Array.isArray(m.maps)?m.maps:Object.values(m.maps)):[]
            }))
            .filter(m=>m.maps.length)
            .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        buildOppGrid();
    }catch(e){
        console.error('Scouting load error',e);
        document.getElementById('oppGrid').innerHTML=`<div class="empty-scout"><i class="fas fa-triangle-exclamation"></i><p>Error loading data: ${e.message}</p></div>`;
    }
});

// ── Build opponent grid ───────────────────────────────────────────────────────
function buildOppGrid(){
    const oppMap={};
    ALL_MATCHES.forEach(m=>{
        const opp=m.opponent||'Unknown';
        if(!oppMap[opp]) oppMap[opp]={matches:0,wins:0,lastDate:''};
        const mW=(m.maps||[]).filter(mp=>(mp.teamScore||0)>(mp.opponentScore||0)).length;
        const mL=(m.maps||[]).filter(mp=>(mp.teamScore||0)<(mp.opponentScore||0)).length;
        oppMap[opp].matches++;
        if(mW>mL) oppMap[opp].wins++;
        if((m.date||'')>oppMap[opp].lastDate) oppMap[opp].lastDate=m.date||'';
    });
    const opps=Object.entries(oppMap).sort((a,b)=>b[1].matches-a[1].matches);
    document.getElementById('oppCount').textContent=`${opps.length} opponent${opps.length!==1?'s':''}`;
    const grid=document.getElementById('oppGrid');
    if(!opps.length){grid.innerHTML='<div class="empty-scout"><i class="fas fa-folder-open"></i><p>No opponents found.</p></div>';return;}
    grid.innerHTML='';
    opps.forEach(([opp,s])=>{
        const wr=s.matches>0?s.wins/s.matches*100:0;
        const c=col(wr);
        const div=document.createElement('div');
        div.className='opp-card';div.dataset.opp=opp;
        div.innerHTML=`
            <div class="opp-av">${x(initials(opp))}</div>
            <div>
                <div class="opp-name">${x(opp)}</div>
                <div class="opp-meta">${s.matches} match${s.matches!==1?'es':''} · Last ${x(s.lastDate||'—')}</div>
            </div>
            <div class="opp-wr" style="color:${c};">${wr.toFixed(0)}%</div>`;
        div.addEventListener('click',()=>selectOpp(opp,div));
        grid.appendChild(div);
    });
}

function selectOpp(opp,el){
    document.querySelectorAll('.opp-card').forEach(c=>c.classList.remove('active'));
    el.classList.add('active');
    activeOpp=opp;
    renderReport(opp);
}

// ── Render scouting report ────────────────────────────────────────────────────
function renderReport(opp){
    const ms=ALL_MATCHES.filter(m=>m.opponent===opp);
    if(!ms.length){document.getElementById('reportWrap').innerHTML='<div class="empty-scout"><i class="fas fa-folder-open"></i><p>No matches found for this opponent.</p></div>';return;}

    // ── Aggregate ─────────────────────────────────────────────────────────────
    let matchW=0,matchL=0,mapW=0,mapL=0,mapD=0;
    let rounds=0,roundW=0,atkR=0,atkW=0,defR=0,defW=0;
    const mapStats={};

    ms.forEach(m=>{
        const mW=(m.maps||[]).filter(mp=>(mp.teamScore||0)>(mp.opponentScore||0)).length;
        const mL=(m.maps||[]).filter(mp=>(mp.teamScore||0)<(mp.opponentScore||0)).length;
        const mD=(m.maps||[]).filter(mp=>(mp.teamScore||0)===(mp.opponentScore||0)).length;
        mapW+=mW; mapL+=mL; mapD+=mD;
        if(mW>mL) matchW++; else if(mL>mW) matchL++;
        (m.maps||[]).forEach(mp=>{
            const mn=mp.mapName||'Unknown';
            if(!mapStats[mn]) mapStats[mn]={w:0,l:0,d:0,atkR:0,atkW:0,defR:0,defW:0};
            const ms2=mapStats[mn];
            const won=(mp.teamScore||0)>(mp.opponentScore||0);
            const lost=(mp.teamScore||0)<(mp.opponentScore||0);
            if(won)ms2.w++; else if(lost)ms2.l++; else ms2.d++;
            normRounds(mp).forEach(r=>{
                rounds++; const sd=getSide(r,mp); const w=isWin(r);
                if(w)roundW++;
                if(sd==='atk'){atkR++;if(w)atkW++;ms2.atkR++;if(w)ms2.atkW++;}
                else{defR++;if(w)defW++;ms2.defR++;if(w)ms2.defW++;}
            });
        });
    });

    const matchTotal=matchW+matchL;
    const mapTotal=mapW+mapL+mapD;
    const matchWR=matchTotal>0?matchW/matchTotal*100:0;
    const mapWR=mapTotal>0?mapW/mapTotal*100:0;
    const roundWR=rounds>0?roundW/rounds*100:0;
    const atkWR=atkR>0?atkW/atkR*100:0;
    const defWR=defR>0?defW/defR*100:0;

    // ── Trend analysis ────────────────────────────────────────────────────────
    // Split matches into first half and second half to detect improvement
    const trendMatches=ms.map(m=>{
        const mW=(m.maps||[]).filter(mp=>(mp.teamScore||0)>(mp.opponentScore||0)).length;
        const mL=(m.maps||[]).filter(mp=>(mp.teamScore||0)<(mp.opponentScore||0)).length;
        return{date:m.date||'',win:mW>mL,mW,mL,type:m.matchType||'scrim',id:m.id};
    });
    let trendLabel='', trendClass='trend-flat', trendIcon='fa-minus';
    if(trendMatches.length>=4){
        const half=Math.floor(trendMatches.length/2);
        const early=trendMatches.slice(0,half);
        const recent=trendMatches.slice(-half);
        const earlyWR=early.filter(t=>t.win).length/early.length;
        const recentWR=recent.filter(t=>t.win).length/recent.length;
        const diff=recentWR-earlyWR;
        if(diff>0.15){trendLabel=`Improving (+${(diff*100).toFixed(0)}% WR recent vs early)`;trendClass='trend-up';trendIcon='fa-arrow-trend-up';}
        else if(diff<-0.15){trendLabel=`Declining (${(diff*100).toFixed(0)}% WR recent vs early)`;trendClass='trend-down';trendIcon='fa-arrow-trend-down';}
        else{trendLabel='Consistent performance across matches';trendClass='trend-flat';trendIcon='fa-minus';}
    } else {
        trendLabel=`${trendMatches.length} match${trendMatches.length!==1?'es':''} — need 4+ for trend`;
    }

    // ── Trend bar chart ───────────────────────────────────────────────────────
    const maxMaps=Math.max(...trendMatches.map(t=>t.mW+t.mL),1);
    const trendBars=trendMatches.map(t=>{
        const c=t.win?'#34d399':'#f87171';
        const h=Math.max(20,Math.round((t.mW+t.mL)/maxMaps*60));
        return`<div class="trend-bar-col">
            <div class="trend-bar-inner" style="height:${h}px;background:${c};opacity:${t.win?1:0.6};"></div>
            <div class="trend-bar-score" style="color:${c};">${t.mW}–${t.mL}</div>
            <div class="trend-bar-date">${x(t.date.slice(5)||t.date)}</div>
        </div>`;
    }).join('');

    // ── Map pool ──────────────────────────────────────────────────────────────
    const mapRows=Object.entries(mapStats)
        .sort((a,b)=>(b[1].w+b[1].l+b[1].d)-(a[1].w+a[1].l+a[1].d))
        .map(([name,s])=>{
            const tot=s.w+s.l+s.d;
            const wr=tot>0?s.w/tot*100:0;
            const c=col(wr);
            const atkStr=s.atkR>0?(s.atkW/s.atkR*100).toFixed(0)+'%':'—';
            const defStr=s.defR>0?(s.defW/s.defR*100).toFixed(0)+'%':'—';
            return`<div class="map-row">
                <div class="map-name">${x(name)}</div>
                <div class="map-wl" style="color:${c};">${s.w}W–${s.l}L</div>
                <div class="map-bar-wrap"><div class="map-bar" style="width:${wr.toFixed(0)}%;background:${c};"></div></div>
                <div class="map-pct" style="color:${c};">${wr.toFixed(0)}%</div>
                <div class="map-sides">ATK <strong>${atkStr}</strong> · DEF <strong>${defStr}</strong></div>
            </div>`;
        }).join('');

    // ── Match history ─────────────────────────────────────────────────────────
    const histRows=[...trendMatches].reverse().map(t=>{
        const c=t.win?'#34d399':'#f87171';
        const matchData=ms.find(m=>m.id===t.id);
        const mapNames=(matchData?.maps||[]).map(mp=>mp.mapName||'?').join(' · ');
        // Total rounds in match
        let totalRounds=0,wonRounds=0;
        (matchData?.maps||[]).forEach(mp=>{
            const rds=normRounds(mp);
            totalRounds+=rds.length;
            rds.forEach(r=>{if(isWin(r))wonRounds++;});
        });
        return`<div class="hist-row">
            <div class="hist-date">${x(t.date||'—')}</div>
            <div class="hist-badge" style="color:${c};">${t.win?'W':'L'}</div>
            <div class="hist-score" style="color:${c};">${t.mW}–${t.mL}</div>
            <div class="hist-maps">${x(mapNames||'—')}</div>
            <div class="hist-type">${x(t.type.toUpperCase())}</div>
            <div class="hist-rnd" title="Rounds won / total">${wonRounds}–${totalRounds-wonRounds} rds</div>
        </div>`;
    }).join('');

    // ── Streak ────────────────────────────────────────────────────────────────
    let streak=0, streakType='';
    for(let i=trendMatches.length-1;i>=0;i--){
        if(i===trendMatches.length-1){streakType=trendMatches[i].win?'W':'L';streak=1;}
        else if((trendMatches[i].win&&streakType==='W')||(!trendMatches[i].win&&streakType==='L')) streak++;
        else break;
    }
    const streakStr=streak>1?`${streak}-match ${streakType==='W'?'win':'loss'} streak`:'';

    // ── Render ────────────────────────────────────────────────────────────────
    const wlCol=col(matchWR);
    document.getElementById('reportWrap').innerHTML=`
    <div class="report">

        <!-- Hero -->
        <div class="report-hero">
            <div class="report-hero-av">${x(initials(opp))}</div>
            <div>
                <div class="report-hero-name">${x(opp)}</div>
                <div class="report-hero-sub">
                    <span><i class="fas fa-gamepad"></i> ${ms.length} match${ms.length!==1?'es':''}</span>
                    <span><i class="fas fa-map"></i> ${mapTotal} map${mapTotal!==1?'s':''}</span>
                    <span><i class="fas fa-calendar"></i> First: ${x(ms[0]?.date||'—')}</span>
                    <span><i class="fas fa-clock"></i> Last: ${x(ms[ms.length-1]?.date||'—')}</span>
                    ${streakStr?`<span style="color:${streakType==='W'?'#34d399':'#f87171'};"><i class="fas fa-fire"></i> ${streakStr}</span>`:''}
                </div>
                ${trendMatches.length>=4?`<div style="margin-top:10px;"><span class="trend-badge ${trendClass}"><i class="fas ${trendIcon}"></i> ${trendLabel}</span></div>`:''}
            </div>
            <div class="report-record">
                <div class="report-record-wl" style="color:${wlCol};">${matchW}W – ${matchL}L</div>
                <div class="report-record-lbl">Match Record</div>
                <div style="font-size:13px;color:${wlCol};margin-top:4px;font-weight:700;">${matchWR.toFixed(0)}% win rate</div>
            </div>
        </div>

        <!-- KPIs -->
        <div class="kpi-row">
            <div class="kpi">
                <div class="kpi-val" style="color:${col(matchWR)};">${matchWR.toFixed(0)}%</div>
                <div class="kpi-lbl">Match WR</div>
                <div class="kpi-sub">${matchW}W – ${matchL}L</div>
            </div>
            <div class="kpi">
                <div class="kpi-val" style="color:${col(mapWR)};">${mapWR.toFixed(0)}%</div>
                <div class="kpi-lbl">Map WR</div>
                <div class="kpi-sub">${mapW}W – ${mapL}L${mapD>0?' – '+mapD+'D':''}</div>
            </div>
            <div class="kpi">
                <div class="kpi-val" style="color:${col(roundWR)};">${roundWR.toFixed(0)}%</div>
                <div class="kpi-lbl">Round WR</div>
                <div class="kpi-sub">${roundW}W – ${rounds-roundW}L</div>
            </div>
            <div class="kpi">
                <div class="kpi-val" style="color:${col(atkWR)};">${atkWR.toFixed(0)}%</div>
                <div class="kpi-lbl">ATK WR</div>
                <div class="kpi-sub">${atkW}W – ${atkR-atkW}L</div>
            </div>
            <div class="kpi">
                <div class="kpi-val" style="color:${col(defWR)};">${defWR.toFixed(0)}%</div>
                <div class="kpi-lbl">DEF WR</div>
                <div class="kpi-sub">${defW}W – ${defR-defW}L</div>
            </div>
        </div>

        <!-- Side tendencies -->
        <div class="scout-section">
            <div class="scout-section-hdr"><i class="fas fa-shuffle"></i> Side Tendencies</div>
            <div class="side-grid">
                <div class="side-tile">
                    <div class="side-tile-icon">⚔️</div>
                    <div class="side-tile-val" style="color:${col(atkWR)};">${atkWR.toFixed(0)}%</div>
                    <div class="side-tile-lbl">Attack Win Rate</div>
                    <div class="side-tile-detail">${atkW} wins · ${atkR-atkW} losses · ${atkR} rounds</div>
                </div>
                <div class="side-tile">
                    <div class="side-tile-icon">🛡️</div>
                    <div class="side-tile-val" style="color:${col(defWR)};">${defWR.toFixed(0)}%</div>
                    <div class="side-tile-lbl">Defence Win Rate</div>
                    <div class="side-tile-detail">${defW} wins · ${defR-defW} losses · ${defR} rounds</div>
                </div>
            </div>
            ${atkWR>0&&defWR>0?`<p style="font-size:12px;color:var(--gray);margin-top:12px;">
                <i class="fas fa-lightbulb" style="color:#fbbf24;"></i>
                ${atkWR>defWR
                    ?`You perform <strong style="color:#34d399;">${(atkWR-defWR).toFixed(0)}% better on Attack</strong> than Defence against ${x(opp)}.`
                    :atkWR<defWR
                    ?`You perform <strong style="color:#34d399;">${(defWR-atkWR).toFixed(0)}% better on Defence</strong> than Attack against ${x(opp)}.`
                    :'Balanced performance on both sides against this opponent.'}
            </p>`:''}
        </div>

        <!-- Map pool -->
        <div class="scout-section">
            <div class="scout-section-hdr"><i class="fas fa-map"></i> Map Pool</div>
            ${mapRows||'<p style="color:var(--gray);font-size:13px;">No map data available.</p>'}
        </div>

        <!-- Trend chart -->
        <div class="scout-section">
            <div class="scout-section-hdr"><i class="fas fa-chart-column"></i> Performance Trend
                <span style="font-size:10px;font-weight:400;color:var(--gray);text-transform:none;letter-spacing:0;margin-left:4px;">each bar = one match</span>
            </div>
            <div class="trend-wrap">${trendBars}</div>
        </div>

        <!-- Match history -->
        <div class="scout-section">
            <div class="scout-section-hdr"><i class="fas fa-clock-rotate-left"></i> Match History</div>
            ${histRows||'<p style="color:var(--gray);font-size:13px;">No history available.</p>'}
        </div>

    </div>`;
}

})();
</script>
</body>
</html>
