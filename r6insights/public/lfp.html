<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LFP Board — R6 Insights</title>
<link rel="stylesheet" href="../styles/pro-global.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="../scripts/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<style>
    body{background:var(--darker);min-height:100vh;padding-bottom:60px;}

    /* ── FILTER BAR ── */
    .filter-bar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;padding:20px 24px;margin-bottom:20px;}
    .filter-bar h3{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin:0 0 14px;}
    .filter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;align-items:end;}
    .filter-group{display:flex;flex-direction:column;gap:6px;}
    .filter-group label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
    .filter-input{background:rgba(10,16,28,0.8);border:1px solid var(--card-border);color:var(--light);border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;width:100%;transition:border-color .2s;}
    .filter-input:focus{outline:none;border-color:var(--primary);}
    .filter-input::placeholder{color:rgba(148,163,184,0.4);}

    /* ── STATS BAR ── */
    .lft-stats{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
    .lft-stat{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--gray);}
    .lft-stat strong{color:var(--light);font-size:18px;font-weight:800;display:block;margin-bottom:2px;}

    /* ── TEAM GRID ── */
    .team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;}

    /* ── TEAM CARD ── */
    .team-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;overflow:hidden;transition:all .2s;position:relative;}
    .team-card:hover{border-color:rgba(248,113,113,0.45);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.5);}

    /* accent bar top */
    .team-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#f87171,#fb923c);}

    .tc-header{padding:20px 20px 14px;display:flex;align-items:center;gap:14px;}
    .tc-icon{width:54px;height:54px;border-radius:12px;background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px;font-weight:900;color:#f87171;}
    .tc-info{flex:1;min-width:0;}
    .tc-name{font-size:17px;font-weight:800;color:var(--light);margin-bottom:4px;}
    .tc-meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}

    /* role badge */
    .role-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:7px;font-size:12px;font-weight:700;}
    .role-fragger {background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);}
    .role-flex    {background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
    .role-support {background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.3);}
    .role-igl     {background:rgba(167,139,250,0.15);color:#a78bfa;border:1px solid rgba(167,139,250,0.3);}
    .role-any     {background:rgba(148,163,184,0.12);color:#94a3b8;border:1px solid rgba(148,163,184,0.2);}

    /* status pill */
    .lfp-live{background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px;}

    /* ── REQUIREMENTS ── */
    .tc-reqs{margin:0 20px 16px;padding:12px 14px;background:rgba(15,23,42,0.5);border-radius:10px;border:1px solid rgba(255,255,255,0.06);}
    .tc-reqs-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:6px;}
    .tc-reqs-txt{font-size:13px;color:rgba(248,250,252,0.8);line-height:1.5;}

    /* ── ROSTER PREVIEW ── */
    .tc-roster{padding:14px 20px;border-top:1px solid var(--card-border);}
    .tc-roster-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);margin-bottom:10px;}
    .tc-roster-row{display:flex;gap:8px;flex-wrap:wrap;}
    .tc-player{display:flex;align-items:center;gap:6px;background:rgba(15,23,42,0.5);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:5px 10px;font-size:12px;}
    .tc-player-av{width:22px;height:22px;border-radius:5px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}

    /* ── FOOTER ── */
    .tc-footer{padding:12px 20px;border-top:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;background:rgba(10,16,28,0.3);}
    .tc-updated{font-size:11px;color:var(--gray);}
    .tc-members{font-size:12px;color:var(--gray);}

    /* ── EMPTY ── */
    .empty-state{text-align:center;padding:80px 20px;color:var(--gray);}
    .empty-state i{font-size:48px;margin-bottom:16px;display:block;opacity:.25;}
    .empty-state p{font-size:14px;opacity:.6;line-height:1.7;}

    /* ── LOADING ── */
    .loading-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;}
    .loading-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;height:220px;position:relative;overflow:hidden;}
    .loading-card::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.03),transparent);animation:shimmer 1.4s infinite;}
    @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
</style>
</head>
<body>
<div class="container">

    <!-- Nav -->
    <div class="nav-header">
        <a href="index_pro.html" class="logo" style="text-decoration:none;">
            <img src="../styles/r6_insights.png" class="logo-img" alt="R6 Insights">
            <div class="logo-text">R6 INSIGHTS</div>
            <span class="nav-badge">Beta</span>
        </a>
        <div class="nav-right">
            <a href="index_pro.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Hub</a>
            <a href="profile.html" id="navAvatar" class="nav-avatar-btn" title="Profile">?</a>
            <button class="btn-logout" onclick="auth.signOut().then(()=>window.location.href='index_pro.html')">
                <i class="fas fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </div>

    <!-- Page Title -->
    <div class="page-title">
        <div class="page-title-icon" style="background:rgba(248,113,113,0.15);border:1px solid rgba(248,113,113,0.3);color:#f87171;">
            <i class="fas fa-bullhorn"></i>
        </div>
        <div>
            <h2>LFP Board</h2>
            <p>Teams looking for players — filter by role, click a card to see who's on the roster</p>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <h3><i class="fas fa-filter" style="margin-right:6px;"></i>Filters</h3>
        <div class="filter-grid">
            <div class="filter-group">
                <label>Role Needed</label>
                <select class="filter-input" id="filtRole" onchange="applyFilters()">
                    <option value="">All Roles</option>
                    <option value="fragger">🔴 Fragger</option>
                    <option value="flex">🟡 Flex</option>
                    <option value="support">🔵 Support</option>
                </select>
            </div>
            <div class="filter-group">
                <label>IGL</label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 12px;border-radius:8px;border:1px solid var(--card-border);background:rgba(10,16,28,0.8);font-size:13px;font-weight:600;color:#a78bfa;">
                    <input type="checkbox" id="filtIgl" onchange="applyFilters()" style="accent-color:#a78bfa;width:14px;height:14px;cursor:pointer;">
                    🟣 IGL only
                </label>
            </div>
            <div class="filter-group">
                <label>Search Team</label>
                <input class="filter-input" id="filtName" type="text" placeholder="Team name…" oninput="applyFilters()">
            </div>
            <div class="filter-group" style="align-items:flex-end;">
                <button class="btn btn-secondary" onclick="resetFilters()">
                    <i class="fas fa-rotate-left"></i> Reset
                </button>
            </div>
        </div>
    </div>

    <!-- Stats bar -->
    <div class="lft-stats">
        <div class="lft-stat"><strong id="statTotal">—</strong>Teams Listed</div>
        <div class="lft-stat"><strong id="statShowing">—</strong>Showing</div>
    </div>

    <!-- Team Grid -->
    <div id="teamGrid">
        <div class="loading-cards">
            <div class="loading-card"></div>
            <div class="loading-card"></div>
            <div class="loading-card"></div>
        </div>
    </div>

</div>

<script src="../scripts/profile-loader.js"></script>
<script>
(function(){
'use strict';

if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();

let allTeams = [];

function x(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Role helpers ──────────────────────────────────────────────────────────────
const ROLE_LABELS = { fragger:'Fragger', flex:'Flex', support:'Support', igl:'IGL', any:'Any Role' };
const ROLE_ICONS  = { fragger:'🔴', flex:'🟡', support:'🔵', igl:'🟣', any:'⚪' };
const ROLE_CLASS  = { fragger:'role-fragger', flex:'role-flex', support:'role-support', igl:'role-igl', any:'role-any' };

function roleBadge(role){
    if(!role) return '';
    const label = ROLE_LABELS[role]||role;
    const icon  = ROLE_ICONS[role]||'';
    const cls   = ROLE_CLASS[role]||'role-any';
    return `<span class="role-badge ${cls}">${icon} ${label}</span>`;
}

// ── Time helper ───────────────────────────────────────────────────────────────
function timeAgo(iso){
    if(!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff/60000);
    if(m < 60)   return `${m}m ago`;
    const h = Math.floor(m/60);
    if(h < 24)   return `${h}h ago`;
    const d = Math.floor(h/24);
    return `${d}d ago`;
}

// ── Avatar for a player ───────────────────────────────────────────────────────
function playerAvHtml(player, avatars){
    const av = avatars[player.uid];
    const colors = ['#7C3AED','#2563EB','#059669','#DC2626','#D97706'];
    const bg = colors[(player.displayName||player.uid||'').charCodeAt(0) % colors.length];
    if(av){
        return `<div class="tc-player-av"><img src="${av}" style="width:100%;height:100%;object-fit:cover;border-radius:5px;"></div>`;
    }
    return `<div class="tc-player-av" style="background:${bg};color:#fff;">${(player.displayName||'?')[0].toUpperCase()}</div>`;
}

// ── Build team card ───────────────────────────────────────────────────────────
function buildCard(team){
    const initials = (team.teamName||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const reqsHtml = team.requirements
        ? `<div class="tc-reqs"><div class="tc-reqs-lbl"><i class="fas fa-list-check" style="margin-right:4px;"></i>Requirements</div><div class="tc-reqs-txt">${x(team.requirements)}</div></div>`
        : '';

    // Roster preview — up to 5 players
    const players = (team.players||[]).slice(0,5);
    const rosterHtml = players.length
        ? `<div class="tc-roster">
            <div class="tc-roster-lbl"><i class="fas fa-users" style="margin-right:4px;"></i>Current Roster</div>
            <div class="tc-roster-row">
                ${players.map(p=>`
                <div class="tc-player">
                    ${playerAvHtml(p, team.avatars||{})}
                    <span style="font-weight:600;">${x(p.displayName||'?')}</span>
                    ${p.playRole ? `<span style="font-size:10px;color:var(--gray);">${ROLE_ICONS[p.playRole]||''}</span>` : ''}
                </div>`).join('')}
                ${team.memberCount > 5 ? `<div class="tc-player" style="color:var(--gray);">+${team.memberCount-5} more</div>` : ''}
            </div>
           </div>`
        : '';

    return `
    <div class="team-card">
        <div class="tc-header">
            <div class="tc-icon">${initials}</div>
            <div class="tc-info">
                <div class="tc-name">${x(team.teamName)}</div>
                <div class="tc-meta">
                    ${roleBadge(team.baseRole)}
                    ${team.needsIgl ? '<span class="role-badge role-igl">🟣 IGL</span>' : ''}
                    <span class="lfp-live">LFP</span>
                    <span style="font-size:11px;color:var(--gray);">${team.memberCount} member${team.memberCount!==1?'s':''}</span>
                </div>
            </div>
        </div>
        ${reqsHtml}
        ${rosterHtml}
        <div class="tc-footer">
            <span class="tc-updated"><i class="fas fa-clock" style="margin-right:4px;opacity:.5;"></i>Updated ${timeAgo(team.updatedAt)}</span>
        </div>
    </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
function applyFilters(){
    const role = document.getElementById('filtRole').value;
    const name = (document.getElementById('filtName').value||'').toLowerCase().trim();

    const iglOnly = document.getElementById('filtIgl')?.checked || false;
    const filtered = allTeams.filter(t=>{
        const teamRole = t.role || '';
        const baseRole = teamRole.replace('+igl','').replace('igl','');
        const hasIgl   = teamRole.includes('igl');
        // Role filter: match base role or "any"
        if(role && baseRole !== role && teamRole !== role) return false;
        // IGL filter: only show teams that need an IGL
        if(iglOnly && !hasIgl) return false;
        if(name && !(t.teamName||'').toLowerCase().includes(name)) return false;
        return true;
    });

    document.getElementById('statShowing').textContent = filtered.length;
    const grid = document.getElementById('teamGrid');

    if(!filtered.length){
        grid.innerHTML = `<div class="empty-state"><i class="fas fa-bullhorn"></i><p>No teams match your filters.<br>Try a different role or clear the search.</p></div>`;
        return;
    }

    // Sort: most recently updated first
    filtered.sort((a,b)=> new Date(b.updatedAt||0) - new Date(a.updatedAt||0));
    grid.innerHTML = `<div class="team-grid">${filtered.map(buildCard).join('')}</div>`;
}

function resetFilters(){
    document.getElementById('filtRole').value = '';
    document.getElementById('filtName').value = '';
    const igl = document.getElementById('filtIgl');
    if(igl) igl.checked = false;
    applyFilters();
}

// ── Load all LFP teams ────────────────────────────────────────────────────────
async function loadLfpTeams(){
    // Scan all teams for lfp.active === true
    const teamsSnap = await db.ref('teams').once('value');
    const teamsRaw  = teamsSnap.val()||{};

    const activeLfp = Object.entries(teamsRaw)
        .filter(([,t]) => t?.lfp?.active === true);

    document.getElementById('statTotal').textContent = activeLfp.length;

    if(!activeLfp.length){
        document.getElementById('statShowing').textContent = '0';
        document.getElementById('teamGrid').innerHTML =
            `<div class="empty-state"><i class="fas fa-bullhorn"></i><p>No teams are currently recruiting.<br>Captains can post a listing from <strong>Team Management</strong>.</p></div>`;
        return;
    }

    // Enrich each team with player list + avatars
    const fetches = activeLfp.map(async ([teamId, teamData]) => {
        const lfp      = teamData.lfp||{};
        const teamName = teamData.info?.teamName || teamId;
        const players  = teamData.players||{};

        // Get roster players (inRoster & not coach/analyst)
        const rosterPlayers = Object.entries(players)
            .filter(([,p]) => {
                const role = (p.role||'').toLowerCase();
                return role!=='coach' && role!=='analyst' && p.inRoster!==false && p.inRoster!=='false';
            })
            .map(([uid,p]) => ({uid, displayName:p.displayName||p.username||'?', playRole:p.playRole||''}));

        // Fetch avatars in parallel
        const avatars = {};
        await Promise.all(rosterPlayers.map(p =>
            db.ref(`users/${p.uid}/profile/avatar`).once('value')
              .then(s=>{ if(s.val()) avatars[p.uid]=s.val(); })
              .catch(()=>{})
        ));

        const rawRole  = lfp.role||'';
        const needsIgl = rawRole.includes('igl');
        const baseRole = rawRole.replace('+igl','').replace('igl','');
        return {
            teamId,
            teamName,
            role:         rawRole,
            baseRole,
            needsIgl,
            requirements: lfp.requirements||'',
            updatedAt:    lfp.updatedAt||'',
            players:      rosterPlayers,
            avatars,
            memberCount:  rosterPlayers.length,
        };
    });

    allTeams = await Promise.all(fetches);
    document.getElementById('statTotal').textContent = allTeams.length;
    applyFilters();
}

// ── Auth ──────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
    if(!user || !user.emailVerified){
        window.location.href = 'index_pro.html';
        return;
    }
    await loadLfpTeams();
});

window.applyFilters = applyFilters;
window.resetFilters = resetFilters;

})();
</script>
</body>
</html>
