/* ─── GENERATE ─── */
/* ── Cloudflare Worker URL — update after Worker is deployed ── */
var TEAMSTATS_WORKER_URL = 'https://r6insights-ai.YOUR-SUBDOMAIN.workers.dev/ai';

window.generateAIPDF = async function(){
    if(!_lastStats){ toast('Apply filters first to load stats.','error'); return; }
    $('aiBtn').disabled = true;
    $('aiOutput').innerHTML = `<div class="ai-spin-wrap"><div class="ai-spinner"></div><div style="color:var(--gray);font-size:13px;">Generating report…</div></div>`;
    const pdfBtn = $('pdfBtn');
    if(pdfBtn) pdfBtn.style.display='none';

    try{
        const prompt = buildAIPrompt(_lastStats);
        const res = await fetch(TEAMSTATS_WORKER_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({prompt})
        });
        if(!res.ok){
            const e=await res.json().catch(()=>({}));
            throw new Error(e?.error?.message||`Worker error ${res.status} — have you set up the Cloudflare Worker and updated TEAMSTATS_WORKER_URL?`);
        }
        const data = await res.json();
        const report = data.result || data.content || data.choices?.[0]?.message?.content || 'No response.';

        // Render in page
        renderAIOutput(report);

        // Build PDF
        const doc = buildPDF(_lastStats, report);
        _lastPDFDoc = doc;

        // Auto-download
        const fname = `${(teamName||'Team').replace(/\s+/g,'_')}_R6_Report_${new Date().toISOString().slice(0,10)}.pdf`;
        doc.save(fname);

        // Show re-download button
        if(pdfBtn){ pdfBtn.style.display='inline-flex'; pdfBtn.dataset.fname=fname; }
    }catch(e){
        $('aiOutput').innerHTML=`<div style="padding:20px;color:#fca5a5;font-size:13px;"><i class="fas fa-circle-xmark"></i> ${x(e.message)}</div>`;
    }finally{
        const btn=$('aiBtn');
        if(btn) btn.disabled=false;

    }
};

window.downloadLastPDF = function(){
    if(!_lastPDFDoc){ toast('Generate a report first.','error'); return; }
    const btn=$('pdfBtn');
    const fname=(btn?.dataset?.fname)||`R6_Team_Report.pdf`;
    _lastPDFDoc.save(fname);
};

/* ─── BUILD PROMPT ─── */
function buildAIPrompt(s){
    const wr=s.matchWins+s.matchLosses>0?(s.matchWins/(s.matchWins+s.matchLosses)*100).toFixed(1):0;
    const rwr=s.totalRounds>0?(s.roundWins/s.totalRounds*100).toFixed(1):0;
    const atkPct=s.atkRounds>0?(s.atkWins/s.atkRounds*100).toFixed(1):0;
    const defPct=s.defRounds>0?(s.defWins/s.defRounds*100).toFixed(1):0;

    const mapLines=Object.entries(s.maps)
        .sort((a,b)=>(b[1].atkR+b[1].defR)-(a[1].atkR+a[1].defR))
        .map(([name,ms])=>{
            const pa=ms.pa||{atk:50,def:50};
            const aStr=ms.atkR>0?`${ms.atkPct.toFixed(1)}% (${ms.atkW}/${ms.atkR} rounds, pro avg ${pa.atk.toFixed(1)}%, delta ${ms.atkDelta>=0?'+':''}${ms.atkDelta.toFixed(1)}%)`:'no ATK data';
            const dStr=ms.defR>0?`${ms.defPct.toFixed(1)}% (${ms.defW}/${ms.defR} rounds, pro avg ${pa.def.toFixed(1)}%, delta ${ms.defDelta>=0?'+':''}${ms.defDelta.toFixed(1)}%)`:'no DEF data';
            const sc=ms.mapScore>=0?`+${ms.mapScore.toFixed(1)}`:`${ms.mapScore.toFixed(1)}`;
            return`  ${name}: ATK win% ${aStr} | DEF win% ${dStr} | Map Score: ${sc}`;
        }).join('\n');

    return`You are writing a formal Rainbow Six Siege team performance report. Use ## headings. Be specific and data-driven.

TEAM: ${teamName||'Unknown'}
SAMPLE: ${s.matchWins+s.matchLosses+s.matchDraws} matches, ${s.totalRounds} rounds

MATCH RECORD:
  Record: ${s.matchWins}W - ${s.matchLosses}L - ${s.matchDraws}D | Win Rate: ${wr}%
  Current Streak: ${Math.abs(s.curStreak)}${s.curStreak>0?'W':'L'} | Longest Win Streak: ${s.longestWin}W | Longest Loss Streak: ${s.longestLoss}L

ROUND WIN CONDITIONS (how rounds are won):
  Elimination (killed all): ${s.wcKill} rounds
  Defuser / Plant detonation: ${s.wcDefuse} rounds
  Time Expired (defenders survived): ${s.wcTime} rounds
  Total round wins: ${s.roundWins} | Round win rate: ${rwr}%

ATTACK / DEFENSE SPLIT:
  Attack: ${atkPct}% win rate (${s.atkWins}W / ${s.atkRounds-s.atkWins}L, ${s.atkRounds} rounds)
  Defense: ${defPct}% win rate (${s.defWins}W / ${s.defRounds-s.defWins}L, ${s.defRounds} rounds)

MAP PERFORMANCE vs PRO LEAGUE AVERAGES:
  (positive map score = above pro avg, negative = below)
${mapLines}

Total Map Score: ${s.totalMapScore>=0?'+':''}${s.totalMapScore.toFixed(1)}

Write the report using EXACTLY these sections:

## Executive Summary
(3-4 sentences: overall team performance level, standout strengths, primary weaknesses. Cite win rate, round win rate, map score total.)

## Match Record Analysis
(Analyse the W/L/D record and streaks. Is this a consistent team or volatile? What does the streak data suggest?)

## Win Condition Profile
(What type of team are they? Do they win through kills, defuser, or time? What does the balance between elimination, defuser and time wins say about their playstyle and coordination? Should they adjust?)

## Attack / Defense Assessment
(Compare ATK and DEF win rates. Which side is dominant? Is there a significant weakness on either side that opponents could exploit? Reference exact %.)

## Map-by-Map Analysis
(For EACH map listed above, write 2-3 sentences covering: is it above or below pro avg on ATK and/or DEF, what the map score means, and one specific tactical suggestion — e.g. "Bank ATK is 12% below pro avg — consider focusing hard breach timings and ensuring Thatcher + Thermite combo is consistent". Cover every map. Group the maps into: STRENGTHS (positive score), AREAS TO IMPROVE (negative score).)

## Priority Areas for Improvement
(Top 3-4 concrete, actionable improvements ranked by impact. Be specific: e.g. "Improve Bank ATK execution — currently 35.2% vs 47.7% pro avg" rather than generic advice.)

## Coaching Recommendations
(5-6 bullet points: specific tactical adjustments, strat suggestions, operator recommendations, focus areas for practice. Reference exact stats.)

Be formal, direct, and specific. Quote all stats. Reference exact map names.`;
}

/* ─── RENDER AI OUTPUT IN PAGE ─── */
function renderAIOutput(text){
    const secs=text.split(/\n## /);
    let html='';
    secs.forEach((sec,i)=>{
        if(i===0){
            const s=sec.replace(/^## /,'').trim();
            if(s) html+=`<div class="ai-sec-body" style="margin-bottom:14px;">${mdHtml(s)}</div>`;
            return;
        }
        const nl=sec.indexOf('\n');
        const title=nl>-1?sec.slice(0,nl).trim():sec.trim();
        const body=nl>-1?sec.slice(nl+1).trim():'';
        html+=`<div class="ai-sec">
            <div class="ai-sec-title"><i class="fas fa-chevron-right" style="font-size:9px;opacity:.5;"></i> ${x(title)}</div>
            <div class="ai-sec-body">${mdHtml(body)}</div>
        </div>`;
    });
    $('aiOutput').innerHTML=`<div class="ai-output">
        <div class="ai-report-meta">
            <span class="ai-badge"><i class="fas fa-robot"></i> GPT-4o mini</span>
            <span class="ai-pdf-badge"><i class="fas fa-file-pdf"></i> PDF downloaded</span>
            <span style="font-size:11px;color:var(--gray);">${new Date().toLocaleString()}</span>
        </div>
        ${html}
    </div>`;
}

function mdHtml(t){
    return t
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/^- (.*)/gm,'<li>$1</li>')
        .replace(/((?:<li>[\s\S]*?<\/li>\n?)+)/g,m=>`<ul>${m}</ul>`)
        .replace(/\n{2,}/g,'<br><br>')
        .replace(/\n/g,'<br>');
}

/* ──────────────────────────────────────────────────────────
   PDF GENERATION  (jsPDF + autoTable)
   ────────────────────────────────────────────────────────── */
function buildPDF(s, aiText){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

    const W = doc.internal.pageSize.getWidth();   // 210
    const H = doc.internal.pageSize.getHeight();  // 297
    const ML = 18, MR = 18, MT = 18;
    const CW = W - ML - MR;

    // ── Colours ──
    const C = {
        bg:      [15, 23, 42],
        header:  [30, 41, 59],
        accent:  [124, 58, 237],
        accentL: [167, 139, 250],
        green:   [16, 185, 129],
        red:     [239, 68, 68],
        amber:   [245, 158, 11],
        blue:    [59, 130, 246],
        white:   [248, 250, 252],
        gray:    [100, 116, 139],
        lightGray:[148,163,184],
        rowAlt:  [22, 33, 54],
    };

    // ── Helpers ──
    let cy = MT; // current y cursor

    function addPage(){
        doc.addPage();
        cy = MT;
        drawPageBg();
        drawPageFooter();
    }

    function drawPageBg(){
        doc.setFillColor(...C.bg);
        doc.rect(0, 0, W, H, 'F');
    }

    function drawPageFooter(){
        const pg = doc.internal.getNumberOfPages();
        doc.setFillColor(...C.header);
        doc.rect(0, H-10, W, 10, 'F');
        doc.setFontSize(8);
        doc.setTextColor(...C.gray);
        doc.text(`R6 Analytics Pro — ${teamName||'Team'} Report`, ML, H-3.5);
        doc.text(`Page ${pg}`, W-ML, H-3.5, {align:'right'});
        doc.setTextColor(...C.lightGray);
        doc.text(new Date().toLocaleDateString(), W/2, H-3.5, {align:'center'});
    }

    function checkNewPage(needed=20){
        if(cy + needed > H - 14){ addPage(); return true; }
        return false;
    }

    function sectionTitle(label, icon=''){
        checkNewPage(14);
        doc.setFillColor(...C.header);
        doc.roundedRect(ML, cy, CW, 9, 1.5, 1.5, 'F');
        doc.setDrawColor(...C.accent);
        doc.setLineWidth(0.4);
        doc.line(ML, cy, ML, cy+9);
        doc.setFontSize(9);
        doc.setFont('helvetica','bold');
        doc.setTextColor(...C.accentL);
        doc.text(label.toUpperCase(), ML+5, cy+6);
        cy += 12;
    }

    function kv(label, value, color=C.white){
        checkNewPage(7);
        doc.setFontSize(9);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...C.lightGray);
        doc.text(label, ML+2, cy);
        doc.setFont('helvetica','bold');
        doc.setTextColor(...color);
        doc.text(String(value), ML+70, cy);
        cy += 5.5;
    }

    function bodyText(text, color=C.white, indent=0){
        const maxW = CW - indent - 4;
        doc.setFontSize(9);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...color);
        const lines = doc.splitTextToSize(text, maxW);
        lines.forEach(line=>{
            checkNewPage(6);
            doc.text(line, ML+indent, cy);
            cy += 5;
        });
        cy += 1;
    }

    function bullet(text, color=C.white){
        const maxW = CW - 8;
        doc.setFontSize(9);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...color);
        const lines = doc.splitTextToSize(text, maxW);
        lines.forEach((line,i)=>{
            checkNewPage(6);
            if(i===0){
                doc.setTextColor(...C.accentL);
                doc.text('•', ML+2, cy);
                doc.setTextColor(...color);
                doc.text(line, ML+7, cy);
            } else {
                doc.text(line, ML+7, cy);
            }
            cy += 5;
        });
    }

    function spacer(h=4){ cy += h; }

    // ══════════════════════════════════════════════════════
    //  PAGE 1 — COVER
    // ══════════════════════════════════════════════════════
    drawPageBg();
    drawPageFooter();

    // Purple accent top bar
    doc.setFillColor(...C.accent);
    doc.rect(0, 0, W, 3, 'F');

    // R6 logo badge
    doc.setFillColor(30,41,59);
    doc.roundedRect(ML, MT+2, CW, 52, 4, 4, 'F');
    doc.setDrawColor(...C.accent);
    doc.setLineWidth(0.5);
    doc.roundedRect(ML, MT+2, CW, 52, 4, 4, 'D');

    // Crosshair icon placeholder (circles)
    doc.setFillColor(...C.accent);
    doc.circle(ML+12, MT+28, 5, 'F');
    doc.setFillColor(...C.bg);
    doc.circle(ML+12, MT+28, 3, 'F');
    doc.setFillColor(...C.accent);
    doc.circle(ML+12, MT+28, 1.2, 'F');

    // Title
    doc.setFontSize(22);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...C.accentL);
    doc.text('R6 ANALYTICS PRO', ML+22, MT+23);

    doc.setFontSize(13);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...C.lightGray);
    doc.text('Team Performance Report', ML+22, MT+31);

    doc.setFontSize(11);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...C.white);
    doc.text(teamName||'Team', ML+22, MT+40);

    doc.setFontSize(9);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...C.gray);
    doc.text(`Generated ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`, ML+22, MT+47);

    cy = MT + 64;

    // ── Summary KPI boxes row ──
    const wr=s.matchWins+s.matchLosses>0?(s.matchWins/(s.matchWins+s.matchLosses)*100).toFixed(0):0;
    const rwr=s.totalRounds>0?(s.roundWins/s.totalRounds*100).toFixed(0):0;
    const atkPct=s.atkRounds>0?(s.atkWins/s.atkRounds*100).toFixed(1):0;
    const defPct=s.defRounds>0?(s.defWins/s.defRounds*100).toFixed(1):0;

    const kpis=[
        {label:'Match Record', val:`${s.matchWins}-${s.matchLosses}`,  sub:`${wr}% win rate`, color:C.blue},
        {label:'Round Record', val:`${s.roundWins}-${s.roundLosses}`,  sub:`${rwr}% win rate`, color:C.green},
        {label:'ATK Win%',     val:`${atkPct}%`,                        sub:`${s.atkRounds} rounds`, color:C.red},
        {label:'DEF Win%',     val:`${defPct}%`,                        sub:`${s.defRounds} rounds`, color:C.blue},
        {label:'Map Score',    val:`${s.totalMapScore>=0?'+':''}${s.totalMapScore.toFixed(1)}`, sub:'vs Pro avg', color:s.totalMapScore>=0?C.green:C.red},
    ];

    const bw = (CW - (kpis.length-1)*4) / kpis.length;
    kpis.forEach((k,i)=>{
        const bx = ML + i*(bw+4);
        doc.setFillColor(22,33,54);
        doc.roundedRect(bx, cy, bw, 22, 2, 2, 'F');
        doc.setFillColor(...k.color);
        doc.roundedRect(bx, cy, bw, 2, 1, 1, 'F');
        doc.setFontSize(8);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...C.lightGray);
        doc.text(k.label, bx+bw/2, cy+7, {align:'center'});
        doc.setFontSize(13);
        doc.setFont('helvetica','bold');
        doc.setTextColor(...k.color);
        doc.text(k.val, bx+bw/2, cy+15, {align:'center'});
        doc.setFontSize(7.5);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...C.gray);
        doc.text(k.sub, bx+bw/2, cy+20, {align:'center'});
    });
    cy += 30;

    // ── Win Conditions quick bar ──
    sectionTitle('Win Conditions');
    const wcData=[
        {label:'Elimination',      val:s.wcKill,   color:C.red},
        {label:'Defuser / Plant',  val:s.wcDefuse, color:C.green},
        {label:'Time Expired',     val:s.wcTime,   color:C.amber},
    ];
    const wcTotal = (s.wcKill+s.wcDefuse+s.wcTime)||1;
    wcData.forEach(wc=>{
        checkNewPage(10);
        const pct = (wc.val/wcTotal*100).toFixed(0);
        const barW = (wc.val/wcTotal)*(CW-80);
        doc.setFontSize(8.5);
        doc.setFont('helvetica','normal');
        doc.setTextColor(...C.lightGray);
        doc.text(wc.label, ML+2, cy+3.5);
        doc.setFillColor(22,33,54);
        doc.roundedRect(ML+52, cy, CW-80, 6, 1, 1, 'F');
        doc.setFillColor(...wc.color);
        if(barW>0) doc.roundedRect(ML+52, cy, barW, 6, 1, 1, 'F');
        doc.setFont('helvetica','bold');
        doc.setTextColor(...wc.color);
        doc.text(`${wc.val}  (${pct}%)`, ML+52+(CW-80)+3, cy+4.5);
        cy += 9;
    });
    spacer(4);

    // ── Streaks ──
    sectionTitle('Streaks');
    kv('Current Streak', `${Math.abs(s.curStreak)}${s.curStreak>0?' Win':(s.curStreak<0?' Loss':' —')}`, s.curStreak>0?C.green:(s.curStreak<0?C.red:C.gray));
    kv('Longest Win Streak', `${s.longestWin} wins`, C.amber);
    kv('Longest Loss Streak', `${s.longestLoss} losses`, C.gray);
    spacer(4);

    // ══════════════════════════════════════════════════════
    //  PAGE 2 — MAP BREAKDOWN TABLE
    // ══════════════════════════════════════════════════════
    addPage();
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...C.accentL);
    doc.text('Map Performance vs Pro League Averages', W/2, cy, {align:'center'});
    cy += 10;

    const mapRows = Object.entries(s.maps)
        .sort((a,b)=>(b[1].atkR+b[1].defR)-(a[1].atkR+a[1].defR))
        .map(([name, ms])=>{
            const pa = ms.pa||{atk:50,def:50};
            const atkStr = ms.atkR>0 ? `${ms.atkPct.toFixed(0)}%` : '—';
            const defStr = ms.defR>0 ? `${ms.defPct.toFixed(0)}%` : '—';
            const atkProStr = `${pa.atk.toFixed(0)}%`;
            const defProStr = `${pa.def.toFixed(0)}%`;
            const atkDStr = ms.atkR>0 ? `${ms.atkDelta>=0?'+':''}${ms.atkDelta.toFixed(1)}%` : '—';
            const defDStr = ms.defR>0 ? `${ms.defDelta>=0?'+':''}${ms.defDelta.toFixed(1)}%` : '—';
            const scoreStr = `${ms.mapScore>=0?'+':''}${ms.mapScore.toFixed(1)}`;
            return [name, String(ms.atkR+ms.defR), atkStr, atkProStr, atkDStr, defStr, defProStr, defDStr, scoreStr];
        });

    doc.autoTable({
        startY: cy,
        head: [['Map','Rnds','ATK %','ATK Pro','ATK Δ','DEF %','DEF Pro','DEF Δ','Score']],
        body: mapRows,
        theme: 'plain',
        styles:{
            font:'helvetica', fontSize:8.5, textColor:[...C.white],
            fillColor:[...C.bg], cellPadding:{top:3,right:3,bottom:3,left:3},
            lineWidth:0, overflow:'linebreak',
        },
        headStyles:{
            fillColor:[...C.header], textColor:[...C.accentL],
            fontStyle:'bold', fontSize:8,
        },
        alternateRowStyles:{ fillColor:[...C.rowAlt] },
        columnStyles:{
            0:{fontStyle:'bold', cellWidth:32},
            1:{halign:'center', cellWidth:14},
            2:{halign:'center', cellWidth:16},
            3:{halign:'center', cellWidth:16},
            4:{halign:'center', cellWidth:16},
            5:{halign:'center', cellWidth:16},
            6:{halign:'center', cellWidth:16},
            7:{halign:'center', cellWidth:16},
            8:{halign:'center', cellWidth:16},
        },
        margin:{left:ML, right:MR},
        didParseCell: function(data){
            // Colour ATK/DEF delta columns
            const col = data.column.index;
            const val = data.cell.raw;
            if((col===4||col===7) && data.section==='body'){
                if(typeof val==='string'&&val.startsWith('+')) data.cell.styles.textColor=[...C.green];
                else if(typeof val==='string'&&val.startsWith('-')) data.cell.styles.textColor=[...C.red];
            }
            if(col===8&&data.section==='body'){
                if(typeof val==='string'&&val.startsWith('+')) data.cell.styles.textColor=[...C.green];
                else if(typeof val==='string'&&val.startsWith('-')) data.cell.styles.textColor=[...C.red];
            }
        },
    });

    cy = doc.lastAutoTable.finalY + 8;

    // Map score legend
    doc.setFontSize(8);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...C.gray);
    doc.text('ATK Δ / DEF Δ = your win% minus Pro League average.  +positive = above average  −negative = below average', ML, cy);
    cy += 5;
    doc.text(`Total Map Score: ${s.totalMapScore>=0?'+':''}${s.totalMapScore.toFixed(1)}  (sum of weighted deltas across all maps)`, ML, cy);
    cy += 10;

    // ══════════════════════════════════════════════════════
    //  PAGE 3+ — AI REPORT
    // ══════════════════════════════════════════════════════
    addPage();
    doc.setFontSize(14);
    doc.setFont('helvetica','bold');
    doc.setTextColor(...C.accentL);
    doc.text('AI Scouting Report', W/2, cy, {align:'center'});
    cy += 4;
    doc.setFontSize(8.5);
    doc.setFont('helvetica','normal');
    doc.setTextColor(...C.gray);
    doc.text('Generated by GPT-4o mini · R6 Analytics Pro', W/2, cy+4, {align:'center'});
    cy += 12;

    // Parse ## sections and render
    const sections = aiText.split(/\n## /);
    sections.forEach((sec, i)=>{
        if(i===0){
            const cleaned = sec.replace(/^## /,'').trim();
            if(cleaned) bodyText(cleaned, C.lightGray);
            return;
        }
        const nl  = sec.indexOf('\n');
        const title = nl>-1 ? sec.slice(0,nl).trim() : sec.trim();
        const body  = nl>-1 ? sec.slice(nl+1).trim() : '';
        checkNewPage(18);
        sectionTitle(title);
        if(body){
            // Split body into lines, detect bullets
            const lines = body.split('\n').filter(l=>l.trim());
            lines.forEach(line=>{
                const t = line.trim();
                if(t.startsWith('-')||t.startsWith('•')){
                    bullet(t.replace(/^[-•]\s*/,''), C.lightGray);
                } else if(t.startsWith('For ')&&t.endsWith(':')){
                    checkNewPage(8);
                    doc.setFontSize(9); doc.setFont('helvetica','bold');
                    doc.setTextColor(...C.accentL);
                    doc.text(t, ML+2, cy); cy+=6;
                } else {
                    bodyText(t, C.lightGray, 2);
                }
            });
        }
        spacer(3);
    });

    return doc;
}

function toast(msg,type='success'){
    const t=document.createElement('div');
    t.style.cssText=`position:fixed;bottom:22px;right:22px;padding:11px 17px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;display:flex;align-items:center;gap:7px;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:tin .2s ease;color:white;background:${type==='error'?'rgba(239,68,68,0.95)':'rgba(16,185,129,0.95)'};font-family:'Segoe UI',sans-serif`;
    t.innerHTML=`<i class="fas ${type==='error'?'fa-circle-xmark':'fa-circle-check'}"></i>${msg}`;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
}

})();
</script>
    <script src="../scripts/profile-loader.js"></script>
</body>
</html>
