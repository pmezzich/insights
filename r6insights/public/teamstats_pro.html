<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Stats — R6 Insights</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/pro-global.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="../scripts/firebase-config.js"></script>
    <script src="../scripts/admin-preview.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --primary:#7C3AED; --secondary:#4F46E5;
            --dark:#1E293B; --darker:#0F172A; --light:#F8FAFC; --gray:#94A3B8;
            --success:#10B981; --danger:#EF4444; --warning:#F59E0B; --info:#3B82F6;
            --card-bg:rgba(30,41,59,0.75); --card-border:rgba(255,255,255,0.1);
        }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
        body{
            color:var(--light);min-height:100vh;padding:20px;
            background-image:url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt6577b1f58530e6b2/5eb7cdc165eec876c4b5d0d8/rainbow6siege_bloodmoon_splash.jpg');
            background-size:cover;background-position:center;background-attachment:fixed;
        }
        .container{max-width:1100px;margin:0 auto;background:rgba(15,23,42,0.93);border-radius:16px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.7);border:1px solid var(--card-border);backdrop-filter:blur(14px);}

        /* ── NAV ── */
        .nav-header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;background:rgba(30,41,59,0.9);border-bottom:1px solid var(--card-border);}
        .logo{display:flex;align-items:center;gap:10px;}
        .logo-icon{font-size:22px;color:var(--primary);}
        .logo-text{font-size:19px;font-weight:700;background:linear-gradient(to right,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .nav-badge{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-size:10px;font-weight:700;letter-spacing:1.2px;padding:2px 9px;border-radius:20px;text-transform:uppercase;}
        .nav-right{display:flex;align-items:center;gap:10px;}
        .btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:all .18s;text-decoration:none;font-family:inherit;color:var(--light);}
        .btn:hover{transform:translateY(-1px);}
        .btn-secondary{background:rgba(79,70,229,0.2);border:1px solid var(--secondary);}
        .btn-secondary:hover{background:rgba(79,70,229,0.35);}
        .btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;}
        .btn-primary:hover{opacity:.9;}
        .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;}
        .team-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.4);border-radius:50px;font-size:13px;color:#a78bfa;font-weight:600;}

        /* ── PAGE TITLE ── */
        .page-title{display:flex;align-items:center;gap:14px;padding:18px 28px;background:rgba(15,23,42,0.5);border-bottom:1px solid var(--card-border);}
        .page-title-icon{width:40px;height:40px;border-radius:10px;background:rgba(59,130,246,0.18);border:1px solid rgba(59,130,246,0.3);display:flex;align-items:center;justify-content:center;font-size:17px;color:#60a5fa;flex-shrink:0;}
        .page-title h2{font-size:17px;font-weight:700;}
        .page-title p{font-size:12px;color:var(--gray);margin-top:2px;}

        /* ── CONTENT ── */
        .content{padding:20px 24px;display:flex;flex-direction:column;gap:18px;}

        /* ── FILTERS ── */
        
/* ── MULTI-SELECT DROPDOWN ── */
.ms-wrap{position:relative;display:inline-block;min-width:160px;width:100%;}
.ms-btn{width:100%;padding:10px 32px 10px 12px;border-radius:8px;border:1px solid var(--card-border);background:rgba(10,16,28,0.85);color:var(--light);font-size:13px;font-family:inherit;cursor:pointer;text-align:left;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border-color .2s;}
.ms-btn:hover,.ms-btn.open{border-color:var(--primary);}
.ms-btn::after{content:'\\f078';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;transition:transform .2s;}
.ms-btn.open::after{transform:translateY(-50%) rotate(180deg);}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:100%;width:max-content;max-width:280px;background:rgba(15,23,42,0.98);border:1px solid rgba(124,58,237,0.4);border-radius:8px;padding:6px 0;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);max-height:240px;overflow-y:auto;}
.ms-dropdown.open{display:block;}
.ms-item{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background .12s;}
.ms-item:hover{background:rgba(124,58,237,0.12);}
.ms-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.ms-item label{cursor:pointer;flex:1;white-space:nowrap;}
.ms-sep{height:1px;background:var(--card-border);margin:4px 0;}
.ms-clear{padding:7px 12px;font-size:11px;color:rgba(148,163,184,0.5);cursor:pointer;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ms-clear:hover{color:#a78bfa;}

        .filter-panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px 18px;}
        .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
        .fg{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px;}
        .fl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);}
        .fi{padding:9px 12px;border-radius:8px;border:1px solid var(--card-border);background:rgba(10,16,28,0.85);color:var(--light);font-size:13px;font-family:inherit;transition:border-color .2s;}
        .fi:focus{outline:none;border-color:var(--primary);}
        .match-count{font-size:12px;color:var(--gray);display:flex;align-items:center;gap:5px;margin-top:10px;}

        /* ── KPI STRIP ── */
        .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;}
        .kpi-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px 16px 14px;position:relative;overflow:hidden;}
        .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
        .kc-blue::before  {background:linear-gradient(to right,#3B82F6,#60a5fa);}
        .kc-green::before {background:linear-gradient(to right,#10B981,#34d399);}
        .kc-purple::before{background:linear-gradient(to right,#7C3AED,#a78bfa);}
        .kc-amber::before {background:linear-gradient(to right,#F59E0B,#fbbf24);}
        .kc-gray::before  {background:linear-gradient(to right,#475569,#94A3B8);}
        .kpi-icon{font-size:13px;margin-bottom:8px;display:block;}
        .kc-blue   .kpi-icon{color:#60a5fa;}
        .kc-green  .kpi-icon{color:#34d399;}
        .kc-purple .kpi-icon{color:#a78bfa;}
        .kc-amber  .kpi-icon{color:#fbbf24;}
        .kc-gray   .kpi-icon{color:var(--gray);}
        .kpi-val{font-size:26px;font-weight:800;line-height:1;margin-bottom:2px;}
        .kc-blue   .kpi-val{color:#60a5fa;}
        .kc-green  .kpi-val{color:#34d399;}
        .kc-purple .kpi-val{color:#a78bfa;}
        .kc-amber  .kpi-val{color:#fbbf24;}
        .kc-gray   .kpi-val{color:var(--gray);}
        .kpi-lbl{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
        .kpi-sub{font-size:11px;color:rgba(148,163,184,0.6);margin-top:3px;}
        .kpi-tbd{font-size:10px;color:rgba(148,163,184,0.4);font-style:italic;}

        /* ── 2-COL GRID ── */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

        /* ── PANEL ── */
        .panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;}
        .panel-hdr{padding:13px 16px;border-bottom:1px solid var(--card-border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
        .panel-body{padding:16px;}

        /* ── WIN CONDITIONS ── */
        .wc-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
        .wc-row:last-child{margin-bottom:0;}
        .wc-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
        .wci-kill  {background:rgba(239,68,68,0.15); color:#f87171;border:1px solid rgba(239,68,68,0.3);}
        .wci-def   {background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
        .wci-time  {background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
        .wci-loss  {background:rgba(148,163,184,0.1);color:var(--gray);border:1px solid var(--card-border);}
        .wc-info{flex:1;}
        .wc-label{font-size:13px;font-weight:700;margin-bottom:4px;}
        .wc-bar-wrap{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;margin-bottom:3px;}
        .wc-bar{height:100%;border-radius:3px;transition:width .5s ease;}
        .wc-bar.bk{background:linear-gradient(to right,#f87171,#ef4444);}
        .wc-bar.bd{background:linear-gradient(to right,#34d399,#10B981);}
        .wc-bar.bt{background:linear-gradient(to right,#fbbf24,#F59E0B);}
        .wc-bar.bl{background:rgba(148,163,184,0.3);}
        .wc-nums{font-size:11px;color:var(--gray);}
        .wc-count{font-size:20px;font-weight:800;min-width:36px;text-align:right;}

        /* ── ATK/DEF SPLIT ── */
        .split-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .split-card{border-radius:10px;padding:14px;text-align:center;}
        .split-atk{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);}
        .split-def{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.25);}
        .split-icon{font-size:20px;margin-bottom:6px;display:block;}
        .split-atk .split-icon{color:#f87171;}
        .split-def .split-icon{color:#60a5fa;}
        .split-pct{font-size:28px;font-weight:800;margin-bottom:2px;}
        .split-atk .split-pct{color:#f87171;}
        .split-def .split-pct{color:#60a5fa;}
        .split-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:700;}
        .split-detail{font-size:11px;color:var(--gray);margin-top:4px;}
        .split-bar-wrap{height:8px;border-radius:4px;background:rgba(255,255,255,0.05);overflow:hidden;margin-top:12px;display:flex;}
        .split-bar-atk{background:linear-gradient(to right,rgba(239,68,68,0.7),rgba(239,68,68,0.3));transition:width .5s ease;}
        .split-bar-def{background:linear-gradient(to left,rgba(59,130,246,0.7),rgba(59,130,246,0.3));transition:width .5s ease;}

        /* ── STREAKS ── */
        .streak-row{display:flex;gap:10px;}
        .streak-card{flex:1;border-radius:10px;padding:14px;text-align:center;}
        .streak-cur {background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.25);}
        .streak-long{background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.25);}
        .streak-val{font-size:32px;font-weight:800;margin-bottom:2px;}
        .streak-cur  .streak-val{color:#a78bfa;}
        .streak-long .streak-val{color:#fbbf24;}
        .streak-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:700;}
        .streak-sub{font-size:11px;color:var(--gray);margin-top:4px;}
        .streak-neg{color:#f87171 !important;}

        /* ── ROUND WINS BREAKDOWN ── */
        .rw-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:10px;}
        .rw-row:last-child{margin-bottom:0;}
        .rw-val-l{font-size:15px;font-weight:800;color:#34d399;}
        .rw-val-r{font-size:15px;font-weight:800;color:#f87171;text-align:right;}
        .rw-bar-center{height:6px;border-radius:3px;background:rgba(255,255,255,0.05);overflow:hidden;display:flex;}
        .rw-fill-l{background:linear-gradient(to right,rgba(52,211,153,0.8),rgba(52,211,153,0.4));border-radius:3px 0 0 3px;transition:width .4s;}
        .rw-fill-r{background:linear-gradient(to left,rgba(248,113,113,0.8),rgba(248,113,113,0.4));border-radius:0 3px 3px 0;transition:width .4s;}
        .rw-center-lbl{font-size:9px;color:rgba(148,163,184,0.45);text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}

        /* ── MAP SCORE TABLE ── */
        .map-toggle{display:flex;gap:6px;margin-bottom:14px;}
        .map-toggle-btn{padding:6px 14px;border-radius:7px;border:1px solid var(--card-border);background:rgba(15,23,42,0.5);color:var(--gray);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;}
        .map-toggle-btn.active{background:rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.5);color:#a78bfa;}
        .map-table{width:100%;border-collapse:collapse;font-size:12px;}
        .map-table th{text-align:left;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(148,163,184,0.4);padding:8px 12px 6px;border-bottom:1px solid rgba(255,255,255,0.07);}
        .map-table th.right{text-align:right;}
        .map-table th.center{text-align:center;}
        .map-table td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);}
        .map-table tr:last-child td{border-bottom:none;}
        .map-table tr:hover td{background:rgba(255,255,255,0.02);}
        .map-name-td{font-weight:700;color:var(--light);}
        .td-c{text-align:center;}
        .td-r{text-align:right;}
        .above{color:#34d399;font-weight:700;}
        .below{color:#f87171;font-weight:700;}
        .neutral{color:var(--gray);}
        .score-pill{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;display:inline-block;}
        .score-pos{background:rgba(16,185,129,0.15);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
        .score-neg{background:rgba(239,68,68,0.15); color:#f87171;border:1px solid rgba(239,68,68,0.3);}
        .score-neu{background:rgba(148,163,184,0.1);color:var(--gray);border:1px solid var(--card-border);}
        .pro-avg{color:rgba(148,163,184,0.45);font-size:10px;}

        /* expandable per-map row */
        .map-row-main{cursor:pointer;}
        .map-expand-row{display:none;}
        .map-expand-row.open{display:table-row;}
        .map-expand-cell{padding:0!important;}
        .map-expand-inner{background:rgba(10,16,28,0.5);border-radius:8px;margin:4px 12px 10px;padding:12px 14px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
        .me-block{}
        .me-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:rgba(148,163,184,0.4);margin-bottom:8px;}
        .me-stat-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:12px;}
        .me-stat-row:last-child{margin-bottom:0;}
        .me-stat-lbl{color:var(--gray);}
        .me-stat-val{font-weight:700;}
        .pro-badge{padding:1px 6px;border-radius:4px;font-size:9px;background:rgba(79,70,229,0.2);color:#818cf8;border:1px solid rgba(79,70,229,0.3);}
        .chevron{transition:transform .2s;display:inline-block;font-size:10px;color:var(--gray);}
        .chevron.open{transform:rotate(90deg);}

        /* ── TOTAL MAP SCORE ── */
        .map-score-total{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(15,23,42,0.5);border-top:1px solid var(--card-border);border-radius:0 0 12px 12px;}
        .mst-lbl{font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
        .mst-val{font-size:20px;font-weight:800;}

        /* ── LOADING / EMPTY ── */
        #loadingOverlay{position:fixed;inset:0;background:rgba(10,16,30,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
        #loadingOverlay.hidden{display:none;}
        .spinner{width:42px;height:42px;border:3px solid rgba(124,58,237,0.15);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .spinner-text{color:var(--gray);font-size:14px;}
        .empty-state{text-align:center;padding:50px 20px;color:var(--gray);}
        .empty-state i{font-size:44px;margin-bottom:12px;display:block;color:rgba(59,130,246,0.3);}

        @media(max-width:800px){
            body{padding:10px;}.content{padding:12px;}.nav-header,.page-title{padding:14px 16px;}
            .kpi-strip{grid-template-columns:repeat(3,1fr);}
            .two-col,.three-col{grid-template-columns:1fr;}
            .tr-grid-header{grid-template-columns:160px 1fr 44px 52px;gap:6px;}
            .tr-row{grid-template-columns:160px 1fr 44px 52px;gap:6px;}
            .tr-hero{flex-direction:column;align-items:flex-start;gap:12px;}
        }
        @media(max-width:500px){
            .kpi-strip{grid-template-columns:1fr 1fr;}
            .tr-grid-header,.tr-row{grid-template-columns:1fr 1fr 44px 52px;gap:6px;}
            .tr-hero-rating{font-size:36px;}
        }

        /* ── TEAM RATING BREAKDOWN ── */
        .tr-hero{display:flex;align-items:center;gap:20px;padding:20px 20px 16px;border-bottom:1px solid var(--card-border);}
        .tr-hero-left{display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .tr-hero-rating{font-size:48px;font-weight:900;line-height:1;}
        .tr-hero-grade{font-size:18px;font-weight:800;padding:4px 12px;border-radius:8px;line-height:1.2;}
        .tr-hero-right{flex:1;}
        .tr-hero-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--gray);margin-bottom:4px;}
        .tr-hero-desc{font-size:13px;color:rgba(248,250,252,0.8);line-height:1.4;}
        .tr-hero-warn{margin-top:8px;font-size:11px;color:rgba(245,158,11,0.7);display:flex;align-items:center;gap:6px;}

        .tr-grid{padding:12px 16px 16px;}
        .tr-grid-header{display:grid;grid-template-columns:200px 1fr 50px 60px;gap:10px;align-items:center;padding:0 4px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(148,163,184,0.35);border-bottom:1px solid rgba(255,255,255,0.04);margin-bottom:6px;}
        .tr-row{display:grid;grid-template-columns:200px 1fr 50px 60px;gap:10px;align-items:center;padding:8px 4px;border-radius:6px;transition:background .15s;}
        .tr-row:hover{background:rgba(255,255,255,0.02);}
        .tr-meta{display:flex;align-items:center;gap:10px;}
        .tr-icon-wrap{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;border:1px solid;flex-shrink:0;}
        .tr-label{font-size:12px;font-weight:700;color:var(--light);}
        .tr-raw{font-size:10px;color:rgba(148,163,184,0.5);margin-top:1px;}
        .tr-bar-area{padding:0 4px;}
        .tr-bar-track{height:6px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;}
        .tr-bar-fill{height:100%;border-radius:3px;transition:width .6s ease;}
        .tr-score{font-size:16px;font-weight:800;text-align:right;}
        .tr-contrib{font-size:11px;color:rgba(148,163,184,0.5);text-align:right;font-weight:600;}
        /* ── AI REPORT PANEL ── */
        .ai-panel{background:var(--card-bg);border:1px solid rgba(124,58,237,0.35);border-radius:12px;overflow:hidden;}
        .ai-panel-hdr{padding:16px 20px;background:rgba(124,58,237,0.1);border-bottom:1px solid rgba(124,58,237,0.22);display:flex;align-items:center;gap:12px;}

<script>
(function(){
'use strict';

/* ══════════════════════════════════════════════════════════
   PRO LEAGUE AVERAGES  (Attack win% / Defense win%)
   Source: Pro League historical data
   When team beats these averages they earn map score points.
   When below, they lose map score points.
   ══════════════════════════════════════════════════════════ */
const PRO_AVG = {
    'Bank':             { atk: 47.72, def: 52.28 },
    'Border':           { atk: 48.10, def: 51.90 },
    'Chalet':           { atk: 49.37, def: 50.63 },
    'Club House':       { atk: 44.66, def: 55.34 },
    'Clubhouse':        { atk: 44.66, def: 55.34 }, // alias
    'Coastline':        { atk: 50.59, def: 49.41 },
    'Consulate':        { atk: 44.81, def: 55.19 },
    'Kafe Dostoyevsky': { atk: 43.45, def: 56.55 },
    'Kafe':             { atk: 43.45, def: 56.55 }, // alias
    'Oregon':           { atk: 44.48, def: 55.52 },
    'Villa':            { atk: 43.19, def: 56.81 },
    'Theme Park':       { atk: 39.37, def: 60.63 },
    'Skyscraper':       { atk: 40.07, def: 59.93 },
    'Nighthaven Labs':  { atk: 42.74, def: 57.26 },
    'Nighthaven':       { atk: 42.74, def: 57.26 }, // alias
    'Lair':             { atk: 47.00, def: 53.00 }, // estimated — update when data available
    'Stadium Bravo':    { atk: 50.00, def: 50.00 }, // estimated
    'Emerald Plains':   { atk: 46.00, def: 54.00 }, // estimated
    'Close Quarter':    { atk: 48.00, def: 52.00 }, // estimated
};

/* ══════════════════════════════════════════════════════════
   FIREBASE
   ══════════════════════════════════════════════════════════ */
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();


/* ── Multi-select helper ── */
function buildMultiSelect(wrapperId, btnId, dropId, options, placeholder) {
    var wrap = document.getElementById(wrapperId);
    if (!wrap) return;
    var btn  = document.getElementById(btnId);
    var drop = document.getElementById(dropId);
    if (!btn || !drop) return;
    drop.innerHTML = '<div class="ms-clear" onclick="clearMultiSelect(&quot;'+dropId+'&quot;,&quot;'+btnId+'&quot;,&quot;'+placeholder+'&quot;)">Clear selection</div><div class="ms-sep"></div>';
    options.forEach(function(opt) {
        var item = document.createElement('div');
        item.className = 'ms-item';
        var safeOpt = opt.replace(/"/g,'&quot;');
        var id = 'ms_'+dropId+'_'+opt.replace(/[^a-z0-9]/gi,'_');
        item.innerHTML = '<input type="checkbox" id="'+id+'" value="'+safeOpt+'"><label for="'+id+'">'+opt+'</label>';
        drop.appendChild(item);
    });
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        drop.classList.toggle('open');
        btn.classList.toggle('open');
    });
    drop.addEventListener('change', function() { updateMultiSelectLabel(btnId, dropId, placeholder); });
    document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) { drop.classList.remove('open'); btn.classList.remove('open'); }
    });
}
function getMultiSelectValues(dropId) {
    var drop = document.getElementById(dropId);
    if (!drop) return [];
    return Array.from(drop.querySelectorAll('input[type=checkbox]:checked')).map(function(cb){ return cb.value; });
}
function updateMultiSelectLabel(btnId, dropId, placeholder) {
    var vals = getMultiSelectValues(dropId);
    var btn  = document.getElementById(btnId);
    if (!btn) return;
    if (vals.length === 0) btn.textContent = placeholder;
    else if (vals.length === 1) btn.textContent = vals[0];
    else btn.textContent = vals.length+' selected';
}
function clearMultiSelect(dropId, btnId, placeholder) {
    var drop = document.getElementById(dropId);
    if (drop) drop.querySelectorAll('input[type=checkbox]').forEach(function(cb){ cb.checked=false; });
    var btn = document.getElementById(btnId);
    if (btn) btn.textContent = placeholder;
}

let teamId=null, allMatches=[], teamName='';
const $=id=>document.getElementById(id);
const x=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ─── AUTH ─── */
auth.onAuthStateChanged(async user=>{
    if(!user) return(window.location.href='index_pro.html');
    if(!user.emailVerified) return(window.location.href='index_pro.html');
    try{
        setLoading('Checking session…');
        teamId=await getPreviewTeamId(user, db);
        if(!teamId) throw new Error('No team found.');
        const tn=await db.ref(`teams/${teamId}/info/teamName`).once('value');
        teamName=tn.val()||'';
        $('teamNamePill').textContent=teamName||teamId;
        setLoading('Loading matches…');
        await loadMatches();
        populateFilters();
        applyFilters();
    }catch(e){showErr('Failed to load: '+e.message);}
    finally{hideLoading();}
});

async function loadMatches(){
    const snap=await db.ref(`teams/${teamId}/matches_pro`).once('value');
    const raw=snap.val()||{};
    allMatches=Object.entries(raw).map(([id,m])=>{
        let maps=m.maps;
        if(!maps) maps=[];
        else if(!Array.isArray(maps)) maps=Object.values(maps);
        return{id,...m,maps,ts:new Date(m.timestamp||m.date||0).getTime()};
    }).sort((a,b)=>a.ts-b.ts); // oldest first for streak calculation
}

function populateFilters(){
    const opps=[...new Set(allMatches.map(m=>m.opponent).filter(Boolean))].sort();
    buildMultiSelect('oppWrap','oppBtn','oppDrop',opps,'All Opponents');
}

/* ─── APPLY FILTERS & RENDER ─── */
window.applyFilters=function(){
    let matches=[...allMatches];
    const n=parseInt($('filtN').value)||0;
    const from=$('filtFrom').value;
    const to=$('filtTo').value;
    const typ=$('filtType')?$('filtType').value:'';
    const oppSels=getMultiSelectValues('oppDrop');
    if(oppSels.length>0) matches=matches.filter(m=>oppSels.includes(m.opponent));
    if(typ) matches=matches.filter(m=>(m.matchType||'scrim')===typ);
    if(from){const fd=new Date(from).getTime(); matches=matches.filter(m=>m.ts>=fd);}
    if(to)  {const td=new Date(to).getTime()+86399000; matches=matches.filter(m=>m.ts<=td);}
    // n = last N (take from end since sorted ascending)
    if(n) matches=matches.slice(-n);

    const stats=compute(matches);
    $('matchCountBar').style.display='flex';
    $('matchCountText').textContent=`${matches.length} matches · ${stats.totalRounds} rounds total`;
    _lastStats = stats;
    render(stats);
};

/* ══════════════════════════════════════════════════════════
   COMPUTE  — walk all matches → maps → rounds
   ══════════════════════════════════════════════════════════ */
function normRounds(map){
    if(!map.rounds) return[];
    const arr=Array.isArray(map.rounds)?map.rounds:Object.values(map.rounds);
    return arr.filter(Boolean).sort((a,b)=>parseInt(a.roundNumber||a.round||0)-parseInt(b.roundNumber||b.round||0));
}

/* Determine win condition for OUR team from round data.
   Priority:
   1. r.teams[ourIdx].winCondition  (if FinalVersion saved teams array)
   2. r.winCondition  (if saved directly)
   3. Infer from events: defuse/plant events + round outcome
   Returns: 'kill' | 'defuse' | 'time' | 'loss' | 'unknown'
*/
function getWinCondition(r, won){
    if(!won) return 'loss';

    // 1 — teams array saved with winCondition
    if(Array.isArray(r.teams)){
        const idx=r.yourTeamIndex??0;
        const t=r.teams[idx];
        if(t?.winCondition){
            const wc=t.winCondition;
            if(/kill/i.test(wc)||/elim/i.test(wc)||/opponent/i.test(wc)) return'kill';
            if(/defus/i.test(wc)||/disabl/i.test(wc))                    return'defuse';
            if(/detonat/i.test(wc)||/bomb/i.test(wc)||/plant/i.test(wc)) return'defuse';
            if(/time/i.test(wc)||/expire/i.test(wc)||/timer/i.test(wc))  return'time';
        }
        // Try winning team (any team with won===true)
        const winT=r.teams.find(t=>t?.won===true);
        if(winT?.winCondition){
            const wc=winT.winCondition;
            if(/kill/i.test(wc)||/opponent/i.test(wc)) return'kill';
            if(/defus/i.test(wc)||/disabl/i.test(wc))  return'defuse';
            if(/detonat/i.test(wc)||/bomb/i.test(wc))   return'defuse';
            if(/time/i.test(wc)||/expire/i.test(wc))    return'time';
        }
    }

    // 2 — winCondition saved directly on round
    if(r.winCondition){
        const wc=r.winCondition;
        if(/kill/i.test(wc)||/opponent/i.test(wc)) return'kill';
        if(/defus/i.test(wc)||/disabl/i.test(wc))  return'defuse';
        if(/detonat/i.test(wc)||/bomb/i.test(wc))   return'defuse';
        if(/time/i.test(wc)||/expire/i.test(wc))    return'time';
    }

    // 3 — infer from events
    const evs=Array.isArray(r.events)?r.events:[];
    const side=(r.yourRole||'').toLowerCase();
    const hasDefuse=evs.some(e=>(e.type||'').toLowerCase()==='defuse');
    const hasPlant =evs.some(e=>(e.type||'').toLowerCase()==='plant');
    const killEvs  =evs.filter(e=>(e.type||'').toLowerCase()==='kill');
    const allKilled=killEvs.length>=5; // rough: 5 kills means all opponents dead

    if(side.includes('defen')||side==='def'){
        // Defender wins
        if(hasDefuse) return'defuse'; // they defused
        if(allKilled) return'kill';
        // no plant ever happened → time or kill
        if(!hasPlant) return 'kill'; // if no plant, either kill or time
        return'time'; // plant happened but wasn't defused and round ended → time ran out? or kill. default time
    } else {
        // Attacker wins
        if(hasPlant)  return'defuse'; // planted = bomb detonation win
        if(allKilled) return'kill';
        return'kill';
    }
}

function isWin(r){
    const o=(r.outcome||'').toLowerCase();
    return o==='win'||o==='won'||o.startsWith('won');
}

function roundSide(r,map){
    const rl=(r.yourRole||'').toLowerCase();
    if(rl.includes('attack')||rl==='atk') return'atk';
    if(rl.includes('defen')||rl==='def')  return'def';
    if(Array.isArray(r.teams)){
        const t=r.teams[r.yourTeamIndex??0];
        const tr=(t?.role||t?.name||'').toLowerCase();
        if(tr.includes('attack')) return'atk';
        if(tr.includes('defen'))  return'def';
    }
    const n=parseInt(r.roundNumber||r.round||0);
    const sd=(map.startingSide||'').toLowerCase();
    if(n<=6)  return sd==='attack'?'atk':'def';
    if(n<=12) return sd==='attack'?'def':'atk';
    return((n-12)%2===1)?'atk':'def';
}

function compute(matches){
    const s={
        matchWins:0, matchLosses:0, matchDraws:0,
        totalRounds:0, roundWins:0, roundLosses:0,
        wcKill:0, wcDefuse:0, wcTime:0,    // round wins by condition
        atkRounds:0, atkWins:0,
        defRounds:0, defWins:0,
        maps:{},          // mapName → {atkR,atkW,defR,defW}
        matchList:[],     // [{won,date,opponent}] for streak

        /* ── TEAM RATING metrics ── */
        teamKills:0, teamDeaths:0,           // aggregate K/D
        roundsWithEvents:0,                   // rounds that have event data
        openingDuelWins:0, openingDuelTotal:0, // first blood
        atkPlantRounds:0, atkPlantSuccess:0,   // attack plant rate
        defDenyRounds:0, defDenySuccess:0,     // defense plant denial
        clutchSituations:0, clutchWins:0,      // 1vX situations
        survivalTotalSlots:0, survivalAlive:0, // per-player-per-round survival
        ratingPerMatch:[],                     // per-match rating for sparkline
    };

    /* Helper: identify our players from round data */
    function getOurPlayers(r){
        const ours=new Set();
        // Primary: use players array with teamIndex===0 — most reliable
        if(Array.isArray(r.players)){
            r.players.forEach(p=>{
                if(p&&(p.teamIndex===0||p.teamIndex==='0')){
                    // Add nameKey (sanitized), name/username (original), and dot-decoded variant
                    const nk=(p.nameKey||'').toLowerCase().trim();
                    const nm=(p.name||p.username||'').toLowerCase().trim();
                    const decoded=nk.replace(/\(dot\)/gi,'.').replace(/\(hash\)/gi,'#');
                    if(nk) ours.add(nk);
                    if(nm) ours.add(nm);
                    if(decoded) ours.add(decoded);
                }
            });
        }
        // Also check playerTeams / alias for extra name coverage
        const alias=r.playerTeamsAlias||{};
        const pt=r.playerTeams||{};
        Object.entries(pt).forEach(([key,team])=>{
            if(/your|team.*0|^0$/i.test(String(team))){
                const k=key.toLowerCase().trim();
                const orig=(alias[key]||'').toLowerCase().trim();
                const decoded=k.replace(/\(dot\)/gi,'.').replace(/\(hash\)/gi,'#');
                if(k) ours.add(k);
                if(orig) ours.add(orig);
                if(decoded) ours.add(decoded);
            }
        });
        return ours;
    }

    function getEnemyPlayers(r){
        const enemies=new Set();
        if(Array.isArray(r.players)){
            r.players.forEach(p=>{
                if(p&&(p.teamIndex===1||p.teamIndex==='1')){
                    const nk=(p.nameKey||'').toLowerCase().trim();
                    const nm=(p.name||p.username||'').toLowerCase().trim();
                    const decoded=nk.replace(/\(dot\)/gi,'.').replace(/\(hash\)/gi,'#');
                    if(nk) enemies.add(nk);
                    if(nm) enemies.add(nm);
                    if(decoded) enemies.add(decoded);
                }
            });
        }
        const alias=r.playerTeamsAlias||{};
        const pt=r.playerTeams||{};
        Object.entries(pt).forEach(([key,team])=>{
            if(/enemy|opponent|team.*1|^1$/i.test(String(team))){
                const k=key.toLowerCase().trim();
                const orig=(alias[key]||'').toLowerCase().trim();
                const decoded=k.replace(/\(dot\)/gi,'.').replace(/\(hash\)/gi,'#');
                if(k) enemies.add(k);
                if(orig) enemies.add(orig);
                if(decoded) enemies.add(decoded);
            }
        });
        return enemies;
    }

    matches.forEach(match=>{
        let mapsArr=match.maps;
        let matchMapWins=0, matchMapLosses=0;

        mapsArr.forEach(map=>{
            const mapName=(map.mapName||'Unknown').trim();
            if(!s.maps[mapName]) s.maps[mapName]={atkR:0,atkW:0,defR:0,defW:0};

            const rounds=normRounds(map);
            rounds.forEach(r=>{
                const won=isWin(r);
                const sd=roundSide(r,map);
                s.totalRounds++;
                if(won) s.roundWins++; else s.roundLosses++;

                // Win condition (only counted for won rounds)
                const wc=getWinCondition(r,won);
                if(won){
                    if(wc==='kill')   s.wcKill++;
                    if(wc==='defuse') s.wcDefuse++;
                    if(wc==='time')   s.wcTime++;
                }

                // ATK/DEF
                if(sd==='atk'){s.atkRounds++;if(won)s.atkWins++;}
                else          {s.defRounds++;if(won)s.defWins++;}

                // Per-map
                if(sd==='atk'){s.maps[mapName].atkR++;if(won)s.maps[mapName].atkW++;}
                else          {s.maps[mapName].defR++;if(won)s.maps[mapName].defW++;}

                /* ── EVENT-BASED METRICS ── */
                const evs=Array.isArray(r.events)?r.events:[];
                const killEvs=evs.filter(e=>(e.type||'').toLowerCase()==='kill');
                if(!killEvs.length) return; // no events → skip advanced metrics

                s.roundsWithEvents++;
                const ours=getOurPlayers(r);
                const enemies=getEnemyPlayers(r);

                // Team K/D from events
                killEvs.forEach(ev=>{
                    const killer=(ev.username||ev.user||ev.actor||'').toLowerCase().trim();
                    const victim=(ev.target||ev.victim||'').toLowerCase().trim();
                    if(ours.has(killer)&&!ours.has(victim)) s.teamKills++;
                    if(enemies.has(killer)&&ours.has(victim)) s.teamDeaths++;
                });

                // Survival: count our players who died this round
                const ourDeadThisRound=new Set();
                killEvs.forEach(ev=>{
                    const victim=(ev.target||ev.victim||'').toLowerCase().trim();
                    if(ours.has(victim)) ourDeadThisRound.add(victim);
                });
                const ourPlayerCount=ours.size||5;
                s.survivalTotalSlots+=ourPlayerCount;
                s.survivalAlive+=(ourPlayerCount-ourDeadThisRound.size);

                // Opening duel: first kill of the round
                const sortedKills=[...killEvs].sort((a,b)=>
                    (parseFloat(a.timeInSeconds||a.timestamp||0))-(parseFloat(b.timeInSeconds||b.timestamp||0))
                );
                if(sortedKills.length>0){
                    const firstKill=sortedKills[0];
                    const fkKiller=(firstKill.username||firstKill.user||firstKill.actor||'').toLowerCase().trim();
                    s.openingDuelTotal++;
                    if(ours.has(fkKiller)) s.openingDuelWins++;
                }

                // Plant discipline
                const plantEvs=evs.filter(e=>(e.type||'').toLowerCase()==='plant'||
                                              (e.type||'').toLowerCase()==='bomb_planted'||
                                              (e.type||'').toLowerCase()==='defuserplantstart');
                if(sd==='atk'){
                    s.atkPlantRounds++;
                    if(plantEvs.length>0) s.atkPlantSuccess++;
                }
                if(sd==='def'){
                    s.defDenyRounds++;
                    if(plantEvs.length===0) s.defDenySuccess++; // no plant = denied
                }

                // 1vX clutch detection: count kills chronologically to find
                // moments where our team was outnumbered and still won
                if(won){
                    let ourAlive=ourPlayerCount, enemyAlive=enemies.size||5;
                    let wasDisadvantaged=false;
                    sortedKills.forEach(ev=>{
                        const killer=(ev.username||ev.user||ev.actor||'').toLowerCase().trim();
                        const victim=(ev.target||ev.victim||'').toLowerCase().trim();
                        if(ours.has(victim))  ourAlive--;
                        if(enemies.has(victim)) enemyAlive--;
                        if(ourAlive>0 && ourAlive<enemyAlive) wasDisadvantaged=true;
                    });
                    if(wasDisadvantaged){
                        s.clutchSituations++;
                        s.clutchWins++; // they won while disadvantaged
                    }
                }
                if(!won){
                    // Check if enemy was disadvantaged (we were up) = we lost a 1vX (bad)
                    let ourAlive=ourPlayerCount, enemyAlive=enemies.size||5;
                    sortedKills.forEach(ev=>{
                        const killer=(ev.username||ev.user||ev.actor||'').toLowerCase().trim();
                        const victim=(ev.target||ev.victim||'').toLowerCase().trim();
                        if(ours.has(victim))  ourAlive--;
                        if(enemies.has(victim)) enemyAlive--;
                    });
                    // If at any point enemy was outnumbered but won → we lost a clutchable situation
                    let oA2=ourPlayerCount, eA2=enemies.size||5;
                    let enemyWasDown=false;
                    sortedKills.forEach(ev=>{
                        const killer=(ev.username||ev.user||ev.actor||'').toLowerCase().trim();
                        const victim=(ev.target||ev.victim||'').toLowerCase().trim();
                        if(ours.has(victim))  oA2--;
                        if(enemies.has(victim)) eA2--;
                        if(eA2>0 && eA2<oA2) enemyWasDown=true;
                    });
                    if(enemyWasDown) s.clutchSituations++; // they clutched against us (we lost)
                }
            });

            // Map win/loss (more rounds won on this map)
            if(map.teamScore>map.opponentScore) matchMapWins++;
            else if(map.teamScore<map.opponentScore) matchMapLosses++;
        });

        // Match result: win if majority of maps won, loss if majority lost, draw otherwise
        const isMatchWin  = matchMapWins > matchMapLosses;
        const isMatchLoss = matchMapLosses > matchMapWins;
        if(isMatchWin)       s.matchWins++;
        else if(isMatchLoss) s.matchLosses++;
        else                 s.matchDraws++;

        s.matchList.push({won:isMatchWin,date:match.ts,opponent:match.opponent||'?'});
    });

    // Streaks  (matchList is already in chronological order)
    let curStreak=0, longestW=0, longestL=0;
    for(let i=s.matchList.length-1;i>=0;i--){
        const mw=s.matchList[i].won;
        if(i===s.matchList.length-1){
            curStreak=mw?1:-1;
        } else {
            const prev=s.matchList[i+1].won;
            if(mw&&prev)       curStreak++;
            else if(!mw&&!prev) curStreak--;
            else break;
        }
    }
    let run=0;
    s.matchList.forEach(m=>{
        if(m.won){run=run>0?run+1:1;longestW=Math.max(longestW,run);}
        else     {run=run<0?run-1:-1;longestL=Math.min(longestL,run);}
    });
    s.curStreak=curStreak;
    s.longestWin=longestW;
    s.longestLoss=Math.abs(longestL);

    // Map score (vs Pro League)
    let totalMapScore=0;
    Object.entries(s.maps).forEach(([name,ms])=>{
        const pa=PRO_AVG[name]||{atk:50,def:50};
        const atkPct=ms.atkR>0?ms.atkW/ms.atkR*100:null;
        const defPct=ms.defR>0?ms.defW/ms.defR*100:null;
        const atkDelta=atkPct!==null?atkPct-pa.atk:0;
        const defDelta=defPct!==null?defPct-pa.def:0;
        // Map score = average of non-null deltas, weighted by rounds
        let mapScore=0, parts=0;
        if(atkPct!==null){mapScore+=atkDelta*(ms.atkR/(ms.atkR+ms.defR));parts++;}
        if(defPct!==null){mapScore+=defDelta*(ms.defR/(ms.atkR+ms.defR));parts++;}
        ms.atkPct=atkPct;ms.defPct=defPct;
        ms.atkDelta=atkDelta;ms.defDelta=defDelta;
        ms.mapScore=mapScore;
        ms.pa=pa;
        totalMapScore+=mapScore;
    });
    s.totalMapScore=totalMapScore;

    /* ══════════════════════════════════════════════════════════
       TEAM RATING — Inspired by SiegeGG's player rating model,
       adapted for team-level scrim analytics.
       
       9 Components (0-100 each), weighted & combined:
       ────────────────────────────────────────────────
       1. Round Win %          (20%)  — core measure of winning
       2. Map Score vs Pro     (15%)  — performance vs pro league averages
       3. Survival Rate        (12%)  — team-wide survival discipline
       4. K/D Efficiency       (10%)  — fragging power
       5. Opening Duels        (12%)  — first blood win rate (most impactful kill)
       6. Plant Discipline     (10%)  — attack plant rate + defense denial
       7. Clutch Resilience    (8%)   — winning 1vX / not losing them
       8. Side Balance         (5%)   — balanced atk & def performance
       9. Momentum             (8%)   — streak & recent form bonus
       ══════════════════════════════════════════════════════════ */

    const hasEvents = s.roundsWithEvents > 0;

    // 1. Round Win % → 0-100  (50% = 50, 60% = 75, 40% = 25)
    const rawRWR = s.totalRounds > 0 ? s.roundWins / s.totalRounds : 0.5;
    // Sigmoid-ish scaling: amplify distance from 50%
    const rwrScore = Math.max(0, Math.min(100, 50 + (rawRWR - 0.5) * 200));

    // 2. Map Score vs Pro → 0-100  (0 delta = 50, +20 = 100, -20 = 0)
    const mapCount = Object.keys(s.maps).length || 1;
    const avgMapDelta = totalMapScore / mapCount;
    const mapScore = Math.max(0, Math.min(100, 50 + avgMapDelta * 2.5));

    // 3. Survival Rate → 0-100
    const survRate = hasEvents && s.survivalTotalSlots > 0
        ? (s.survivalAlive / s.survivalTotalSlots) : 0.5;
    // Pro avg survival is ~30%. Scale: 20%=0, 50%=80, 60%+=100
    const survScore = Math.max(0, Math.min(100, (survRate - 0.15) / 0.55 * 100));

    // 4. K/D Efficiency → 0-100  (1.0 = 50, 1.5 = 85, 0.5 = 15)
    const teamKD = s.teamDeaths > 0 ? s.teamKills / s.teamDeaths : (s.teamKills > 0 ? 2.0 : 1.0);
    const kdScore = Math.max(0, Math.min(100, (teamKD - 0.3) / 1.4 * 100));

    // 5. Opening Duels → 0-100  (50% = 50, 70% = 85)
    const odWR = s.openingDuelTotal > 0 ? s.openingDuelWins / s.openingDuelTotal : 0.5;
    const odScore = Math.max(0, Math.min(100, odWR * 100));

    // 6. Plant Discipline → 0-100
    // Attack: % of attack rounds where plant went down.  Benchmark ~40% = avg
    const plantRate = s.atkPlantRounds > 0 ? s.atkPlantSuccess / s.atkPlantRounds : 0.5;
    // Defense: % of defense rounds where plant was denied. Benchmark ~60% = avg
    const denyRate = s.defDenyRounds > 0 ? s.defDenySuccess / s.defDenyRounds : 0.5;
    const plantScore = Math.max(0, Math.min(100, ((plantRate + denyRate) / 2) * 100));

    // 7. Clutch Resilience → 0-100
    // Winning 1vX when disadvantaged is rare. Even 30% = good.
    const clutchRate = s.clutchSituations > 0 ? s.clutchWins / s.clutchSituations : 0.5;
    const clutchScore = Math.max(0, Math.min(100, clutchRate * 130)); // boost because clutching is hard

    // 8. Side Balance → 0-100  (equal atk/def performance = 100, one-sided = lower)
    const atkWR = s.atkRounds > 0 ? s.atkWins / s.atkRounds : 0.5;
    const defWR = s.defRounds > 0 ? s.defWins / s.defRounds : 0.5;
    const sideGap = Math.abs(atkWR - defWR);
    const balanceScore = Math.max(0, Math.min(100, 100 - sideGap * 200));

    // 9. Momentum → 0-100  (based on current streak)
    const streakVal = s.curStreak;
    const momentumScore = Math.max(0, Math.min(100, 50 + streakVal * 10));

    // Dynamic weights: if no event data, redistribute to non-event metrics
    let weights, components;
    if(hasEvents){
        weights = {rwr:0.20, map:0.15, surv:0.12, kd:0.10, od:0.12, plant:0.10, clutch:0.08, balance:0.05, momentum:0.08};
        components = {rwr:rwrScore, map:mapScore, surv:survScore, kd:kdScore, od:odScore, plant:plantScore, clutch:clutchScore, balance:balanceScore, momentum:momentumScore};
    } else {
        // No events: only use round-based metrics
        weights = {rwr:0.35, map:0.25, surv:0, kd:0, od:0, plant:0, clutch:0, balance:0.20, momentum:0.20};
        components = {rwr:rwrScore, map:mapScore, surv:0, kd:0, od:0, plant:0, clutch:0, balance:balanceScore, momentum:momentumScore};
    }

    let teamRating = 0;
    Object.keys(weights).forEach(k=>{ teamRating += (components[k] || 0) * weights[k]; });
    teamRating = Math.max(0, Math.min(100, Math.round(teamRating * 10) / 10));

    // Grade
    function letterGrade(score){
        if(score>=97) return'S';  if(score>=93) return'A+'; if(score>=88) return'A';
        if(score>=83) return'A-'; if(score>=78) return'B+'; if(score>=73) return'B';
        if(score>=68) return'B-'; if(score>=63) return'C+'; if(score>=58) return'C';
        if(score>=53) return'C-'; if(score>=48) return'D+'; if(score>=43) return'D';
        if(score>=38) return'D-'; return'F';
    }

    s.teamRating = teamRating;
    s.teamGrade  = letterGrade(teamRating);
    s.ratingHasEvents = hasEvents;
    s.ratingComponents = {
        rwr:   {val:rwrScore,   w:weights.rwr,   raw: rawRWR,        label:'Round Win Rate',   icon:'fa-crosshairs',  color:'#60a5fa'},
        map:   {val:mapScore,   w:weights.map,    raw: avgMapDelta,   label:'Map Score vs Pro', icon:'fa-map',         color:'#a78bfa'},
        surv:  {val:survScore,  w:weights.surv,   raw: survRate,      label:'Survival Rate',    icon:'fa-heart-pulse', color:'#f472b6'},
        kd:    {val:kdScore,    w:weights.kd,     raw: teamKD,        label:'K/D Efficiency',   icon:'fa-skull',       color:'#fb923c'},
        od:    {val:odScore,    w:weights.od,      raw: odWR,          label:'Opening Duels',    icon:'fa-bolt',        color:'#fbbf24'},
        plant: {val:plantScore, w:weights.plant,   raw: plantRate,     label:'Plant Discipline', icon:'fa-bomb',        color:'#34d399'},
        clutch:{val:clutchScore,w:weights.clutch,  raw: clutchRate,    label:'Clutch Resilience', icon:'fa-hand-fist',  color:'#f87171'},
        balance:{val:balanceScore,w:weights.balance,raw:sideGap,       label:'Side Balance',     icon:'fa-scale-balanced',color:'#38bdf8'},
        momentum:{val:momentumScore,w:weights.momentum,raw:streakVal,  label:'Momentum',         icon:'fa-fire',        color:'#c084fc'},
    };
    // Raw sub-stats for display
    s.rawStats = {
        teamKD, survRate, odWR, plantRate, denyRate, clutchRate,
        clutchWins: s.clutchWins, clutchTotal: s.clutchSituations,
        openingWins: s.openingDuelWins, openingTotal: s.openingDuelTotal,
    };

    return s;
}

/* ── GRADE COLOR HELPER ── */
function gradeColor(g){
    if(g==='S')  return'#fbbf24';
    if(g.startsWith('A')) return'#34d399';
    if(g.startsWith('B')) return'#60a5fa';
    if(g.startsWith('C')) return'#fbbf24';
    if(g.startsWith('D')) return'#fb923c';
    return'#f87171';
}

   RENDER

function render(s){
    $('statsArea').innerHTML=`
        ${buildKPIStrip(s)}
        ${buildTeamRatingBreakdown(s)}
        <div class="two-col">${buildWinConditions(s)}${buildSplitAndStreak(s)}</div>
        ${buildMapScore(s)}
        ${buildAIPanel()}
    `;
    // Wire map toggle
    document.querySelectorAll('.map-toggle-btn').forEach(btn=>{
        btn.addEventListener('click',()=>{
            document.querySelectorAll('.map-toggle-btn').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            // toggle views
            document.querySelectorAll('.map-view').forEach(v=>{
                v.style.display=v.dataset.view===btn.dataset.view?'block':'none';
            });
        });
    });
    // Wire expandable map rows
    document.querySelectorAll('.map-row-main').forEach(row=>{
        row.addEventListener('click',()=>{
            const key=row.dataset.mapkey;
            const expRow=document.getElementById(`exp-${key}`);
            const chev=row.querySelector('.chevron');
            if(expRow){
                const open=expRow.classList.toggle('open');
                if(chev) chev.classList.toggle('open',open);
            }
        });
    });
}

function buildKPIStrip(s){
    const wr=s.matchWins+s.matchLosses>0?(s.matchWins/(s.matchWins+s.matchLosses)*100).toFixed(0):0;
    const rwr=s.totalRounds>0?(s.roundWins/s.totalRounds*100).toFixed(0):0;
    const curStr=Math.abs(s.curStreak);
    const curSuffix=s.curStreak>0?'<span style="font-size:12px;color:#34d399;">W</span>':
                    s.curStreak<0?'<span style="font-size:12px;color:#f87171;">L</span>':'';

    return`
    <div class="kpi-strip">
        <div class="kpi-card kc-blue">
            <i class="fas fa-trophy kpi-icon"></i>
            <div class="kpi-val">${s.matchWins}<span style="font-size:14px;color:var(--gray);font-weight:500;">-${s.matchLosses}</span></div>
            <div class="kpi-lbl">Match Record</div>
            <div class="kpi-sub">${wr}% win rate · ${s.matchDraws} draws</div>
        </div>
        <div class="kpi-card kc-green">
            <i class="fas fa-crosshairs kpi-icon"></i>
            <div class="kpi-val">${s.roundWins}<span style="font-size:14px;color:var(--gray);font-weight:500;">-${s.roundLosses}</span></div>
            <div class="kpi-lbl">Round Record</div>
            <div class="kpi-sub">${rwr}% round win rate</div>
        </div>
        <div class="kpi-card kc-purple">
            <i class="fas fa-fire kpi-icon"></i>
            <div class="kpi-val">${curStr}${curSuffix}</div>
            <div class="kpi-lbl">Current Streak</div>
            <div class="kpi-sub">${s.curStreak===0?'No matches yet':s.curStreak>0?`${curStr} wins in a row`:`${curStr} losses in a row`}</div>
        </div>
        <div class="kpi-card kc-amber">
            <i class="fas fa-medal kpi-icon"></i>
            <div class="kpi-val">${s.longestWin}<span style="font-size:11px;color:var(--gray);font-weight:500;"> W</span></div>
            <div class="kpi-lbl">Longest Win Streak</div>
            <div class="kpi-sub">Longest loss streak: ${s.longestLoss}L</div>
        </div>
        <div class="kpi-card kc-gray" style="position:relative;">
            <i class="fas fa-star kpi-icon" style="color:${gradeColor(s.teamGrade)};"></i>
            <div class="kpi-val" style="color:${gradeColor(s.teamGrade)};">${s.teamRating.toFixed(1)}</div>
            <div class="kpi-lbl">Team Rating</div>
            <div class="kpi-sub">Grade: <span style="color:${gradeColor(s.teamGrade)};font-weight:800;font-size:13px;">${s.teamGrade}</span>${!s.ratingHasEvents?' · <span style="color:rgba(245,158,11,0.6);">Limited data</span>':''}</div>
        </div>
    </div>`;
}

function buildTeamRatingBreakdown(s){
    const rc=s.ratingComponents;
    const raw=s.rawStats;

    // Build component rows
    const compKeys=['rwr','map','od','surv','kd','plant','clutch','balance','momentum'];
    const rawLabels={
        rwr:   `${(rc.rwr.raw*100).toFixed(1)}% round WR`,
        map:   `${rc.map.raw>=0?'+':''}${rc.map.raw.toFixed(1)} avg delta`,
        surv:  s.ratingHasEvents?`${(raw.survRate*100).toFixed(1)}% alive/round`:'No event data',
        kd:    s.ratingHasEvents?`${raw.teamKD.toFixed(2)} K/D`:'No event data',
        od:    s.ratingHasEvents?`${raw.openingWins}/${raw.openingTotal} first bloods`:'No event data',
        plant: s.ratingHasEvents?`${(raw.plantRate*100).toFixed(0)}% plant · ${(raw.denyRate*100).toFixed(0)}% deny`:'No event data',
        clutch:s.ratingHasEvents?`${raw.clutchWins}/${raw.clutchTotal} clutch wins`:'No event data',
        balance:`${(Math.abs(rc.balance.raw)*100).toFixed(0)}% side gap`,
        momentum:`${s.curStreak>=0?'+':''}${s.curStreak} streak`,
    };

    const rows=compKeys.map(k=>{
        const c=rc[k];
        if(c.w===0) return''; // hidden (no events)
        const contribution=(c.val*c.w).toFixed(1);
        const weightPct=(c.w*100).toFixed(0);
        const barWidth=Math.max(2,c.val);
        const barColor=c.color;
        const valColor=c.val>=70?'#34d399':c.val>=45?'#fbbf24':'#f87171';
        return`
            <div class="tr-row">
                <div class="tr-meta">
                    <div class="tr-icon-wrap" style="color:${c.color};border-color:${c.color}33;background:${c.color}15;">
                        <i class="fas ${c.icon}"></i>
                    </div>
                    <div>
                        <div class="tr-label">${c.label}</div>
                        <div class="tr-raw">${rawLabels[k]} · ${weightPct}% weight</div>
                    </div>
                </div>
                <div class="tr-bar-area">
                    <div class="tr-bar-track">
                        <div class="tr-bar-fill" style="width:${barWidth}%;background:${barColor};"></div>
                    </div>
                </div>
                <div class="tr-score" style="color:${valColor};">${c.val.toFixed(0)}</div>
                <div class="tr-contrib">+${contribution}</div>
            </div>`;
    }).filter(Boolean).join('');

    const gc=gradeColor(s.teamGrade);

    return`
    <div class="panel">
        <div class="panel-hdr"><i class="fas fa-star" style="color:#fbbf24;"></i> Team Rating Breakdown
            <span style="margin-left:auto;font-size:11px;font-weight:400;color:rgba(148,163,184,0.5);">Inspired by SiegeGG · 9 weighted components</span>
        </div>
        <div class="panel-body" style="padding:0;">
            <!-- Big Rating Display -->
            <div class="tr-hero">
                <div class="tr-hero-left">
                    <div class="tr-hero-rating" style="color:${gc};">${s.teamRating.toFixed(1)}</div>
                    <div class="tr-hero-grade" style="background:${gc}20;border:1px solid ${gc}40;color:${gc};">${s.teamGrade}</div>
                </div>
                <div class="tr-hero-right">
                    <div class="tr-hero-label">Overall Team Rating</div>
                    <div class="tr-hero-desc">
                        ${s.teamRating>=80?'Elite performance — dominant across all metrics.':
                          s.teamRating>=65?'Strong performance — competitive with room to refine.':
                          s.teamRating>=50?'Average — solid fundamentals, key areas to improve.':
                          s.teamRating>=35?'Below average — several metrics need attention.':
                          'Struggling — focus on fundamentals and team coordination.'}
                    </div>
                    ${!s.ratingHasEvents?'<div class="tr-hero-warn"><i class="fas fa-triangle-exclamation"></i> No round event data found — rating based on round outcomes only. Upload replay files for full analysis.</div>':''}
                </div>
            </div>
            <!-- Component Breakdown -->
            <div class="tr-grid">
                <div class="tr-grid-header">
                    <span>Component</span>
                    <span style="text-align:center;">Score Bar</span>
                    <span style="text-align:right;">Score</span>
                    <span style="text-align:right;">Weighted</span>
                </div>
                ${rows}
            </div>
        </div>
    </div>`;
}

    const tPct=(s.wcTime/total*100).toFixed(0);
    // losses
    const lossTotal=s.roundLosses||1;

    // win breakdown bar widths (% of total rounds won)
    const kBar=(s.wcKill/total*100).toFixed(1);
    const dBar=(s.wcDefuse/total*100).toFixed(1);
    const tBar=(s.wcTime/total*100).toFixed(1);

    // Also compute loss conditions from (total rounds - wins = losses)
    // We don't have loss conditions tracked separately yet — placeholder
    return`
    <div class="panel">
        <div class="panel-hdr"><i class="fas fa-flag-checkered"></i> Round Win Conditions</div>
        <div class="panel-body">

                    <div class="wc-icon wci-def"><i class="fas fa-bomb"></i></div>

                </div>

                    </div>
                    <div class="wc-count" style="color:#fbbf24;">${s.wcTime}</div>
                </div>
            </div>
            <div style="font-size:11px;color:rgba(148,163,184,0.4);text-align:center;">
                <i class="fas fa-circle-info"></i> Win condition is read from replay data (teams[].winCondition).

function buildSplitAndStreak(s){

    const atkFill=(parseFloat(atkPct)/(parseFloat(atkPct)+parseFloat(defPct)||1)*100).toFixed(1);

    return`
    <div style="display:flex;flex-direction:column;gap:14px;">
        <div class="panel">
            <div class="panel-hdr"><i class="fas fa-shield-halved"></i> Attack / Defense Split</div>

                        <div class="split-lbl">Attack Win Rate</div>
                        <div class="split-detail">${s.atkWins}W / ${s.atkRounds-s.atkWins}L · ${s.atkRounds} rounds</div>
                    </div>
                    <div class="split-card split-def">
                        <i class="fas fa-shield-halved split-icon"></i>
                        <div class="split-pct">${defPct}%</div>

                    </div>
                </div>
                <div class="split-bar-wrap" style="margin-top:12px;">
                    <div class="split-bar-atk" style="width:${atkFill}%"></div>
                    <div class="split-bar-def" style="width:${defFill}%"></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-hdr"><i class="fas fa-chart-bar"></i> Round Win/Loss Summary</div>
            <div class="panel-body">
                <div class="rw-row">
                    <div class="rw-val-l">${s.roundWins}</div>
                    <div>
                        <div class="rw-center-lbl" style="margin-bottom:4px;">Total Rounds</div>
                        <div class="rw-bar-center" style="width:100%;">
                            <div class="rw-fill-l" style="width:${(s.roundWins/s.totalRounds*100||0).toFixed(1)}%"></div>
                            <div class="rw-fill-r" style="width:${(s.roundLosses/s.totalRounds*100||0).toFixed(1)}%"></div>
                        </div>
                    </div>
                    <div class="rw-val-r">${s.roundLosses}</div>
                </div>
                <div class="rw-row">
                    <div class="rw-val-l">${s.atkWins}</div>
                    <div>
                        <div class="rw-center-lbl" style="margin-bottom:4px;">Attack Rounds</div>
                        <div class="rw-bar-center">
                            <div class="rw-fill-l" style="width:${(s.atkWins/s.atkRounds*100||0).toFixed(1)}%"></div>
                            <div class="rw-fill-r" style="width:${((s.atkRounds-s.atkWins)/s.atkRounds*100||0).toFixed(1)}%"></div>
                        </div>
                    </div>
                    <div class="rw-val-r">${s.atkRounds-s.atkWins}</div>
                </div>
                <div class="rw-row" style="margin-bottom:0">
                    <div class="rw-val-l">${s.defWins}</div>
                    <div>
                        <div class="rw-center-lbl" style="margin-bottom:4px;">Defense Rounds</div>
                        <div class="rw-bar-center">
                            <div class="rw-fill-l" style="width:${(s.defWins/s.defRounds*100||0).toFixed(1)}%"></div>

function buildMapScore(s){
    const maps=Object.entries(s.maps).sort((a,b)=>b[1].atkR+b[1].defR - (a[1].atkR+a[1].defR));
    if(!maps.length) return`<div class="panel"><div class="panel-body"><div class="empty-state" style="padding:30px;"><i class="fas fa-map"></i><p>No map data.</p></div></div></div>`;

    const totalScore=s.totalMapScore;
    const scoreCls=totalScore>2?'score-pos':totalScore<-2?'score-neg':'score-neu';

    // Overall map score table
    const overallRows=maps.map(([name,ms])=>{
        const totalR=ms.atkR+ms.defR;
        const pa=ms.pa;
        const atkStr=ms.atkR>0?`${ms.atkW}/${ms.atkR} (${ms.atkPct.toFixed(0)}%)`:'—';
        const defStr=ms.defR>0?`${ms.defW}/${ms.defR} (${ms.defPct.toFixed(0)}%)`:'—';
        const atkDStr=ms.atkR>0?(ms.atkDelta>=0?`+${ms.atkDelta.toFixed(1)}`:`${ms.atkDelta.toFixed(1)}`):null;
        const defDStr=ms.defR>0?(ms.defDelta>=0?`+${ms.defDelta.toFixed(1)}`:`${ms.defDelta.toFixed(1)}`):null;
        const scoreNum=ms.mapScore;
        const scoreSuf=scoreNum>=0?`+${scoreNum.toFixed(1)}`:`${scoreNum.toFixed(1)}`;
        const sCls=scoreNum>2?'score-pos':scoreNum<-2?'score-neg':'score-neu';
        const mapKey=name.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

        return`
        <tr class="map-row-main" data-mapkey="${mapKey}">
            <td class="map-name-td"><i class="fas fa-chevron-right chevron"></i> ${x(name)}</td>
            <td class="td-c">${totalR}</td>
            <td class="td-c">
                <span>${atkStr}</span>
                ${atkDStr?`<div class="pro-avg">Pro: ${pa.atk.toFixed(0)}% <span class="${parseFloat(atkDStr)>=0?'above':'below'}">${atkDStr}</span></div>`:''}
            </td>
            <td class="td-c">
                <span>${defStr}</span>
                ${defDStr?`<div class="pro-avg">Pro: ${pa.def.toFixed(0)}% <span class="${parseFloat(defDStr)>=0?'above':'below'}">${defDStr}</span></div>`:''}
            </td>
            <td class="td-r"><span class="score-pill ${sCls}">${scoreSuf}</span></td>
        </tr>
        <tr class="map-expand-row" id="exp-${mapKey}">
            <td colspan="5" class="map-expand-cell">
                <div class="map-expand-inner">
                    <div class="me-block">
                        <div class="me-title"><i class="fas fa-sword" style="color:#f87171;"></i> Attack</div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Rounds played</span>
                            <span class="me-stat-val">${ms.atkR}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Rounds won</span>
                            <span class="me-stat-val">${ms.atkW}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Win rate</span>
                            <span class="me-stat-val">${ms.atkR>0?ms.atkPct.toFixed(1)+'%':'—'}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Pro League avg</span>
                            <span class="pro-badge">${pa.atk.toFixed(1)}%</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Delta vs Pro</span>
                            <span class="me-stat-val ${ms.atkDelta>=0?'above':'below'}">${ms.atkR>0?(ms.atkDelta>=0?'+':'')+ms.atkDelta.toFixed(1)+'%':'—'}</span>
                        </div>
                    </div>
                    <div class="me-block">
                        <div class="me-title"><i class="fas fa-shield-halved" style="color:#60a5fa;"></i> Defense</div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Rounds played</span>
                            <span class="me-stat-val">${ms.defR}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Rounds won</span>
                            <span class="me-stat-val">${ms.defW}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Win rate</span>
                            <span class="me-stat-val">${ms.defR>0?ms.defPct.toFixed(1)+'%':'—'}</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Pro League avg</span>
                            <span class="pro-badge">${pa.def.toFixed(1)}%</span>
                        </div>
                        <div class="me-stat-row">
                            <span class="me-stat-lbl">Delta vs Pro</span>
                            <span class="me-stat-val ${ms.defDelta>=0?'above':'below'}">${ms.defR>0?(ms.defDelta>=0?'+':'')+ms.defDelta.toFixed(1)+'%':'—'}</span>
                        </div>
                    </div>
                </div>
            </td>
        </tr>`;
    }).join('');

    return`
    <div class="panel">
        <div class="panel-hdr"><i class="fas fa-map"></i> Map Score vs Pro League Averages
            <span style="margin-left:auto;font-size:11px;font-weight:400;color:rgba(148,163,184,0.5);">Click any map to expand · Green = above Pro avg · Red = below</span>
        </div>
        <div class="panel-body" style="padding:14px 0 0;">
            <table class="map-table">

}

let _lastStats = null;
