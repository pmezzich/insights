<!DOCTYPE html>
<html lang="en">
<head>
<script>window.process = window.process || { env: {} };</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Stats — R6 Insights</title>
<meta property="og:title" content="R6 Insights — Player Stats">
<meta property="og:description" content="View this player's Rainbow Six Siege stats across all teams.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../styles/pro-global.css">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="../scripts/firebase-config.js"></script>
<style>
:root{--primary:#7C3AED;--secondary:#4F46E5;--dark:#1E293B;--darker:#0F172A;--light:#F8FAFC;--gray:#94A3B8;--success:#10B981;--danger:#EF4444;--warning:#F59E0B;--card-bg:rgba(30,41,59,0.75);--card-border:rgba(255,255,255,0.1);}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
body{color:var(--light);min-height:100vh;padding:20px;}
.container{max-width:1060px;margin:0 auto;background:rgba(15,23,42,0.93);border-radius:16px;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,0.7);border:1px solid var(--card-border);backdrop-filter:blur(14px);}

/* ── NAV ── */
.nav-header{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;background:rgba(30,41,59,0.92);border-bottom:1px solid var(--card-border);}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-text{font-size:19px;font-weight:800;background:linear-gradient(to right,#a78bfa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-badge{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;font-size:10px;font-weight:700;letter-spacing:1.2px;padding:2px 9px;border-radius:20px;text-transform:uppercase;}
.nav-right{display:flex;align-items:center;gap:10px;}
.btn{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px;transition:all .18s;text-decoration:none;font-family:inherit;color:var(--light);}
.btn:hover{transform:translateY(-1px);}
.btn-secondary{background:rgba(79,70,229,0.2);border:1px solid var(--secondary);}
.btn-secondary:hover{background:rgba(79,70,229,0.32);}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--secondary));color:white;}
.btn-primary:hover{opacity:.9;}

/* ── PLAYER HERO ── */
.player-hero{padding:24px 28px;background:rgba(15,23,42,0.5);border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:20px;}
.hero-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(124,58,237,0.5);background:rgba(124,58,237,0.18);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:#a78bfa;flex-shrink:0;overflow:hidden;}
.hero-avatar img{width:100%;height:100%;object-fit:cover;}
.hero-info{flex:1;}
.hero-name{font-size:22px;font-weight:800;margin-bottom:4px;}
.hero-aliases{font-size:12px;color:var(--gray);margin-bottom:6px;}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;}
.hero-badge{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;}
.hb-scrim{background:rgba(124,58,237,0.15);color:#a78bfa;border:1px solid rgba(124,58,237,0.3);}
.hb-gameday{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3);}
.hb-rounds{background:rgba(16,185,129,0.12);color:#34d399;border:1px solid rgba(16,185,129,0.25);}
.hero-share{flex-shrink:0;}

/* ── PUBLIC BANNER ── */
.public-banner{background:rgba(59,130,246,0.08);border-bottom:1px solid rgba(59,130,246,0.2);padding:10px 28px;display:flex;align-items:center;gap:10px;font-size:12px;color:rgba(148,163,184,0.8);}

/* ── CONTENT ── */
.content{padding:20px 24px;display:flex;flex-direction:column;gap:18px;}
.panel{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;}
.panel-hdr{padding:12px 18px;border-bottom:1px solid var(--card-border);font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
.panel-hdr .ml{margin-left:auto;display:flex;align-items:center;gap:8px;}
.panel-body{padding:18px;}

/* ── FILTERS ── */
.filter-strip{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.fi-sel{padding:8px 12px;border-radius:8px;border:1px solid var(--card-border);background:rgba(10,16,28,0.85);color:var(--light);font-size:13px;font-family:inherit;transition:border-color .2s;}
.fi-sel:focus{outline:none;border-color:var(--primary);}
.match-count{font-size:12px;color:var(--gray);margin-left:4px;}

/* ── KPI STRIP ── */
.kpi-strip{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
.kpi{background:rgba(15,23,42,0.6);border:1px solid var(--card-border);border-radius:10px;padding:14px 10px;text-align:center;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.kc-blue::before{background:linear-gradient(to right,#3B82F6,#60a5fa);}
.kc-green::before{background:linear-gradient(to right,#10B981,#34d399);}
.kc-purple::before{background:linear-gradient(to right,#7C3AED,#a78bfa);}
.kc-amber::before{background:linear-gradient(to right,#F59E0B,#fbbf24);}
.kc-red::before{background:linear-gradient(to right,#EF4444,#f87171);}
.kc-cyan::before{background:linear-gradient(to right,#06B6D4,#22d3ee);}
.kpi-val{font-size:22px;font-weight:800;margin:4px 0 2px;}
.kc-blue .kpi-val{color:#60a5fa;}.kc-green .kpi-val{color:#34d399;}.kc-purple .kpi-val{color:#a78bfa;}
.kc-amber .kpi-val{color:#fbbf24;}.kc-red .kpi-val{color:#f87171;}.kc-cyan .kpi-val{color:#22d3ee;}
.kpi-lbl{font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;font-weight:700;}

/* ── KOST BAR ── */
.kost-wrap{margin-bottom:4px;}
.kost-bar-track{height:8px;border-radius:4px;background:rgba(255,255,255,0.06);overflow:hidden;margin-top:6px;}
.kost-bar-fill{height:100%;border-radius:4px;background:linear-gradient(to right,#7C3AED,#a78bfa);transition:width .6s ease;}

/* ── ATK DEF ── */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.split-card{border-radius:10px;padding:16px;text-align:center;}
.split-atk{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);}
.split-def{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);}
.split-val{font-size:26px;font-weight:800;margin-bottom:2px;}
.split-atk .split-val{color:#f87171;}.split-def .split-val{color:#60a5fa;}
.split-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray);font-weight:700;}
.split-sub{font-size:11px;color:var(--gray);margin-top:4px;}

/* ── OP TABLE ── */
.op-tbl{width:100%;border-collapse:collapse;font-size:12.5px;}
.op-tbl th{padding:9px 12px;border-bottom:1px solid var(--card-border);text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:rgba(148,163,184,0.4);}
.op-tbl th.tc,.op-tbl td.tc{text-align:center;}
.op-tbl td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,0.04);vertical-align:middle;}
.op-tbl tr:last-child td{border-bottom:none;}
.op-tbl tr:hover td{background:rgba(124,58,237,0.05);}
.op-av{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}

/* ── SECTION DIVIDER ── */
.sdiv{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:rgba(148,163,184,0.35);display:flex;align-items:center;gap:8px;margin:16px 0 12px;}
.sdiv::after{content:'';flex:1;height:1px;background:var(--card-border);}

/* ── MATCH HISTORY CARDS ── */
.match-cards{display:flex;flex-direction:column;gap:10px;}
.match-card{background:rgba(15,23,42,0.5);border:1px solid var(--card-border);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;}
.match-card.win-card{border-left:3px solid #10B981;}
.match-card.loss-card{border-left:3px solid #EF4444;}
.mc-result{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;min-width:36px;}
.win-card .mc-result{color:#34d399;}.loss-card .mc-result{color:#f87171;}
.mc-info{flex:1;min-width:0;}
.mc-title{font-size:13px;font-weight:700;}
.mc-sub{font-size:11px;color:var(--gray);margin-top:2px;}
.mc-stats{display:flex;gap:16px;flex-shrink:0;}
.mc-stat{text-align:center;}
.mc-stat-val{font-size:14px;font-weight:700;}
.mc-stat-lbl{font-size:9px;color:var(--gray);text-transform:uppercase;letter-spacing:.3px;}

/* ── TOAST ── */
.toast{position:fixed;bottom:22px;right:22px;padding:11px 17px;border-radius:10px;font-size:13px;font-weight:600;z-index:9998;display:flex;align-items:center;gap:7px;animation:tin .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5);color:white;}
.toast.success{background:rgba(16,185,129,0.95);}
.toast.error{background:rgba(239,68,68,0.95);}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── SPINNER ── */
#loadingOverlay{position:fixed;inset:0;background:rgba(10,16,30,0.98);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
#loadingOverlay.hidden{display:none;}
.spinner{width:44px;height:44px;border:3px solid rgba(124,58,237,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner-text{color:var(--gray);font-size:14px;}

@media(max-width:640px){
    body{padding:10px;}.content{padding:12px;}
    .kpi-strip{grid-template-columns:repeat(3,1fr);}
    .split-grid{grid-template-columns:1fr;}
    .player-hero{flex-direction:column;align-items:flex-start;}
    .mc-stats{display:none;}
}
</style>
</head>
<body>

<div id="loadingOverlay">
    <div class="spinner"></div>
    <div class="spinner-text" id="loadingText">Loading stats…</div>
</div>

<div class="container">

    <!-- Nav -->
    <div class="nav-header">
        <a href="index_pro.html" class="logo">
            <img src="../styles/r6_insights.png" class="logo-img" alt="R6 Insights">
            <div class="logo-text">R6 INSIGHTS</div>
            <span class="nav-badge">Beta</span>
        </a>
        <div class="nav-right" id="navRight">
            <!-- populated by JS depending on auth state -->
        </div>
    </div>

    <!-- Public banner (shown when viewing someone else's stats via share link) -->
    <div class="public-banner" id="publicBanner" style="display:none;">
        <i class="fas fa-eye" style="color:#60a5fa;"></i>
        <span>You are viewing a shared player profile. <a href="index_pro.html" style="color:#a78bfa;text-decoration:none;font-weight:700;">Sign in</a> to access the full platform.</span>
    </div>

    <!-- Player hero -->
    <div class="player-hero" id="playerHero" style="display:none;">
        <div class="hero-avatar" id="heroAvatar">?</div>
        <div class="hero-info">
            <div class="hero-name" id="heroName">—</div>
            <div class="hero-aliases" id="heroAliases"></div>
            <div class="hero-badges" id="heroBadges"></div>
        </div>
        <div class="hero-share">
            <button class="btn btn-primary" id="shareBtn" onclick="shareStats()">
                <i class="fas fa-share-nodes"></i> Share Stats
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="content">
        <div class="panel" id="filterPanel" style="display:none;">
            <div class="panel-hdr"><i class="fas fa-filter" style="color:var(--gray);"></i> Filters</div>
            <div class="panel-body">
                <div class="filter-strip">
                    <select id="fType" class="fi-sel" onchange="applyFilters()">
                        <option value="">All Types</option>
                        <option value="scrim">Scrim</option>
                        <option value="gameday">Game Day</option>
                    </select>
                    <select id="fTeam" class="fi-sel" onchange="applyFilters()">
                        <option value="">All Teams</option>
                    </select>
                    <select id="fMap" class="fi-sel" onchange="applyFilters()">
                        <option value="">All Maps</option>
                    </select>
                    <span class="match-count" id="matchCountLabel"></span>
                </div>
            </div>
        </div>

        <!-- Stats body (populated by JS) -->
        <div id="statsBody"></div>

    </div>
</div>

<script>
(function(){
'use strict';

if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();

const $ = id => document.getElementById(id);
const x = s  => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const OP_ROLES = {
    'Ash':'frag','Zofia':'frag','Sledge':'frag','Buck':'frag','Hibana':'frag',
    'Thermite':'support','Thatcher':'support','Twitch':'support','Ace':'support',
    'Lion':'support','Finka':'support','Maverick':'frag','Flores':'flex',
    'Iana':'frag','Nomad':'flex','Nokk':'frag','Zero':'support','Grim':'support',
    'Brava':'frag','Ram':'frag','Deimos':'frag','Striker':'frag','SolidSnake':'frag',
    'Sens':'support','IQ':'support',
    'Jager':'anchor','Bandit':'anchor','Echo':'anchor','Pulse':'anchor',
    'Doc':'support','Rook':'support','Castle':'anchor','Caveira':'roam',
    'Valkyrie':'support','Mute':'anchor','Smoke':'anchor','Frost':'anchor',
    'Lesion':'flex','Ela':'roam','Vigil':'roam','Mozzie':'flex','Warden':'anchor',
    'Goyo':'anchor','Melusi':'anchor','Aruni':'anchor','Thorn':'anchor',
    'Fenrir':'anchor','Skopos':'flex','Denari':'flex',
    'Mira':'anchor','Tachanka':'anchor','Wamai':'support','Azami':'anchor',
    'Blitz':'frag','Montagne':'support','Clash':'anchor',
    'Dokkaebi':'support','Capitao':'frag','Blackbeard':'frag',
};
const OP_CLR = {
    frag:{bg:'rgba(239,68,68,0.2)',color:'#f87171'},
    support:{bg:'rgba(59,130,246,0.2)',color:'#60a5fa'},
    flex:{bg:'rgba(245,158,11,0.2)',color:'#fbbf24'},
    anchor:{bg:'rgba(16,185,129,0.2)',color:'#34d399'},
    roam:{bg:'rgba(124,58,237,0.2)',color:'#a78bfa'},
};

// ── Determine whose stats to show ─────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const sharedUid = params.get('uid');   // set when using a share link
let   viewUid   = null;
let   isOwnPage = false;
let   allMatches= [];

auth.onAuthStateChanged(async user => {
    if (sharedUid) {
        // Public share link — no login required
        viewUid    = sharedUid;
        isOwnPage  = user && user.uid === sharedUid;
        if (!isOwnPage) $('publicBanner').style.display = 'flex';
        buildNavPublic(user);
        await loadStats(viewUid);
    } else if (user && user.emailVerified) {
        // Logged in, viewing own stats
        viewUid   = user.uid;
        isOwnPage = true;
        buildNavOwn(user);
        await loadStats(viewUid);
    } else {
        window.location.href = 'index_pro.html';
        return;
    }
    $('loadingOverlay').classList.add('hidden');
});

// ── Nav builders ──────────────────────────────────────────────────────────────
function buildNavOwn(user) {
    $('navRight').innerHTML = `
        <a href="profile.html" class="btn btn-secondary" style="padding:8px 14px;font-size:13px;"><i class="fas fa-user"></i> Profile</a>
        <a href="index_pro.html" class="btn btn-secondary" style="padding:8px 14px;font-size:13px;"><i class="fas fa-arrow-left"></i> Hub</a>
        <button class="btn-logout" onclick="auth.signOut().then(()=>location.href='index_pro.html')">
            <i class="fas fa-right-from-bracket"></i> Logout
        </button>`;
}
function buildNavPublic(user) {
    $('navRight').innerHTML = user
        ? `<a href="index_pro.html" class="btn btn-secondary" style="padding:8px 14px;font-size:13px;"><i class="fas fa-house"></i> Hub</a>`
        : `<a href="index_pro.html" class="btn btn-primary" style="padding:8px 14px;font-size:13px;"><i class="fas fa-right-to-bracket"></i> Sign In</a>`;
}

// ── Load stats from Firebase ──────────────────────────────────────────────────
async function loadStats(uid) {
    try {
        // Load profile for avatar + display names
        const [matchSnap, profSnap] = await Promise.all([
            db.ref(`users/${uid}/matches`).once('value'),
            db.ref(`users/${uid}/profile`).once('value'),
        ]);

        const profile = profSnap.val() || {};
        allMatches = [];
        if (matchSnap.exists()) {
            matchSnap.forEach(child => { if(child.val()) allMatches.push(child.val()); });
        }

        // Build hero
        buildHero(uid, profile);

        if (!allMatches.length) {
            $('statsBody').innerHTML = `<div class="panel"><div class="panel-body" style="text-align:center;padding:40px;color:var(--gray);font-size:13px;"><i class="fas fa-chart-bar" style="font-size:28px;margin-bottom:12px;display:block;"></i>No match stats yet.</div></div>`;
            return;
        }

        // Build filters
        buildFilters();
        $('filterPanel').style.display = 'block';
        applyFilters();

    } catch(e) {
        $('statsBody').innerHTML = `<div class="panel"><div class="panel-body" style="padding:20px;color:#fca5a5;font-size:13px;">Failed to load: ${x(e.message)}</div></div>`;
    }
}

// ── Hero section ──────────────────────────────────────────────────────────────
function buildHero(uid, profile) {
    const avatar       = profile.avatar;
    const activeName   = profile.activeDisplayName || '—';
    const displayNames = profile.displayNames || [];
    const otherNames   = displayNames.filter(n => n !== activeName);

    const av = $('heroAvatar');
    if (avatar) {
        av.innerHTML = `<img src="${avatar}" alt="avatar">`;
    } else {
        av.textContent = (activeName[0]||'?').toUpperCase();
    }

    $('heroName').textContent = activeName;
    $('heroAliases').textContent = otherNames.length ? 'Also known as: ' + otherNames.join(', ') : '';

    // Count scrims/gamedays
    const scrims   = allMatches.filter(m=>(m.matchType||'scrim')==='scrim').length;
    const gamedays = allMatches.filter(m=>m.matchType==='gameday').length;
    const rounds   = allMatches.reduce((s,m)=>s+(m.rounds||[]).length,0);

    $('heroBadges').innerHTML = [
        scrims   ? `<span class="hero-badge hb-scrim">${scrims} Scrim${scrims!==1?'s':''}</span>` : '',
        gamedays ? `<span class="hero-badge hb-gameday">${gamedays} Game Day${gamedays!==1?'s':''}</span>` : '',
        `<span class="hero-badge hb-rounds">${rounds} Rounds</span>`,
    ].join('');

    // Hide share button on public view (they already have the link)
    if (!isOwnPage) $('shareBtn').style.display = 'none';
    $('playerHero').style.display = 'flex';
}

// ── Filters ───────────────────────────────────────────────────────────────────
function buildFilters() {
    const teams = [...new Set(allMatches.map(m=>m.teamName).filter(Boolean))].sort();
    const maps  = [...new Set(allMatches.flatMap(m=>(m.rounds||[]).map(r=>r.map)).filter(Boolean))].sort();
    const ts = $('fTeam'), ms = $('fMap');
    teams.forEach(t=>{ const o=document.createElement('option'); o.value=o.textContent=t; ts.appendChild(o); });
    maps.forEach(m=>{  const o=document.createElement('option'); o.value=o.textContent=m; ms.appendChild(o); });
}

window.applyFilters = function() {
    const typ  = $('fType').value;
    const team = $('fTeam').value;
    const map  = $('fMap').value;

    let filtered = allMatches;
    if (typ)  filtered = filtered.filter(m=>(m.matchType||'scrim')===typ);
    if (team) filtered = filtered.filter(m=>m.teamName===team);

    // Flatten rounds, applying map filter at round level
    let rounds = filtered.flatMap(m=>(m.rounds||[]).map(r=>({...r,teamName:m.teamName,opponent:m.opponent,date:m.date,matchType:m.matchType})));
    if (map) rounds = rounds.filter(r=>r.map===map);

    const matchCount = filtered.length;
    $('matchCountLabel').textContent = `${matchCount} match${matchCount!==1?'es':''} · ${rounds.length} rounds`;

    renderStats(rounds, filtered);
};

// ── Render stats ──────────────────────────────────────────────────────────────
function renderStats(rounds, matches) {
    if (!rounds.length) {
        $('statsBody').innerHTML = `<div class="panel"><div class="panel-body" style="text-align:center;padding:30px;color:var(--gray);font-size:13px;">No rounds match the current filters.</div></div>`;
        return;
    }

    const total   = rounds.length;
    const wins    = rounds.filter(r=>r.outcome==='Win').length;
    const kills   = rounds.reduce((s,r)=>s+r.kills,0);
    const deaths  = rounds.reduce((s,r)=>s+r.deaths,0);
    const hs      = rounds.reduce((s,r)=>s+(r.headshots||0),0);
    const plants  = rounds.reduce((s,r)=>s+(r.plants||0),0);
    const defuses = rounds.reduce((s,r)=>s+(r.defuses||0),0);
    const eKills  = rounds.reduce((s,r)=>s+(r.entryKill||0),0);
    const eDeaths = rounds.reduce((s,r)=>s+(r.entryDeath||0),0);
    const kostR   = rounds.filter(r=>r.kost).length;

    const kd      = deaths ? (kills/deaths).toFixed(2) : kills+'.0';
    const kpr     = (kills/total).toFixed(2);
    const winPct  = (wins/total*100).toFixed(0);
    const hsPct   = kills ? (hs/kills*100).toFixed(0) : 0;
    const kostPct = (kostR/total*100).toFixed(0);

    const atkR = rounds.filter(r=>r.side==='atk');
    const defR = rounds.filter(r=>r.side==='def');
    const atkW = atkR.filter(r=>r.outcome==='Win').length;
    const defW = defR.filter(r=>r.outcome==='Win').length;

    // Operator breakdown
    const ops = {};
    rounds.forEach(r=>{
        if(!r.operator) return;
        if(!ops[r.operator]) ops[r.operator]={rounds:0,kills:0,deaths:0,hs:0,wins:0,kost:0,entryKills:0};
        const o=ops[r.operator];
        o.rounds++; o.kills+=r.kills; o.deaths+=r.deaths; o.hs+=(r.headshots||0);
        if(r.outcome==='Win') o.wins++;
        if(r.kost) o.kost++;
        o.entryKills+=(r.entryKill||0);
    });
    const opEntries = Object.entries(ops).sort((a,b)=>b[1].rounds-a[1].rounds);

    let html = '';

    // ── Core KPIs ──────────────────────────────────────────────────────────
    html += `<div class="panel"><div class="panel-hdr"><i class="fas fa-chart-bar" style="color:#60a5fa;"></i> Core Stats</div><div class="panel-body">`;
    html += `<div class="kpi-strip">
        <div class="kpi kc-blue"><div class="kpi-val">${kd}</div><div class="kpi-lbl">K/D</div></div>
        <div class="kpi kc-red"><div class="kpi-val">${kpr}</div><div class="kpi-lbl">KPR</div></div>
        <div class="kpi kc-green"><div class="kpi-val">${winPct}%</div><div class="kpi-lbl">Win Rate</div></div>
        <div class="kpi kc-cyan"><div class="kpi-val">${kostPct}%</div><div class="kpi-lbl">KOST</div></div>
        <div class="kpi kc-amber"><div class="kpi-val">${hsPct}%</div><div class="kpi-lbl">HS%</div></div>
        <div class="kpi kc-purple"><div class="kpi-val">${total}</div><div class="kpi-lbl">Rounds</div></div>
    </div>`;

    // KOST bar
    html += `<div style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray);margin-bottom:4px;">
            <span style="font-weight:700;">KOST — Kill · Objective · Survived · Traded</span>
            <span style="color:#a78bfa;font-weight:700;">${kostR} / ${total} rounds (${kostPct}%)</span>
        </div>
        <div class="kost-bar-track"><div class="kost-bar-fill" style="width:${kostPct}%;"></div></div>
    </div>`;

    // Entry + objective
    html += `<div class="sdiv" style="margin-top:18px;"><i class="fas fa-bolt" style="font-size:10px;color:#fbbf24;"></i> Entry & Objective</div>`;
    html += `<div class="kpi-strip" style="grid-template-columns:repeat(4,1fr);">
        <div class="kpi kc-red"><div class="kpi-val">${eKills}</div><div class="kpi-lbl">Entry Kills</div></div>
        <div class="kpi kc-amber"><div class="kpi-val">${eDeaths}</div><div class="kpi-lbl">Entry Deaths</div></div>
        <div class="kpi kc-green"><div class="kpi-val">${plants}</div><div class="kpi-lbl">Plants</div></div>
        <div class="kpi kc-blue"><div class="kpi-val">${defuses}</div><div class="kpi-lbl">Defuses</div></div>
    </div>`;
    html += `</div></div>`;

    // ── ATK / DEF ──────────────────────────────────────────────────────────
    html += `<div class="panel"><div class="panel-hdr"><i class="fas fa-shield-halved" style="color:#60a5fa;"></i> Attack / Defence Split</div><div class="panel-body">`;
    html += `<div class="split-grid">
        <div class="split-card split-atk">
            <i class="fas fa-sword" style="color:#f87171;font-size:18px;margin-bottom:6px;display:block;"></i>
            <div class="split-val">${atkR.length?(atkW/atkR.length*100).toFixed(0):0}%</div>
            <div class="split-lbl">Attack Win Rate</div>
            <div class="split-sub">${atkW}W · ${atkR.length-atkW}L · ${atkR.reduce((s,r)=>s+r.kills,0)} kills · ${atkR.length} rounds</div>
        </div>
        <div class="split-card split-def">
            <i class="fas fa-shield-halved" style="color:#60a5fa;font-size:18px;margin-bottom:6px;display:block;"></i>
            <div class="split-val">${defR.length?(defW/defR.length*100).toFixed(0):0}%</div>
            <div class="split-lbl">Defence Win Rate</div>
            <div class="split-sub">${defW}W · ${defR.length-defW}L · ${defR.reduce((s,r)=>s+r.kills,0)} kills · ${defR.length} rounds</div>
        </div>
    </div></div></div>`;

    // ── Operator breakdown ─────────────────────────────────────────────────
    if (opEntries.length) {
        html += `<div class="panel"><div class="panel-hdr"><i class="fas fa-user-secret" style="color:#a78bfa;"></i> Operator Breakdown</div><div class="panel-body" style="overflow-x:auto;">`;
        html += `<table class="op-tbl"><thead><tr>
            <th>Operator</th><th>Role</th>
            <th class="tc">Rounds</th><th class="tc">K/D</th>
            <th class="tc">HS%</th><th class="tc">Win%</th><th class="tc">KOST%</th><th class="tc">Entry K</th>
        </tr></thead><tbody>`;
        opEntries.forEach(([opName, op]) => {
            const role = OP_ROLES[opName]||'flex';
            const clr  = OP_CLR[role]||OP_CLR.flex;
            html += `<tr>
                <td><div style="display:flex;align-items:center;gap:8px;">
                    <div class="op-av" style="background:${clr.bg};color:${clr.color};">${opName[0]}</div>
                    <span style="font-weight:700;">${x(opName)}</span>
                </div></td>
                <td><span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;background:${clr.bg};color:${clr.color};">${role}</span></td>
                <td class="tc">${op.rounds}</td>
                <td class="tc">${op.deaths?(op.kills/op.deaths).toFixed(2):op.kills+'.0'}</td>
                <td class="tc">${op.kills?(op.hs/op.kills*100).toFixed(0):0}%</td>
                <td class="tc">${(op.wins/op.rounds*100).toFixed(0)}%</td>
                <td class="tc">${(op.kost/op.rounds*100).toFixed(0)}%</td>
                <td class="tc">${op.entryKills}</td>
            </tr>`;
        });
        html += `</tbody></table></div></div>`;
    }

    // ── Recent matches ─────────────────────────────────────────────────────
    const sorted = [...matches].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,20);
    if (sorted.length) {
        html += `<div class="panel"><div class="panel-hdr"><i class="fas fa-clock-rotate-left" style="color:#34d399;"></i> Recent Matches</div><div class="panel-body">`;
        html += `<div class="match-cards">`;
        sorted.forEach(m => {
            const mRounds = m.rounds||[];
            const mWins   = mRounds.filter(r=>r.outcome==='Win').length;
            const mKills  = mRounds.reduce((s,r)=>s+r.kills,0);
            const mDeaths = mRounds.reduce((s,r)=>s+r.deaths,0);
            const mKost   = mRounds.filter(r=>r.kost).length;
            const isWin   = mWins > mRounds.length/2;
            const typeLabel = m.matchType==='gameday'?'🏆 Game Day':'🎯 Scrim';
            html += `<div class="match-card ${isWin?'win-card':'loss-card'}">
                <div class="mc-result">${isWin?'WIN':'LOSS'}</div>
                <div class="mc-info">
                    <div class="mc-title">vs ${x(m.opponent||'Unknown')} · ${x(m.teamName||'')}</div>
                    <div class="mc-sub">${m.date||''} · ${typeLabel} · ${mRounds.length} rounds</div>
                </div>
                <div class="mc-stats">
                    <div class="mc-stat"><div class="mc-stat-val">${mKills}/${mDeaths}</div><div class="mc-stat-lbl">K/D</div></div>
                    <div class="mc-stat"><div class="mc-stat-val">${mRounds.length?(mKost/mRounds.length*100).toFixed(0):0}%</div><div class="mc-stat-lbl">KOST</div></div>
                    <div class="mc-stat"><div class="mc-stat-val">${mWins}/${mRounds.length}</div><div class="mc-stat-lbl">Rounds W</div></div>
                </div>
            </div>`;
        });
        html += `</div></div></div>`;
    }

    $('statsBody').innerHTML = html;
}

// ── Share ─────────────────────────────────────────────────────────────────────
window.shareStats = function() {
    const uid  = viewUid;
    const url  = `${window.location.origin}${window.location.pathname}?uid=${uid}`;
    navigator.clipboard.writeText(url).then(() => {
        toast('Share link copied to clipboard!', 'success');
    }).catch(() => {
        // Fallback
        const el = document.createElement('textarea');
        el.value = url; document.body.appendChild(el); el.select();
        document.execCommand('copy'); el.remove();
        toast('Share link copied!', 'success');
    });
};

function toast(msg, type='success') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.innerHTML = `<i class="fas ${type==='error'?'fa-circle-xmark':'fa-circle-check'}"></i>${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

})();
</script>
</body>
</html>
