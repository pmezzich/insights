<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match History Pro — R6 Analytics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../styles/pro-global.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="../scripts/db-client.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="../scripts/firebase-config.js"></script>
    <script>if(localStorage.getItem('r6_theme')==='light')document.documentElement.classList.add('light-mode');</script>
    <script src="../scripts/theme.js"></script>
    <script src="../scripts/admin-preview.js"></script>
    <style>
        :root {
            --primary:      #7C3AED;
            --primary-dark: #6D28D9;
            --secondary:    #4F46E5;
            --dark:         #1E293B;
            --darker:       #0F172A;
            --light:        #F8FAFC;
            --gray:         #94A3B8;
            --success:      #10B981;
            --danger:       #EF4444;
            --warning:      #F59E0B;
            --info:         #3B82F6;
            --card-bg:      rgba(30, 41, 59, 0.75);
            --card-border:  rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            color: var(--light);
            min-height: 100vh;
            padding: 20px;
            background-image: url('https://images.contentstack.io/v3/assets/bltb6530b271fddd0b1/blt6577b1f58530e6b2/5eb7cdc165eec876c4b5d0d8/rainbow6siege_bloodmoon_splash.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ── CONTAINER ── */
        .container {
            max-width: 1060px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.93);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 48px rgba(0,0,0,0.7);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(14px);
        }

        /* ── NAV ── */
        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 28px;
            background: rgba(30, 41, 59, 0.9);
            border-bottom: 1px solid var(--card-border);
        }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { font-size: 22px; color: var(--primary); }
        .logo-text {
            font-size: 19px; font-weight: 700;
            background: linear-gradient(to right, #a78bfa, #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .nav-badge {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 10px; font-weight: 700;
            letter-spacing: 1.2px; padding: 2px 9px;
            border-radius: 20px; text-transform: uppercase;
        }
        .nav-right { display: flex; align-items: center; gap: 10px; }
        .match-pill {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 13px;
            background: rgba(124,58,237,0.12);
            border: 1px solid rgba(124,58,237,0.35);
            border-radius: 50px; font-size: 12px; color: #a78bfa; font-weight: 600;
        }

        /* ── PAGE TITLE ── */
        .page-title {
            display: flex; align-items: center; gap: 14px;
            padding: 20px 28px;
            background: rgba(15,23,42,0.5);
            border-bottom: 1px solid var(--card-border);
        }
        .page-title-icon {
            width: 42px; height: 42px; border-radius: 10px;
            background: rgba(124,58,237,0.18); border: 1px solid rgba(124,58,237,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; color: #a78bfa; flex-shrink: 0;
        }
        .page-title h2 { font-size: 18px; font-weight: 700; }
        .page-title p  { font-size: 12px; color: var(--gray); margin-top: 2px; }

        /* ── BTN ── */
        .btn {
            padding: 8px 16px; border-radius: 8px; border: none;
            cursor: pointer; font-weight: 600; font-size: 13px;
            display: inline-flex; align-items: center; gap: 7px;
            transition: all 0.18s; text-decoration: none; font-family: inherit;
        }
        .btn:hover { transform: translateY(-1px); }
        .btn-secondary { background: rgba(79,70,229,0.2); color: var(--light); border: 1px solid var(--secondary); }
        .btn-secondary:hover { background: rgba(79,70,229,0.35); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #DC2626; }

        /* ── CONTENT ── */
        .content { padding: 22px 26px; display: grid; gap: 18px; }

        /* ── FILTERS ── */
        .filters-panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 14px 18px;
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        .filter-label {
            font-size: 11px; font-weight: 700; color: var(--gray);
            text-transform: uppercase; letter-spacing: 0.7px;
            display: flex; align-items: center; gap: 5px;
        }
        .form-input {
            padding: 8px 11px;
            background: rgba(10,16,28,0.8);
            border: 1px solid var(--card-border);
            border-radius: 7px; color: var(--light);
            font-size: 13px; min-width: 145px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
        .result-filters { display: flex; gap: 6px; }
        .filter-btn {
            padding: 7px 13px; border-radius: 7px;
            border: 1px solid var(--card-border);
            cursor: pointer; font-size: 12px; font-weight: 600;
            background: rgba(30,41,59,0.7); color: var(--gray);
            transition: all 0.18s; display: inline-flex; align-items: center; gap: 5px;
            font-family: inherit;
        }
        .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--light); }
        .filter-btn.active-all  { background: rgba(124,58,237,0.18); border-color: rgba(124,58,237,0.6); color: #c4b5fd; }
        .filter-btn.active-won  { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.6);  color: #6ee7b7; }
        .filter-btn.active-lost { background: rgba(239,68,68,0.15);  border-color: rgba(239,68,68,0.6);   color: #fca5a5; }

        /* ── MATCH LIST ── */
        .match-list { display: grid; gap: 14px; }

        /* ── MATCH CARD ── */
        .match-card {
            background: rgba(22,33,54,0.85);
            border: 1px solid var(--card-border);
            border-radius: 14px; overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .match-card:hover {
            border-color: rgba(124,58,237,0.4);
            box-shadow: 0 4px 24px rgba(124,58,237,0.12);
        }

        /* Match header */
        .match-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 20px;
            background: rgba(30,41,59,0.55);
            border-bottom: 1px solid var(--card-border);
        }
        .match-left { display: flex; align-items: center; gap: 12px; }
        .match-opponent-wrap {}
        .vs-label { font-size: 9px; color: var(--gray); text-transform: uppercase; letter-spacing: 1.5px; }
        .match-opponent { font-size: 17px; font-weight: 700; line-height: 1.2; }
        .result-badge {
            padding: 4px 12px; border-radius: 20px;
            font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
            white-space: nowrap;
        }
        .result-badge.win  { background: rgba(16,185,129,0.18); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.5); }
        .result-badge.loss { background: rgba(239,68,68,0.18);  color: #fca5a5; border: 1px solid rgba(239,68,68,0.5); }
        .match-right { display: flex; align-items: center; gap: 10px; }
        .match-date { font-size: 12px; color: var(--gray); display: flex; align-items: center; gap: 5px; }

        .btn-delete {
            background: transparent; color: rgba(255,255,255,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 5px 10px; border-radius: 7px;
            font-size: 12px; cursor: pointer; transition: all 0.18s;
        }
        .btn-delete:hover { background: rgba(239,68,68,0.12); color: #fca5a5; border-color: rgba(239,68,68,0.4); }

        /* ── MAPS ── */
        .maps-container { padding: 14px 18px; display: grid; gap: 12px; }

        /* ── MAP CARD ── */
        .map-card {
            background: rgba(11,18,34,0.7);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px; overflow: hidden;
        }
        .map-card.win  { border-left: 3px solid rgba(16,185,129,0.7); }
        .map-card.loss { border-left: 3px solid rgba(239,68,68,0.6);  }

        .map-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 14px;
            background: rgba(30,41,59,0.45);
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .map-name-row { display: flex; align-items: center; gap: 8px; }
        .map-icon { color: rgba(167,139,250,0.8); font-size: 12px; }
        .map-name-text { font-size: 14px; font-weight: 700; }
        .map-score-pill {
            padding: 3px 11px; border-radius: 12px; font-size: 13px; font-weight: 800;
        }
        .map-score-pill.win  { background: rgba(16,185,129,0.18); color: #6ee7b7; }
        .map-score-pill.loss { background: rgba(239,68,68,0.18);  color: #fca5a5; }

        /* ── STAT CHIPS ── */
        .stat-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .chip {
            display: inline-flex; align-items: center; gap: 5px;
            background: rgba(30,41,59,0.7); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px; padding: 4px 11px; font-size: 12px;
        }
        .chip-label { color: var(--gray); }
        .chip-val { font-weight: 700; }
        .chip-plant   { border-color: rgba(251,191,36,0.25); } .chip-plant   .chip-val { color: #fbbf24; }
        .chip-defuse  { border-color: rgba(96,165,250,0.25); } .chip-defuse  .chip-val { color: #60a5fa; }
        .chip-against { border-color: rgba(239,68,68,0.2);  } .chip-against .chip-val { color: #fca5a5; }
        .chip-atk     { border-color: rgba(251,146,60,0.25);} .chip-atk     .chip-val { color: #fb923c; }
        .chip-def     { border-color: rgba(167,139,250,0.25);} .chip-def    .chip-val { color: #a78bfa; }

        /* ── PLAYER STATS ── */
        .player-stats-section { padding: 10px 14px; }
        .section-label {
            font-size: 10px; font-weight: 700; color: rgba(148,163,184,0.6);
            text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 8px; display: flex; align-items: center; gap: 5px;
        }
        .player-row {
            display: flex; align-items: center; gap: 8px;
            padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .player-row:last-child { border-bottom: none; }
        .player-tag {
            background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.25);
            border-radius: 6px; padding: 4px 10px;
            font-size: 11px; font-weight: 600; color: #c4b5fd;
            min-width: 95px; text-align: center;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .kpi-row { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
        .kpi {
            border-radius: 5px; min-width: 48px; text-align: center;
            padding: 3px 5px; border: 1px solid transparent;
        }
        .kpi-lbl { font-size: 9px; color: var(--gray); display: block; margin-bottom: 1px; text-transform: uppercase; letter-spacing: 0.3px; }
        .kpi-val { font-weight: 700; font-size: 13px; }
        .g  { background: rgba(16,185,129,0.1);  border-color: rgba(16,185,129,0.5); }
        .m  { background: rgba(245,158,11,0.1);  border-color: rgba(245,158,11,0.5); }
        .b  { background: rgba(239,68,68,0.1);   border-color: rgba(239,68,68,0.4);  }
        .bl { background: rgba(59,130,246,0.1);  border-color: rgba(59,130,246,0.4); }
        .no-players { font-size: 12px; color: var(--gray); padding: 6px 0; display: flex; align-items: center; gap: 6px; }

        /* ── ROUNDS TOGGLE ── */
        .rounds-toggle {
            width: 100%; background: rgba(30,41,59,0.3);
            border: none; border-top: 1px solid rgba(255,255,255,0.06);
            color: var(--gray); font-size: 12px; font-weight: 600;
            padding: 9px 14px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 7px;
            transition: all 0.18s; font-family: inherit; letter-spacing: 0.2px;
        }
        .rounds-toggle:hover { background: rgba(124,58,237,0.08); color: #a78bfa; }
        .chevron { transition: transform 0.2s; }
        .rounds-toggle.open .chevron { transform: rotate(180deg); }

        /* ── ROUNDS PANEL ── */
        .rounds-panel { display: none; background: rgba(8,13,26,0.6); }
        .rounds-panel.open { display: block; }

        /* ── ROUND TABLE ── */
        .round-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .round-table th {
            text-align: left; color: rgba(148,163,184,0.7);
            font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px;
            padding: 10px 10px 7px; border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .round-table td { padding: 7px 10px; border-bottom: 1px solid rgba(255,255,255,0.035); vertical-align: middle; }
        .round-table tr:last-child td { border-bottom: none; }
        .round-table tr.won  td { background: rgba(16,185,129,0.03); }
        .round-table tr.lost td { background: rgba(239,68,68,0.03);  }

        .rnd { color: rgba(148,163,184,0.6); font-weight: 700; font-size: 11px; }

        .phase-pill {
            display: inline-block; padding: 2px 8px; border-radius: 5px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .phase-pill.atk { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.35); }
        .phase-pill.def { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.35); }

        .outcome-pill {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 8px; border-radius: 9px; font-size: 11px; font-weight: 600; white-space: nowrap;
        }
        /* wins */
        .outcome-win   { background: rgba(16,185,129,0.15);  color: #6ee7b7; }
        .outcome-won   { background: rgba(16,185,129,0.15);  color: #6ee7b7; }
        /* losses */
        .outcome-loss  { background: rgba(239,68,68,0.15);   color: #fca5a5; }
        .outcome-lost  { background: rgba(239,68,68,0.15);   color: #fca5a5; }

        .site-pill {
            display: inline-block;
            background: rgba(30,41,59,0.9); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 5px; padding: 2px 8px; font-size: 11px; color: var(--gray);
            max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .plant-lbl  { color: #fbbf24; font-weight: 600; font-size: 11px; }
        .defuse-lbl { color: #60a5fa; font-weight: 600; font-size: 11px; }
        .nil { color: rgba(255,255,255,0.15); }

        .score-pill { display: inline-flex; align-items: center; gap: 3px; font-size: 12px; font-weight: 800; }
        .score-pill .su { color: #6ee7b7; }
        .score-pill .so { color: #fca5a5; }
        .score-pill .sd { color: rgba(148,163,184,0.5); }

        /* ── EMPTY STATE ── */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--gray); }
        .empty-state i { font-size: 44px; margin-bottom: 14px; color: rgba(124,58,237,0.3); display: block; }
        .empty-state p { font-size: 14px; }

        /* ── LOADING ── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: rgba(10,16,30,0.96);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 9999; gap: 14px;
        }
        .loading-overlay.hidden { display: none; }
        .spinner {
            width: 42px; height: 42px;
            border: 3px solid rgba(124,58,237,0.15);
            border-top-color: var(--primary); border-radius: 50%;
            animation: spin 0.75s linear infinite;
        }
        .loading-text { color: var(--gray); font-size: 14px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── TOAST ── */
        .toast {
            position: fixed; bottom: 22px; right: 22px;
            padding: 11px 17px; border-radius: 10px;
            font-size: 13px; font-weight: 600; z-index: 9998;
            display: flex; align-items: center; gap: 7px;
            animation: tin 0.2s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .toast.success { background: rgba(16,185,129,0.95); color: white; }
        .toast.error   { background: rgba(239,68,68,0.95);  color: white; }
        @keyframes tin { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.78);
            display: flex; align-items: center; justify-content: center;
            z-index: 9990; backdrop-filter: blur(5px);
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: rgba(18,26,46,0.99); border: 1px solid var(--card-border);
            border-radius: 14px; padding: 30px 26px 22px;
            max-width: 390px; width: 90%; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .modal-icon { font-size: 32px; color: var(--danger); margin-bottom: 12px; }
        .modal-box h3 { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
        .modal-box p  { color: var(--gray); font-size: 13px; line-height: 1.6; margin-bottom: 22px; }
        .modal-actions { display: flex; gap: 10px; justify-content: center; }
        .modal-actions .btn { min-width: 105px; justify-content: center; }

        @media (max-width: 680px) {
            body { padding: 10px; }
            .content { padding: 14px; }
            .nav-header, .page-title { padding: 14px 16px; }
            .filters-panel { flex-direction: column; align-items: stretch; }
            .form-input { min-width: unset; }
            .match-header { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
            .maps-container { padding: 10px 12px; }
            .round-table { font-size: 11px; }
            .round-table th, .round-table td { padding: 5px 6px; }
        }
    
/* ── MULTI-SELECT DROPDOWN ── */
.ms-wrap{position:relative;display:inline-block;min-width:160px;width:100%;}
.ms-btn{width:100%;padding:10px 32px 10px 12px;border-radius:8px;border:1px solid var(--card-border);background:rgba(10,16,28,0.85);color:var(--light);font-size:13px;font-family:inherit;cursor:pointer;text-align:left;position:relative;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:border-color .2s;}
.ms-btn:hover,.ms-btn.open{border-color:var(--primary);}
.ms-btn::after{content:'\\f078';font-family:'Font Awesome 6 Free';font-weight:900;font-size:10px;position:absolute;right:10px;top:50%;transform:translateY(-50%);color:var(--gray);pointer-events:none;transition:transform .2s;}
.ms-btn.open::after{transform:translateY(-50%) rotate(180deg);}
.ms-dropdown{position:absolute;top:calc(100% + 4px);left:0;min-width:100%;width:max-content;max-width:280px;background:rgba(15,23,42,0.98);border:1px solid rgba(124,58,237,0.4);border-radius:8px;padding:6px 0;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.6);max-height:240px;overflow-y:auto;}
.ms-dropdown.open{display:block;}
.ms-item{display:flex;align-items:center;gap:9px;padding:8px 12px;cursor:pointer;font-size:13px;transition:background .12s;}
.ms-item:hover{background:rgba(124,58,237,0.12);}
.ms-item input[type=checkbox]{width:14px;height:14px;accent-color:var(--primary);cursor:pointer;flex-shrink:0;}
.ms-item label{cursor:pointer;flex:1;white-space:nowrap;}
.ms-sep{height:1px;background:var(--card-border);margin:4px 0;}
.ms-clear{padding:7px 12px;font-size:11px;color:rgba(148,163,184,0.5);cursor:pointer;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.ms-clear:hover{color:#a78bfa;}

    </style>
</head>
<body>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-text">Loading match history…</div>
    </div>

    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-icon"><i class="fas fa-trash-can"></i></div>
            <h3>Delete Match?</h3>
            <p>Permanently remove the match vs <strong id="delOpponent"></strong>? This cannot be undone.</p>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="cancelDelete()"><i class="fas fa-xmark"></i> Cancel</button>
                <button class="btn btn-danger"    onclick="confirmDelete()"><i class="fas fa-trash-can"></i> Delete</button>
            </div>
        </div>
    </div>

    <div class="container">

        <div class="nav-header">
            <a href="index_pro.html" class="logo">
                <img src="../styles/r6_insights.png" class="logo-img" alt="R6 Insights">
                <div class="logo-text">R6 INSIGHTS</div>
                
            </a>
            <div class="nav-right">
                <div class="match-pill" id="matchPill" style="display:none;">
                    <i class="fas fa-clock-rotate-left"></i>
                    <span id="matchPillText">0 matches</span>
                </div>
                <a href="index_pro.html" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Hub</a>
                <a href="profile.html" id="navAvatar" class="nav-avatar-btn" title="Profile">?</a>
                <button class="btn btn-secondary" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Logout</button>
            </div>
        </div>

        <div class="page-title">
            <div class="page-title-icon"><i class="fas fa-clock-rotate-left"></i></div>
            <div>
                <h2>Match History</h2>
                <p>Per-round breakdowns from uploaded replays</p>
            </div>
        </div>

        <div class="content">

            <div class="filters-panel">
                <span class="filter-label"><i class="fas fa-filter"></i> Filter</span>
                <div class="ms-wrap" style="min-width:160px;" id="oppWrap"><button class="ms-btn" id="oppBtn" type="button">All Opponents</button><div class="ms-dropdown" id="oppDrop"></div></div>
                <select id="filterMap"  class="form-input"><option value="">All Maps</option></select>
                <select id="filterType" class="form-input">
                    <option value="">All Types</option>
                    <option value="scrim">Scrim</option>
                    <option value="gameday">Game Day</option>
                </select>
                <div class="result-filters">
                    <button class="filter-btn active-all" data-filter="all"><i class="fas fa-list"></i> All</button>
                    <button class="filter-btn" data-filter="won"><i class="fas fa-trophy"></i> Wins</button>
                    <button class="filter-btn" data-filter="lost"><i class="fas fa-skull"></i> Losses</button>
                </div>
            </div>

            <div class="match-list" id="matchList"></div>

        </div>
    </div>

    <script>
    (function () {
        firebase.initializeApp(FIREBASE_CONFIG);
        const auth = firebase.auth();


/* ── Multi-select helper ── */
function buildMultiSelect(wrapperId, btnId, dropId, options, placeholder) {
    var wrap = document.getElementById(wrapperId);
    if (!wrap) return;
    var btn  = document.getElementById(btnId);
    var drop = document.getElementById(dropId);
    if (!btn || !drop) return;
    drop.innerHTML = '<div class="ms-clear" onclick="clearMultiSelect(&quot;'+dropId+'&quot;,&quot;'+btnId+'&quot;,&quot;'+placeholder+'&quot;)">Clear selection</div><div class="ms-sep"></div>';
    options.forEach(function(opt) {
        var item = document.createElement('div');
        item.className = 'ms-item';
        var safeOpt = opt.replace(/"/g,'&quot;');
        var id = 'ms_'+dropId+'_'+opt.replace(/[^a-z0-9]/gi,'_');
        item.innerHTML = '<input type="checkbox" id="'+id+'" value="'+safeOpt+'"><label for="'+id+'">'+opt+'</label>';
        drop.appendChild(item);
    });
    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        drop.classList.toggle('open');
        btn.classList.toggle('open');
    });
    drop.addEventListener('change', function() { updateMultiSelectLabel(btnId, dropId, placeholder); });
    document.addEventListener('click', function(e) {
        if (!wrap.contains(e.target)) { drop.classList.remove('open'); btn.classList.remove('open'); }
    });
}
function getMultiSelectValues(dropId) {
    var drop = document.getElementById(dropId);
    if (!drop) return [];
    return Array.from(drop.querySelectorAll('input[type=checkbox]:checked')).map(function(cb){ return cb.value; });
}
function updateMultiSelectLabel(btnId, dropId, placeholder) {
    var vals = getMultiSelectValues(dropId);
    var btn  = document.getElementById(btnId);
    if (!btn) return;
    if (vals.length === 0) btn.textContent = placeholder;
    else if (vals.length === 1) btn.textContent = vals[0];
    else btn.textContent = vals.length+' selected';
}
function clearMultiSelect(dropId, btnId, placeholder) {
    var drop = document.getElementById(dropId);
    if (drop) drop.querySelectorAll('input[type=checkbox]').forEach(function(cb){ cb.checked=false; });
    var btn = document.getElementById(btnId);
    if (btn) btn.textContent = placeholder;
}

        let allMatches = [], currentTeamId = null, playerNames = {}, isCaptain = false, pendingDel = null;
        const $ = id => document.getElementById(id);

        // ── Auth ──────────────────────────────────────────────────────────────
        auth.onAuthStateChanged(async user => {
            if (!user) return (window.location.href = 'index_pro.html');
            if (!user.emailVerified) return (window.location.href = 'index_pro.html');
            R6Theme.init(user.uid, db);
            try {
                showLoading();
                currentTeamId = await getPreviewTeamId(user, db);
                if (!currentTeamId) throw new Error('No team association');

                const roleSnap = await db.ref(`teams/${currentTeamId}/players/${user.uid}/role`).once('value');
                isCaptain = roleSnap.val() === 'captain';

                const mSnap = await db.ref(`teams/${currentTeamId}/matches_pro`).once('value');
                const raw = mSnap.val() || {};
                allMatches = Object.entries(raw).map(([id, m]) => {
                    let maps = m.maps;
                    if (!maps) maps = [];
                    else if (!Array.isArray(maps)) maps = Object.values(maps);
                    return { id, ...m, maps, timestamp: new Date(m.timestamp || m.date || Date.now()) };
                }).sort((a, b) => b.timestamp - a.timestamp);

                const pSnap = await db.ref(`teams/${currentTeamId}/players`).once('value');
                pSnap.forEach(c => {
                    const p = c.val();
                    if (p?.username) playerNames[p.username] = p.displayName || p.username;
                });

                $('matchPillText').textContent = allMatches.length + ' matches';
                $('matchPill').style.display = 'flex';

                populateFilters();
                renderMatches();
            } catch (e) {
                toast('Load failed: ' + e.message, 'error');
            } finally {
                hideLoading();
            }
        });

        // ── Filters ───────────────────────────────────────────────────────────
        function populateFilters() {
            buildMultiSelect('oppWrap','oppBtn','oppDrop',[...new Set(allMatches.map(m=>m.opponent).filter(Boolean))].sort(),'All Opponents');
            [...new Set(allMatches.flatMap(m => m.maps.map(mp => mp.mapName)).filter(Boolean))].sort()
                .forEach(m => { $('filterMap').innerHTML += `<option value="${x(m)}">${x(m)}</option>`; });
        }

        document.querySelectorAll('.filter-btn').forEach(btn =>
            btn.addEventListener('click', e => {
                const f = e.currentTarget.dataset.filter;
                document.querySelectorAll('.filter-btn').forEach(b => { b.className = 'filter-btn'; });
                e.currentTarget.classList.add('active-' + f);
                renderMatches();
            })
        );
        // filterTeam replaced by multi-select — changes fire via buildMultiSelect's 'change' listener
        $('filterMap').addEventListener('change', renderMatches);
        $('filterType') && $('filterType').addEventListener('change', renderMatches);

        // ── Render ────────────────────────────────────────────────────────────
        function renderMatches() {
            const oppSels = getMultiSelectValues('oppDrop');
            const selMap  = $('filterMap').value;
            const selType = $('filterType') ? $('filterType').value : '';
            const f       = (document.querySelector('.filter-btn[class*="active-"]') || {}).dataset?.filter || 'all';
            const list    = $('matchList');

            const filtered = allMatches.filter(m => {
                if (oppSels.length > 0 && oppSels.indexOf(m.opponent) < 0) return false;
                if (selMap  && !m.maps.some(mp => mp.mapName === selMap)) return false;
                if (selType && (m.matchType||'scrim') !== selType) return false;
                if (f === 'won'  && !isWin(m)) return false;
                if (f === 'lost' &&  isWin(m)) return false;
                return true;
            });

            if (!filtered.length) {
                list.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open"></i><p>No matches found.</p></div>`;
                return;
            }
            list.innerHTML = filtered.map(m => matchCard(m, selMap)).join('');
        }

        // ── Match Card ────────────────────────────────────────────────────────
        function matchCard(m, selMap) {
            const win  = isWin(m);
            const mapW = m.maps.filter(mp => (mp.teamScore||0) > (mp.opponentScore||0)).length;
            const mapL = m.maps.filter(mp => (mp.teamScore||0) < (mp.opponentScore||0)).length;
            const date = m.timestamp.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
            const del  = isCaptain
                ? `<button class="btn-delete" onclick="promptDelete('${m.id}','${x(m.opponent||'Unknown')}')" title="Delete">
                       <i class="fas fa-trash-can"></i>
                   </button>` : '';

            return `
            <div class="match-card" id="match-${m.id}">
                <div class="match-header">
                    <div class="match-left">
                        <div class="match-opponent-wrap">
                            <div class="vs-label">vs</div>
                            <div class="match-opponent">${x(m.opponent || 'Unknown')}</div>
                        </div>
                        <span class="result-badge ${win?'win':'loss'}">
                            ${win ? '🏆 WIN' : '💀 LOSS'} ${mapW}–${mapL}
                        </span>
                    </div>
                    <div class="match-right">
                        <span class="match-date"><i class="fas fa-calendar-days"></i> ${date}</span>
                        ${del}
                    </div>
                </div>
                <div class="maps-container">
                    ${m.maps.filter(mp => !selMap || mp.mapName === selMap).map((mp,i) => mapCard(m, mp, i)).join('')}
                </div>
            </div>`;
        }

        // ── Map Card ──────────────────────────────────────────────────────────
        function mapCard(match, map, idx) {
            const win   = (map.teamScore||0) > (map.opponentScore||0);
            const total = (map.teamScore||0) + (map.opponentScore||0);
            const uid   = `rp-${match.id}-${idx}`;

            // Plants/defuses from annotations
            const ann = getAnnotations(match, map);
            const plants = ann.filter(r => r?.plantedBy).length;
            const defuses = ann.filter(r => r?.defusedBy).length;

            // Planted against: rounds we lost that had a plant
            const rounds = normRounds(map);
            const plantedAgainst = rounds.filter(r => {
                const o = (r.outcome||'').toLowerCase();
                return (o === 'loss' || o.startsWith('lost')) && plantedInRound(r);
            }).length;

            // ATK/DEF wins from round data
            let atkW=0, atkT=0, defW=0, defT=0;
            rounds.forEach(r => {
                const side = roundSide(r, map);
                const won  = isRoundWin(r);
                if (side === 'atk') { atkT++; if (won) atkW++; }
                else                { defT++; if (won) defW++; }
            });

            // Player stats aggregated from round events
            const plStats = aggregateStats(map);
            const roundTable = buildRoundTable(match, map);

            return `
            <div class="map-card ${win?'win':'loss'}">
                <div class="map-header">
                    <div class="map-name-row">
                        <i class="fas fa-map-location-dot map-icon"></i>
                        <span class="map-name-text">${x(map.mapName||'Unknown Map')}</span>
                    </div>
                    <span class="map-score-pill ${win?'win':'loss'}">${map.teamScore??'?'} – ${map.opponentScore??'?'}</span>
                </div>

                <div class="stat-chips">
                    <div class="chip chip-plant"><span>🌱</span><span class="chip-label">Plants</span><span class="chip-val">${plants}</span></div>
                    <div class="chip chip-defuse"><span>🧯</span><span class="chip-label">Defuses</span><span class="chip-val">${defuses}</span></div>
                    <div class="chip chip-against"><span>💣</span><span class="chip-label">Planted Against</span><span class="chip-val">${plantedAgainst}</span></div>
                    ${atkT > 0 ? `<div class="chip chip-atk"><span>⚔️</span><span class="chip-label">ATK</span><span class="chip-val">${atkW}/${atkT}</span></div>` : ''}
                    ${defT > 0 ? `<div class="chip chip-def"><span>🛡️</span><span class="chip-label">DEF</span><span class="chip-val">${defW}/${defT}</span></div>` : ''}
                </div>

                <div class="player-stats-section">
                    ${renderPlayerStats(plStats, total)}
                </div>

                ${roundTable ? `
                <button class="rounds-toggle" id="tog-${uid}" onclick="toggleRounds('${uid}')">
                    <i class="fas fa-list-ol"></i>
                    Round Breakdown (${total} rounds)
                    <i class="fas fa-chevron-down chevron"></i>
                </button>
                <div class="rounds-panel" id="${uid}">${roundTable}</div>` : ''}
            </div>`;
        }

        // ── Player stat aggregation from round events ─────────────────────────
        // FinalVersion saves rounds with r.players (array) and r.events (kill events)
        function aggregateStats(map) {
            const rounds = normRounds(map);
            const stats  = {}; // name -> {kills,deaths,headshots,teamIdx}
            let yourIdx  = 0;

            rounds.forEach(r => {
                // yourTeamIndex is saved per-round by FinalVersion
                if (r.yourTeamIndex !== undefined && r.yourTeamIndex !== null) yourIdx = Number(r.yourTeamIndex);

                const players = Array.isArray(r.players) ? r.players : [];
                players.forEach(p => {
                    const name = p.name || p.username || '';
                    if (!name) return;
                    if (!stats[name]) stats[name] = { kills:0, deaths:0, headshots:0, teamIdx: p.teamIndex ?? null };
                    if (stats[name].teamIdx === null && p.teamIndex !== undefined) stats[name].teamIdx = Number(p.teamIndex);
                });

                const events = Array.isArray(r.events) ? r.events : [];
                events.forEach(ev => {
                    const t = (ev.type || '').toLowerCase();
                    if (t === 'kill') {
                        const killer = ev.username || ev.killer || ev.source || '';
                        const victim = ev.target   || ev.victim || '';
                        if (killer && stats[killer]) {
                            stats[killer].kills++;
                            if (ev.headshot || ev.isHeadshot || ev.hitArea === 'Head' || ev.hitArea === 'head') stats[killer].headshots++;
                        }
                        if (victim && stats[victim]) stats[victim].deaths++;
                    }
                });
            });

            // Return only our team; fall back to map.players if no round data
            const ours = Object.fromEntries(
                Object.entries(stats).filter(([_, s]) => s.teamIdx === yourIdx)
            );

            // Fallback: if FinalVersion saved map.players directly, use that
            if (!Object.keys(ours).length && map.players && Object.keys(map.players).length) {
                const fp = {};
                Object.entries(map.players).forEach(([k, v]) => {
                    fp[k] = { kills: parseInt(v.kills)||0, deaths: parseInt(v.deaths)||0, headshots: 0, teamIdx: 0 };
                });
                return fp;
            }
            return ours;
        }

        function renderPlayerStats(stats, totalRounds) {
            const entries = Object.entries(stats);
            if (!entries.length)
                return `<div class="no-players"><i class="fas fa-circle-info"></i> No player data in this match</div>`;

            const label = `<div class="section-label"><i class="fas fa-users"></i> Player Stats</div>`;
            const rows  = entries.map(([name, s]) => {
                const k    = s.kills;
                const d    = s.deaths;
                const hs   = s.headshots || 0;
                const kd   = d > 0 ? k/d : k;
                const kpr  = totalRounds > 0 ? k/totalRounds : 0;
                const sr   = totalRounds > 0 ? (totalRounds-d)/totalRounds*100 : 0;
                const hsp  = k > 0 ? hs/k*100 : 0;

                const kCl  = k  >= 6 ? 'g' : k  >= 3 ? 'm' : 'b';
                const dCl  = d  >= 4 ? 'b' : d  >= 2 ? 'm' : 'g';
                const kdCl = kd >  1 ? 'g' : kd === 1? 'm' : 'b';
                const srCl = sr >= 60? 'g' : sr >= 40? 'm' : 'b';
                const kprCl= kpr>=0.7? 'g' : kpr>=0.4? 'm' : 'b';

                const display = playerNames[name] || name;
                return `
                <div class="player-row">
                    <div class="player-tag" title="${x(display)}">${x(display)}</div>
                    <div class="kpi-row">
                        <div class="kpi ${kCl}"><span class="kpi-lbl">K</span><span class="kpi-val">${k}</span></div>
                        <div class="kpi ${dCl}"><span class="kpi-lbl">D</span><span class="kpi-val">${d}</span></div>
                        <div class="kpi ${kdCl}"><span class="kpi-lbl">KD</span><span class="kpi-val">${kd.toFixed(2)}</span></div>
                        <div class="kpi ${kprCl}"><span class="kpi-lbl">KPR</span><span class="kpi-val">${kpr.toFixed(2)}</span></div>
                        <div class="kpi ${srCl}"><span class="kpi-lbl">SR%</span><span class="kpi-val">${sr.toFixed(0)}%</span></div>
                        ${k > 0 ? `<div class="kpi bl"><span class="kpi-lbl">HS%</span><span class="kpi-val">${hsp.toFixed(0)}%</span></div>` : ''}
                    </div>
                </div>`;
            }).join('');
            return label + rows;
        }

        // ── Round Table ───────────────────────────────────────────────────────
        function normRounds(map) {
            if (!map.rounds) return [];
            const arr = Array.isArray(map.rounds) ? map.rounds : Object.values(map.rounds);
            return arr.filter(Boolean).sort((a,b) =>
                parseInt(a.roundNumber||a.round||0) - parseInt(b.roundNumber||b.round||0)
            );
        }

        // Determine our side for a round:
        // FinalVersion saves r.yourRole ("Attack"/"Defense") or r.teams[yourTeamIndex].role
        function roundSide(r, map) {
            // Direct from FinalVersion saved data
            const role = (r.yourRole || '').toLowerCase();
            if (role.includes('attack') || role === 'atk') return 'atk';
            if (role.includes('defen')  || role === 'def') return 'def';

            // Try teams array
            if (Array.isArray(r.teams)) {
                const idx = r.yourTeamIndex ?? 0;
                const t   = r.teams[idx];
                const tr  = (t?.role || t?.name || '').toLowerCase();
                if (tr.includes('attack') || tr === 'atk') return 'atk';
                if (tr.includes('defen')  || tr === 'def') return 'def';
            }

            // Fallback: compute from map startingSide + round number
            const n    = parseInt(r.roundNumber || r.round || 0);
            const side = (map.startingSide || '').toLowerCase();
            if (n <= 6)       return side === 'attack' ? 'atk' : 'def';
            if (n <= 12)      return side === 'attack' ? 'def' : 'atk';
            return ((n - 12) % 2 === 1) ? 'atk' : 'def';
        }

        function isRoundWin(r) {
            const o = (r.outcome || '').toLowerCase().trim();
            return o === 'win' || o === 'won' || o.startsWith('won');
        }

        // Did bomb get planted in this round? (outcome includes 'plant', or events have plant type)
        function plantedInRound(r) {
            const o = (r.outcome||'').toLowerCase();
            if (o.includes('plant')) return true;
            if (Array.isArray(r.events)) return r.events.some(e => (e.type||'').toLowerCase().includes('plant'));
            return false;
        }

        function buildRoundTable(match, map) {
            const rounds = normRounds(map);
            if (!rounds.length) return null;

            const ann    = getAnnotations(match, map);
            const annMap = {};
            ann.forEach(a => { if (a) annMap[parseInt(a.round||0)] = a; });

            let us=0, them=0;
            let rows = '';

            rounds.forEach(r => {
                const n    = parseInt(r.roundNumber || r.round || 0);
                const won  = isRoundWin(r);
                const side = roundSide(r, map);
                const site = r.site || r.siteRaw || '';
                const a    = annMap[n] || {};
                const pBy  = a.plantedBy ? (playerNames[a.plantedBy] || a.plantedBy) : '';
                const dBy  = a.defusedBy ? (playerNames[a.defusedBy] || a.defusedBy) : '';

                if (won) us++; else them++;

                // Outcome display — FinalVersion saves "Win" / "Loss"
                const rawOutcome  = (r.outcome || '').trim();
                const outClass    = won ? 'outcome-win' : 'outcome-loss';
                const outLabel    = won ? '✅ Win' : '❌ Loss';

                rows += `
                <tr class="${won?'won':'lost'}">
                    <td class="rnd">R${n}</td>
                    <td><span class="phase-pill ${side}">${side === 'atk' ? 'ATK' : 'DEF'}</span></td>
                    <td><span class="outcome-pill ${outClass}">${outLabel}</span></td>
                    <td>${site ? `<span class="site-pill" title="${x(site)}">${x(site)}</span>` : '<span class="nil">—</span>'}</td>
                    <td>${pBy ? `<span class="plant-lbl"><i class="fas fa-bomb" style="font-size:9px;margin-right:3px;"></i>${x(pBy)}</span>` : '<span class="nil">—</span>'}</td>
                    <td>${dBy ? `<span class="defuse-lbl"><i class="fas fa-shield-halved" style="font-size:9px;margin-right:3px;"></i>${x(dBy)}</span>` : '<span class="nil">—</span>'}</td>
                    <td><div class="score-pill"><span class="su">${us}</span><span class="sd">–</span><span class="so">${them}</span></div></td>
                </tr>`;
            });

            return `
            <table class="round-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Side</th>
                        <th>Outcome</th>
                        <th>Site</th>
                        <th><i class="fas fa-bomb" style="color:#fbbf24;"></i> Plant</th>
                        <th><i class="fas fa-shield-halved" style="color:#60a5fa;"></i> Defuse</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>`;
        }

        // ── Annotation helpers ────────────────────────────────────────────────
        function norm(s) { return (s||'').toLowerCase().replace(/[^a-z0-9]/g,''); }

        function getAnnotations(match, map) {
            const ex    = match.extras || {};
            const byMap = ex.roundPlantsDefusesByMap || {};
            const key   = norm(map.mapName||'');
            for (const k of Object.keys(byMap)) {
                if (norm(k) === key) return Array.isArray(byMap[k]) ? byMap[k] : [];
            }
            if (Array.isArray(ex.roundPlantsDefuses)) {
                return ex.roundPlantsDefuses.filter(r => !r.map || norm(r.map) === key);
            }
            return [];
        }

        // ── Toggles ───────────────────────────────────────────────────────────
        window.toggleRounds = function(id) {
            const panel  = document.getElementById(id);
            const toggle = document.getElementById('tog-' + id);
            if (!panel || !toggle) return;
            panel.classList.toggle('open');
            toggle.classList.toggle('open');
        };

        // ── Delete ────────────────────────────────────────────────────────────
        window.promptDelete = function(id, opp) {
            pendingDel = id;
            $('delOpponent').textContent = opp;
            $('deleteModal').classList.remove('hidden');
        };
        window.cancelDelete = function() { pendingDel = null; $('deleteModal').classList.add('hidden'); };
        window.confirmDelete = async function() {
            if (!pendingDel) return;
            $('deleteModal').classList.add('hidden');
            try {
                await db.ref(`teams/${currentTeamId}/matches_pro/${pendingDel}`).remove();
                allMatches = allMatches.filter(m => m.id !== pendingDel);
                const card = $('match-' + pendingDel);
                if (card) {
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    card.style.opacity = '0'; card.style.transform = 'scale(0.97)';
                    setTimeout(() => { card.remove(); $('matchPillText').textContent = allMatches.length + ' matches'; }, 300);
                }
                toast('Match deleted.', 'success');
            } catch (e) { toast('Delete failed: ' + e.message, 'error'); }
            pendingDel = null;
        };

        // ── Helpers ───────────────────────────────────────────────────────────
        function isWin(match) {
            return match.maps.filter(m => (m.teamScore||0) > (m.opponentScore||0)).length >
                   match.maps.filter(m => (m.teamScore||0) < (m.opponentScore||0)).length;
        }
        function x(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
        function showLoading() { $('loadingOverlay').classList.remove('hidden'); }
        function hideLoading() { $('loadingOverlay').classList.add('hidden'); }
        function toast(msg, type='success') {
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<i class="fas ${type==='success'?'fa-circle-check':'fa-circle-xmark'}"></i> ${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3500);
        }
        function logout() { auth.signOut().then(()=>window.location.href='index_pro.html'); }
        window.logout = logout;

    })();
    </script>
