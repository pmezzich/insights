<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Match Notes — R6 Insights</title>
<link rel="stylesheet" href="../styles/pro-global.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="../scripts/firebase-config.js"></script>
<script>if(localStorage.getItem('r6_theme')==='light')document.documentElement.classList.add('light-mode');</script>
<script src="../scripts/theme.js"></script>
<script src="../scripts/admin-preview.js"></script>
<style>
body { background-color: var(--darker); min-height: 100vh; padding-bottom: 60px; }

/* ── LAYOUT ─────────────────────────────────────────────────────── */
.main-layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 0;
    height: calc(100vh - 110px); /* nav + title bar */
    overflow: hidden;
}

/* ── MATCH LIST SIDEBAR ─────────────────────────────────────────── */
.sidebar {
    border-right: 1px solid var(--card-border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: rgba(15,23,42,0.5);
}
.sidebar-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--card-border);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15,23,42,0.7);
    flex-shrink: 0;
}
.sidebar-search {
    flex: 1;
    background: rgba(10,16,28,0.8);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    color: var(--light);
    font-family: inherit;
    font-size: 12px;
    padding: 7px 11px;
    outline: none;
    transition: border-color .15s;
}
.sidebar-search:focus { border-color: var(--primary); }
.match-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
}
.match-item {
    padding: 11px 13px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: 3px;
}
.match-item:hover {
    background: rgba(124,58,237,0.06);
    border-color: rgba(124,58,237,0.2);
}
.match-item.active {
    background: rgba(124,58,237,0.1);
    border-color: rgba(124,58,237,0.4);
}
.match-item-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}
.match-result {
    font-size: 11px;
    font-weight: 800;
    width: 18px;
    flex-shrink: 0;
}
.match-opp {
    font-size: 13px;
    font-weight: 700;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--light);
}
.match-has-notes {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #a78bfa;
    flex-shrink: 0;
    box-shadow: 0 0 5px rgba(167,139,250,0.5);
}
.match-item-bottom {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-left: 26px;
}
.match-date { font-size: 11px; color: var(--gray); }
.match-type {
    font-size: 10px;
    color: var(--gray);
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--card-border);
    padding: 1px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: .3px;
}
.match-score { font-size: 11px; color: var(--gray); margin-left: auto; }

/* ── NOTES PANEL ────────────────────────────────────────────────── */
.notes-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
.notes-header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--card-border);
    background: rgba(15,23,42,0.5);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 14px;
}
.notes-header-info { flex: 1; min-width: 0; }
.notes-match-name {
    font-size: 18px;
    font-weight: 800;
    color: var(--light);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.notes-match-meta {
    font-size: 12px;
    color: var(--gray);
    margin-top: 3px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
}
.notes-match-meta span { display: flex; align-items: center; gap: 5px; }
.notes-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 22px;
    display: flex;
    flex-direction: column;
    gap: 18px;
}

/* ── EMPTY ──────────────────────────────────────────────────────── */
.empty-notes {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--gray);
}
.empty-notes i { font-size: 42px; opacity: .15; color: var(--primary); }
.empty-notes p { font-size: 13px; text-align: center; line-height: 1.8; }

/* ── SECTION CARD ───────────────────────────────────────────────── */
.notes-section {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
}
.notes-section-hdr {
    padding: 12px 16px;
    border-bottom: 1px solid var(--card-border);
    font-size: 11px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--gray);
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(15,23,42,0.3);
}
.notes-section-body { padding: 16px; }

/* ── COACHING NOTES TEXTAREA ────────────────────────────────────── */
.notes-textarea {
    width: 100%;
    min-height: 160px;
    background: rgba(10,16,28,0.7);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    color: var(--light);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.7;
    padding: 12px 14px;
    outline: none;
    resize: vertical;
    transition: border-color .15s, box-shadow .15s;
}
.notes-textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
}
.notes-textarea::placeholder { color: rgba(148,163,184,0.3); }
.notes-meta-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    flex-wrap: wrap;
    gap: 8px;
}
.notes-saved-info { font-size: 11px; color: var(--gray); }
.notes-saved-info.saving { color: #fbbf24; }
.notes-saved-info.saved { color: #34d399; }

/* ── MAP SCORE SUMMARY ──────────────────────────────────────────── */
.map-summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
}
.map-tile {
    background: rgba(15,23,42,0.5);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 11px 13px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.map-tile-name { font-size: 13px; font-weight: 700; flex: 1; }
.map-tile-score { font-size: 14px; font-weight: 800; }

/* ── POV LINKS ──────────────────────────────────────────────────── */
.pov-grid { display: flex; flex-direction: column; gap: 8px; }
.pov-row {
    display: flex;
    align-items: center;
    gap: 10px;
}
.pov-avatar {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #a78bfa;
    flex-shrink: 0;
}
.pov-name {
    font-size: 13px;
    font-weight: 700;
    width: 110px;
    flex-shrink: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.pov-input {
    flex: 1;
    background: rgba(10,16,28,0.7);
    border: 1px solid var(--card-border);
    border-radius: 7px;
    color: var(--light);
    font-family: inherit;
    font-size: 12px;
    padding: 7px 11px;
    outline: none;
    transition: border-color .15s;
    min-width: 0;
}
.pov-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(124,58,237,0.12); }
.pov-input.has-val { border-color: rgba(124,58,237,0.4); }
.pov-open-btn {
    width: 32px; height: 32px;
    background: rgba(124,58,237,0.1);
    border: 1px solid rgba(124,58,237,0.25);
    border-radius: 7px;
    color: #a78bfa;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    transition: all .15s;
    text-decoration: none;
}
.pov-open-btn:hover { background: rgba(124,58,237,0.2); border-color: rgba(124,58,237,0.5); }
.pov-open-btn.disabled { opacity: .3; pointer-events: none; }

/* ── WATCH ALL BUTTON ───────────────────────────────────────────── */
.watch-all-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all .18s;
    text-decoration: none;
}
.watch-all-btn:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
.watch-all-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ── AUTOSAVE INDICATOR ─────────────────────────────────────────── */
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.saved-pulse { animation: fadeIn .2s ease; }

/* ── TOAST ──────────────────────────────────────────────────────── */
#toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: rgba(124,58,237,0.92);
    color: #fff; border-radius: 8px;
    padding: 10px 20px; font-size: 13px; font-weight: 700;
    opacity: 0; transition: all .22s; z-index: 9999; pointer-events: none;
    white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ─────────────────────────────────────────────────── */
@media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; grid-template-rows: 280px 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--card-border); }
}
/* ── NOTES TABS ─────────────────────────────────────────────────── */
.notes-tabs { display:flex; gap:0; border-bottom:1px solid var(--card-border); padding:0 16px; background:rgba(15,23,42,0.3); flex-shrink:0; }
.notes-tab-btn { padding:11px 18px; font-size:12px; font-weight:700; color:var(--gray); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; font-family:inherit; display:flex; align-items:center; gap:6px; transition:all .15s; white-space:nowrap; }
.notes-tab-btn:hover { color:var(--light); }
.notes-tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }

/* ── PLAYER NOTE CARDS ──────────────────────────────────────────── */
.player-note-card { background:rgba(15,23,42,0.5); border:1px solid var(--card-border); border-radius:10px; overflow:hidden; margin-bottom:12px; }
.player-note-header { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid var(--card-border); background:rgba(15,23,42,0.3); }
.player-note-av { width:32px; height:32px; border-radius:8px; background:rgba(124,58,237,0.15); border:1px solid rgba(124,58,237,0.25); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:800; color:#a78bfa; flex-shrink:0; }
.player-note-name { font-size:14px; font-weight:800; color:var(--light); }
.note-visibility-badge { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:.3px; }
.badge-public  { background:rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.25);  color:#34d399; }
.badge-private { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); color:#f87171; }
.player-note-body { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.note-section { display:flex; flex-direction:column; gap:6px; }
.note-section-lbl { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray); display:flex; align-items:center; gap:6px; }
.notes-textarea-sm {
    width:100%; background:rgba(10,16,28,0.7); border:1px solid var(--card-border);
    border-radius:8px; color:var(--light); font-family:inherit; font-size:13px;
    padding:10px 12px; outline:none; resize:vertical; min-height:72px;
    transition:border-color .15s, box-shadow .15s; line-height:1.55;
}
.notes-textarea-sm:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(124,58,237,0.1); }
.notes-textarea-sm::placeholder { color:rgba(148,163,184,0.25); }
.notes-textarea-sm[readonly] { opacity:.6; cursor:default; }
.note-save-row { display:flex; align-items:center; justify-content:space-between; gap:8px; }
.note-save-status { font-size:11px; color:var(--gray); }
.note-save-status.saving { color:#fbbf24; }
.note-save-status.saved  { color:#34d399; }
</style>
</head>

<script>
(function(){
'use strict';

if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();
const db   = firebase.database();

const x = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ── State ─────────────────────────────────────────────────────────
let teamId        = null;
let allMatches    = [];
let rosterPlayers = []; // [{uid, displayName}]
let activeMatchId = null;
let saveTimer     = null;
let currentRole   = '';
let currentUid    = '';

// ── Auth ──────────────────────────────────────────────────────────
auth.onAuthStateChanged(async user => {
    if(!user || !user.emailVerified) return window.location.href = 'index_pro.html';
    R6Theme.init(user.uid, db);

    try {
        teamId = await getPreviewTeamId(user, db);
        if(!teamId) throw new Error('No team');

        // Get user role
        currentUid = user.uid;
        const roleSnap = await db.ref(`teams/${teamId}/players/${user.uid}/role`).once('value');
        currentRole = (roleSnap.val()||'').toLowerCase();

        // Load roster with UIDs
        const rSnap = await db.ref(`teams/${teamId}/players`).once('value');
        rosterPlayers = [];
        rSnap.forEach(c => {
            const p = c.val();
            if(!p) return;
            if(p.inRoster === false || p.inRoster === 'false') return;
            if(['coach','analyst'].includes((p.role||'').toLowerCase())) return;
            if(p.displayName) rosterPlayers.push({ uid: c.key, displayName: p.displayName });
        });
        rosterPlayers.sort((a,b) => a.displayName.localeCompare(b.displayName));

        // Load matches
        const mSnap = await db.ref(`teams/${teamId}/matches_pro`).once('value');
        const raw = mSnap.val() || {};
        allMatches = Object.entries(raw).map(([id, m]) => {
            let maps = m.maps;
            if(!maps) maps = [];
            else if(!Array.isArray(maps)) maps = Object.values(maps);
            return { id, ...m, maps };
        }).sort((a, b) => (b.date||'').localeCompare(a.date||''));

        renderMatchList(allMatches);

        // If URL has ?match=id, auto-open it
        const params = new URLSearchParams(window.location.search);
        const preload = params.get('match');
        if(preload) {
            const m = allMatches.find(m => m.id === preload);
            if(m) openMatch(m);
        }

    } catch(e) {
        console.error(e);
        document.getElementById('matchList').innerHTML =
            `<div style="padding:20px;color:#f87171;font-size:13px;">Error: ${e.message}</div>`;
    }
});

// ── Render match list ─────────────────────────────────────────────
function renderMatchList(matches) {
    const list = document.getElementById('matchList');
    if(!matches.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--gray);font-size:13px;">No matches found.</div>';
        return;
    }
    list.innerHTML = matches.map(m => {
        const mW = (m.maps||[]).filter(mp => (mp.teamScore||0) > (mp.opponentScore||0)).length;
        const mL = (m.maps||[]).filter(mp => (mp.teamScore||0) < (mp.opponentScore||0)).length;
        const win = mW > mL;
        const resCol = win ? '#34d399' : '#f87171';
        const hasNotes = !!(m.notes && (m.notes.text || Object.keys(m.notes.povLinks||{}).length));
        return `
        <div class="match-item${activeMatchId===m.id?' active':''}" onclick="openMatchById('${m.id}')">
            <div class="match-item-top">
                <span class="match-result" style="color:${resCol};">${win?'W':'L'}</span>
                <span class="match-opp">${x(m.opponent||'Unknown')}</span>
                ${hasNotes ? '<span class="match-has-notes" title="Has notes"></span>' : ''}
            </div>
            <div class="match-item-bottom">
                <span class="match-date">${x(m.date||'—')}</span>
                <span class="match-type">${x(m.matchType||'scrim')}</span>
                <span class="match-score">${mW}–${mL}</span>
            </div>
        </div>`;
    }).join('');
}

window.filterMatchList = function(q) {
    const filtered = q
        ? allMatches.filter(m =>
            (m.opponent||'').toLowerCase().includes(q.toLowerCase()) ||
            (m.date||'').includes(q))
        : allMatches;
    renderMatchList(filtered);
};

window.openMatchById = function(id) {
    const m = allMatches.find(m => m.id === id);
    if(m) openMatch(m);
};

// ── Open a match ──────────────────────────────────────────────────
async function openMatch(m) {
    activeMatchId = m.id;
    renderMatchList(allMatches);

    const isStaff = ['captain','coach','analyst'].includes(currentRole);
    const notesRef = `teams/${teamId}/matches_pro/${m.id}/notes`;

    // Load general notes + POV links (all members can read)
    const [generalSnap, povSnap] = await Promise.all([
        db.ref(`${notesRef}/general`).once('value'),
        db.ref(`${notesRef}/povLinks`).once('value'),
    ]);
    const generalNotes = generalSnap.val() || {};
    const povLinks     = povSnap.val() || {};

    // Load player notes — staff gets all, players get public + own private
    const playerNotes = {}; // { uid: { public:{}, private:{} } }
    for(const player of rosterPlayers) {
        const pubSnap = await db.ref(`${notesRef}/playerNotes/${player.uid}/public`).once('value');
        playerNotes[player.uid] = { public: pubSnap.val() || {} };
        // Try to load private — rules will block if not allowed
        try {
            if(isStaff || player.uid === currentUid) {
                const privSnap = await db.ref(`${notesRef}/playerNotes/${player.uid}/private`).once('value');
                playerNotes[player.uid].private = privSnap.val() || {};
            }
        } catch(e) { playerNotes[player.uid].private = null; }
    }

    renderNotesPanel(m, { general: generalNotes, povLinks, playerNotes });
}

// ── Render notes panel ────────────────────────────────────────────
function renderNotesPanel(m, notes) {
    const mW = (m.maps||[]).filter(mp => (mp.teamScore||0) > (mp.opponentScore||0)).length;
    const mL = (m.maps||[]).filter(mp => (mp.teamScore||0) < (mp.opponentScore||0)).length;
    const win = mW > mL;
    const resCol = win ? '#34d399' : '#f87171';
    const canEdit = ['captain','coach','analyst'].includes(currentRole);
    const isStaff = canEdit;
    const panel = document.getElementById('notesPanel');

    // Map tiles
    const mapTiles = (m.maps||[]).map(mp => {
        const w=(mp.teamScore||0)>(mp.opponentScore||0), l=(mp.teamScore||0)<(mp.opponentScore||0);
        const c=w?'#34d399':l?'#f87171':'#fbbf24';
        return `<div class="map-tile"><div class="map-tile-name">${x(mp.mapName||'?')}</div><div class="map-tile-score" style="color:${c};">${mp.teamScore??'?'}\u2013${mp.opponentScore??'?'}</div></div>`;
    }).join('');

    // POV links
    const povLinks = notes.povLinks || {};
    function sanitizeKey(k) {
        return String(k||'')
            .replace(/\./g,'(dot)').replace(/\#/g,'(hash)')
            .replace(/\$/g,'(dollar)').replace(/\//g,'(slash)')
            .replace(/\[/g,'(lbracket)').replace(/\]/g,'(rbracket)');
    }
    const povRows = rosterPlayers.map(player => {
        const safeKey = sanitizeKey(player.displayName);
        // Support both sanitized keys (new) and raw displayName keys (legacy)
        const link = povLinks[safeKey] || povLinks[player.displayName] || '';
        const hasLink = !!link;
        const esc_name = player.displayName.replace(/'/g,"\\'");
        return `<div class="pov-row">
            <div class="pov-avatar">${player.displayName.slice(0,2).toUpperCase()}</div>
            <div class="pov-name" title="${x(player.displayName)}">${x(player.displayName)}</div>
            <input class="pov-input${hasLink?' has-val':''}" type="text"
                id="pov_${safeKey}"
                placeholder="YouTube URL\u2026"
                value="${x(link)}"
                ${canEdit?'':'readonly'}
                oninput="onPovInput(this,'${esc_name}')">
            <a class="pov-open-btn${hasLink?'':' disabled'}" id="povbtn_${safeKey}"
                href="${link||'#'}" target="_blank" title="Open in new tab">
                <i class="fas fa-arrow-up-right-from-square"></i>
            </a>
        </div>`;
    }).join('');
    const povCount = rosterPlayers.filter(p => {
        const sk = sanitizeKey(p.displayName);
        return povLinks[sk] || povLinks[p.displayName];
    }).length;

    // General notes
    const general = notes.general || {};
    const genSavedInfo = general.updatedAt
        ? `Saved ${new Date(general.updatedAt).toLocaleTimeString()} by ${general.updatedBy||'?'}`
        : 'No general notes yet';

    // Player note cards
    const playerNotes = notes.playerNotes || {};
    const playerCards = rosterPlayers.map(player => {
        const pn = playerNotes[player.uid] || {};
        const pub = pn.public || {};
        const priv = pn.private;  // null = no access, {} = empty, {text} = has note
        const canSeePrivate = isStaff || player.uid === currentUid;
        const privSaved = priv?.updatedAt ? `Saved ${new Date(priv.updatedAt).toLocaleTimeString()} by ${priv.updatedBy||'?'}` : '';
        const pubSaved  = pub.updatedAt   ? `Saved ${new Date(pub.updatedAt).toLocaleTimeString()} by ${pub.updatedBy||'?'}` : '';

        return `<div class="player-note-card">
            <div class="player-note-header">
                <div class="player-note-av">${player.displayName.slice(0,2).toUpperCase()}</div>
                <div class="player-note-name">${x(player.displayName)}</div>
            </div>
            <div class="player-note-body">
                <!-- Public note -->
                <div class="note-section">
                    <div class="note-section-lbl">
                        <i class="fas fa-globe" style="color:#34d399;"></i>
                        <span class="note-visibility-badge badge-public">Public</span>
                        <span style="font-weight:400;text-transform:none;letter-spacing:0;">— visible to all team members</span>
                    </div>
                    <textarea class="notes-textarea-sm" id="pub_${player.uid}"
                        placeholder="${canEdit?'Public note for '+player.displayName+'\u2026':'No public note yet.'}"
                        ${canEdit?'':'readonly'}
                        oninput="schedulePlayerSave('${player.uid}','public')">${x(pub.text||'')}</textarea>
                    ${pubSaved?`<div class="note-save-status" id="pub_status_${player.uid}">${pubSaved}</div>`:`<div class="note-save-status" id="pub_status_${player.uid}"></div>`}
                </div>
                <!-- Private note -->
                ${canSeePrivate ? `<div class="note-section">
                    <div class="note-section-lbl">
                        <i class="fas fa-lock" style="color:#f87171;"></i>
                        <span class="note-visibility-badge badge-private">Private</span>
                        <span style="font-weight:400;text-transform:none;letter-spacing:0;">— only ${isStaff?'coaches & this player':'you & coaches'} can see this</span>
                    </div>
                    <textarea class="notes-textarea-sm" id="priv_${player.uid}"
                        placeholder="${canEdit?'Private note for '+player.displayName+' (only coaches and this player see this)\u2026':'Private note from your coach.'}"
                        ${canEdit?'':'readonly'}
                        oninput="schedulePlayerSave('${player.uid}','private')">${x(priv?.text||'')}</textarea>
                    ${privSaved?`<div class="note-save-status" id="priv_status_${player.uid}">${privSaved}</div>`:`<div class="note-save-status" id="priv_status_${player.uid}"></div>`}
                </div>` : ''}
            </div>
        </div>`;
    }).join('');

    panel.innerHTML = `
    <div class="notes-header">
        <div class="notes-header-info">
            <div class="notes-match-name">${x(m.opponent||'Unknown')}</div>
            <div class="notes-match-meta">
                <span><i class="fas fa-calendar"></i> ${x(m.date||'\u2014')}</span>
                <span style="color:${resCol};font-weight:700;"><i class="fas fa-gamepad"></i> ${mW}\u2013${mL} maps</span>
                <span><i class="fas fa-tag"></i> ${x(m.matchType||'scrim')}</span>
                ${(m.maps||[]).length?`<span><i class="fas fa-map"></i> ${(m.maps||[]).map(mp=>mp.mapName||'?').join(' \u00b7 ')}</span>`:''}
            </div>
        </div>
        ${povCount>=2?`<button class="watch-all-btn" onclick="watchAllPovs('${m.id}')"><i class="fas fa-tv"></i> Watch All POVs (${povCount})</button>`:''}
    </div>

    <!-- Tabs -->
    <div class="notes-tabs">
        <button class="notes-tab-btn active" id="tab-general" onclick="switchNoteTab('general')"><i class="fas fa-pen-to-square"></i> General Notes</button>
        <button class="notes-tab-btn" id="tab-players" onclick="switchNoteTab('players')"><i class="fas fa-users"></i> Player Notes</button>
        <button class="notes-tab-btn" id="tab-pov" onclick="switchNoteTab('pov')"><i class="fas fa-video"></i> POV Links${povCount>0?` <span style="background:rgba(124,58,237,.2);border-radius:4px;padding:1px 6px;font-size:10px;">${povCount}</span>`:''}</button>
    </div>

    <!-- General notes tab -->
    <div class="notes-body" id="tab-pane-general">
        ${(m.maps||[]).length?`<div class="notes-section"><div class="notes-section-hdr"><i class="fas fa-map"></i> Map Results</div><div class="notes-section-body"><div class="map-summary-grid">${mapTiles}</div></div></div>`:''}
        <div class="notes-section">
            <div class="notes-section-hdr">
                <i class="fas fa-globe" style="color:#34d399;"></i> General Notes
                <span class="note-visibility-badge badge-public" style="margin-left:8px;">Public</span>
                <span style="margin-left:auto;font-size:10px;color:var(--gray);font-weight:400;text-transform:none;">Visible to entire team</span>
            </div>
            <div class="notes-section-body">
                <textarea class="notes-textarea" id="generalText"
                    placeholder="General coaching notes, team-wide observations, tactical focus areas\u2026${canEdit?'':'\n(View only \u2014 coaches can edit)'}"
                    ${canEdit?'':'readonly'}
                    oninput="scheduleGeneralSave()">${x(general.text||'')}</textarea>
                <div class="notes-meta-bar">
                    <span class="notes-saved-info" id="generalStatus">${genSavedInfo}</span>
                    ${canEdit?`<button class="btn btn-primary" onclick="saveGeneral(true)"><i class="fas fa-floppy-disk"></i> Save</button>`:''}
                </div>
            </div>
        </div>
    </div>

    <!-- Player notes tab -->
    <div class="notes-body" id="tab-pane-players" style="display:none;">
        ${rosterPlayers.length?playerCards:`<div style="text-align:center;padding:40px;color:var(--gray);font-size:13px;"><i class="fas fa-users" style="font-size:28px;opacity:.15;display:block;margin-bottom:12px;"></i>No roster players found.</div>`}
        ${canEdit&&rosterPlayers.length?`<div style="display:flex;justify-content:flex-end;margin-top:8px;"><button class="btn btn-primary" onclick="saveAllPlayerNotes()"><i class="fas fa-floppy-disk"></i> Save All Player Notes</button></div>`:''}
    </div>

    <!-- POV links tab -->
    <div class="notes-body" id="tab-pane-pov" style="display:none;">
        <div class="notes-section">
            <div class="notes-section-hdr">
                <i class="fas fa-video"></i> Player POV Links
                <span style="margin-left:auto;font-size:10px;color:var(--gray);font-weight:400;text-transform:none;letter-spacing:0;">${povCount} of ${rosterPlayers.length} linked</span>
            </div>
            <div class="notes-section-body">
                ${rosterPlayers.length?`
                <div class="pov-grid" id="povGrid">${povRows}</div>
                <div style="margin-top:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                    ${canEdit?`<button class="btn btn-primary" onclick="savePovLinks()"><i class="fas fa-floppy-disk"></i> Save POV Links</button>`:''}
                    ${povCount>=2?`<button class="watch-all-btn" onclick="watchAllPovs('${m.id}')"><i class="fas fa-tv"></i> Watch All POVs in Multi-Stream</button>`:`<span style="font-size:12px;color:var(--gray);">Add 2+ POV links to enable Multi-Stream</span>`}
                </div>`:'<p style="color:var(--gray);font-size:13px;">No roster players found.</p>'}
            </div>
        </div>
    </div>`;
}

window.switchNoteTab = function(tab) {
    ['general','players','pov'].forEach(t => {
        document.getElementById('tab-'+t)?.classList.toggle('active', t===tab);
        const pane = document.getElementById('tab-pane-'+t);
        if(pane) pane.style.display = t===tab?'':'none';
    });
};

// ── POV input handler ─────────────────────────────────────────────
window.onPovInput = function(inp, player) {
    const hasVal = inp.value.trim().length > 0;
    inp.classList.toggle('has-val', hasVal);
    // Update the open button — use sanitized key matching the element ID
    const safeKey = String(player||'')
        .replace(/\./g,'(dot)').replace(/\#/g,'(hash)')
        .replace(/\$/g,'(dollar)').replace(/\//g,'(slash)')
        .replace(/\[/g,'(lbracket)').replace(/\]/g,'(rbracket)');
    const btn = document.getElementById('povbtn_' + safeKey);
    if(btn) {
        btn.href = hasVal ? inp.value.trim() : '#';
        btn.classList.toggle('disabled', !hasVal);
    }
};

// ── General notes save ───────────────────────────────────────────
let generalSaveTimer = null;
window.scheduleGeneralSave = function() {
    setGeneralStatus('saving');
    clearTimeout(generalSaveTimer);
    generalSaveTimer = setTimeout(() => saveGeneral(false), 1500);
};
window.saveGeneral = async function(manual) {
    if(!activeMatchId||!teamId) return;
    const el = document.getElementById('generalText');
    if(!el) return;
    const user = auth.currentUser;
    try {
        await db.ref(`teams/${teamId}/matches_pro/${activeMatchId}/notes/general`).set({
            text: el.value, updatedAt: Date.now(),
            updatedBy: user?.displayName||user?.email||'unknown'
        });
        setGeneralStatus('saved', `Saved ${new Date().toLocaleTimeString()}`);
        if(manual) toast('General notes saved');
        refreshMatchNotesDot(activeMatchId);
    } catch(e) { setGeneralStatus('idle','Save failed'); toast('Save failed: '+e.message); }
};
function setGeneralStatus(state, msg) {
    const el = document.getElementById('generalStatus');
    if(!el) return;
    if(state==='saving') { el.className='notes-saved-info saving'; el.innerHTML='<i class="fas fa-circle-notch fa-spin"></i> Saving…'; }
    else if(state==='saved') { el.className='notes-saved-info saved saved-pulse'; el.textContent=msg||'Saved'; }
    else { el.className='notes-saved-info'; el.textContent=msg||''; }
}

// ── Player notes save ────────────────────────────────────────────
const playerSaveTimers = {};
window.schedulePlayerSave = function(uid, type) {
    const key = uid+'_'+type;
    const statusEl = document.getElementById((type==='public'?'pub':'priv')+'_status_'+uid);
    if(statusEl) { statusEl.className='note-save-status saving'; statusEl.textContent='Saving…'; }
    clearTimeout(playerSaveTimers[key]);
    playerSaveTimers[key] = setTimeout(() => savePlayerNote(uid, type, false), 1500);
};

async function savePlayerNote(uid, type, manual) {
    if(!activeMatchId||!teamId) return;
    const inputId = (type==='public'?'pub':'priv')+'_'+uid;
    const el = document.getElementById(inputId);
    if(!el) return;
    const statusEl = document.getElementById((type==='public'?'pub':'priv')+'_status_'+uid);
    const user = auth.currentUser;
    try {
        await db.ref(`teams/${teamId}/matches_pro/${activeMatchId}/notes/playerNotes/${uid}/${type}`).set({
            text: el.value, updatedAt: Date.now(),
            updatedBy: user?.displayName||user?.email||'unknown'
        });
        const ts = `Saved ${new Date().toLocaleTimeString()}`;
        if(statusEl) { statusEl.className='note-save-status saved'; statusEl.textContent=ts; }
        if(manual) toast(`${type==='private'?'Private':'Public'} note saved`);
    } catch(e) {
        if(statusEl) { statusEl.className='note-save-status'; statusEl.textContent='Save failed'; }
        toast('Save failed: '+e.message);
    }
}

window.saveAllPlayerNotes = async function() {
    for(const player of rosterPlayers) {
        await savePlayerNote(player.uid, 'public', false);
        await savePlayerNote(player.uid, 'private', false);
    }
    toast('All player notes saved');
};

// ── Save POV links ────────────────────────────────────────────────
function sanitizeKey(k) {
    return String(k||'')
        .replace(/\./g,'(dot)').replace(/\#/g,'(hash)')
        .replace(/\$/g,'(dollar)').replace(/\//g,'(slash)')
        .replace(/\[/g,'(lbracket)').replace(/\]/g,'(rbracket)');
}

window.savePovLinks = async function() {
    if(!activeMatchId||!teamId) return;
    const povLinks = {};
    rosterPlayers.forEach(player => {
        // Use sanitized key for Firebase — input ID also uses sanitized key
        const safeKey = sanitizeKey(player.displayName);
        const inp = document.getElementById('pov_' + safeKey);
        if(inp && inp.value.trim()) povLinks[safeKey] = inp.value.trim();
    });
    try {
        await db.ref(`teams/${teamId}/matches_pro/${activeMatchId}/notes/povLinks`).set(povLinks);
        toast('POV links saved');
        refreshMatchNotesDot(activeMatchId);
    } catch(e) { toast('Save failed: '+e.message); }
};

// ── Watch all POVs in multistream ─────────────────────────────────
window.watchAllPovs = async function(matchId) {
    const notesSnap = await db.ref(`teams/${teamId}/matches_pro/${matchId}/notes`).once('value');
    const povLinks = (notesSnap.val()||{}).povLinks || {};
    const entries = Object.entries(povLinks).filter(([,v]) => v);
    if(entries.length < 2) { toast('Need at least 2 POV links'); return; }

    // Build URL params for multistream
    const params = new URLSearchParams();
    entries.slice(0, 5).forEach(([player, url], i) => {
        params.set(`url${i+1}`, url);
        params.set(`pov${i+1}`, player);
    });
    window.open(`multistream.html?${params.toString()}`, '_blank');
};

// ── Refresh notes dot on match list item ──────────────────────────
function refreshMatchNotesDot(matchId) {
    // Update in-memory match object
    const m = allMatches.find(m => m.id === matchId);
    if(m) {
        db.ref(`teams/${teamId}/matches_pro/${matchId}/notes`).once('value').then(snap => {
            const n = snap.val()||{};
            if(!m.notes) m.notes = {};
            m.notes = n;
            renderMatchList(allMatches);
            // Re-highlight active
            document.querySelectorAll('.match-item').forEach(el => {
                if(el.onclick && el.getAttribute('onclick')?.includes(matchId)) {
                    el.classList.add('active');
                }
            });
        });
    }
}

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

})();
</script>

<!-- Handle multistream URL params (when launched from match notes) -->
<script>
(function(){
    // If this page is multistream.html opened with url params, pre-fill inputs
    // This runs on multistream.html side — handled there via URL params
})();
</script>
